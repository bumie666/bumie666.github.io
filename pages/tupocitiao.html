    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0e14;
            background-image: radial-gradient(ellipse at 50% 0%, #1a212b 0%, #0b0e14 70%);
            color: #e0e6ed;
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            min-height: 100vh;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .page-wrap {
            max-width: 1000px;
            width: 100%;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #2a3a4a;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .header .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid rgba(200, 169, 110, 0.3);
            object-fit: cover;
            flex-shrink: 0;
        }
        .header .title-group {
            display: flex;
            align-items: baseline;
            gap: 8px;
            flex-wrap: wrap;
        }
        .header h1 {
            font-family: 'Cinzel', 'Times New Roman', serif;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #f6d365, #c8a96e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .sub {
            font-size: 13px;
            color: #7a8a9e;
            letter-spacing: 1px;
        }

        .tab-bar {
            display: flex;
            gap: 0;
            margin-bottom: 20px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #2a3a4a;
            background: #0f161e;
        }
        .tab-btn {
            flex: 1;
            padding: 12px 16px;
            background: transparent;
            border: none;
            color: #7a8a9e;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.25s;
            letter-spacing: 1px;
            font-family: 'Cinzel', 'Times New Roman', serif;
        }
        .tab-btn:hover {
            color: #c8a96e;
            background: rgba(200, 169, 110, 0.05);
        }
        .tab-btn.active {
            color: #f6d365;
            background: rgba(200, 169, 110, 0.10);
            border-bottom: 2px solid #c8a96e;
        }
        .tab-btn:first-child {
            border-right: 1px solid #2a3a4a;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== 图鉴卡片 ===== */
        .stone-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        .stone-card {
            background: rgba(20, 25, 35, 0.75);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: 1px solid #2a3a4a;
            border-radius: 14px;
            padding: 16px 14px;
            transition: border-color 0.25s, transform 0.2s;
            position: relative;
            overflow: hidden;
        }
        .stone-card:hover {
            border-color: #c8a96e;
            transform: translateY(-2px);
        }
        /* 顶部色条 */
        .stone-card .color-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
        }
        .stone-card .stone-name {
            font-family: 'Cinzel', 'Times New Roman', serif;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-top: 4px;
            margin-bottom: 2px;
        }
        .stone-card .stone-cost {
            font-size: 12px;
            color: #7a8a9e;
            margin-bottom: 8px;
        }
        .stone-card .set-effect {
            font-size: 13px;
            background: rgba(255,255,255,0.03);
            padding: 6px 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            line-height: 1.5;
            border-left: 2px solid;
        }
        .stone-card .set-effect .label {
            color: #7a8a9e;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stone-card .attr-list {
            list-style: none;
            padding: 0;
        }
        .stone-card .attr-list li {
            font-size: 13px;
            color: #d0d8e0;
            padding: 3px 0;
            border-bottom: 1px solid rgba(42, 58, 74, 0.3);
            display: flex;
            align-items: baseline;
            gap: 6px;
        }
        .stone-card .attr-list li:last-child {
            border-bottom: none;
        }
        .stone-card .attr-list .tag {
            font-weight: 600;
            font-size: 12px;
            min-width: 44px;
        }
        .stone-card .attr-list .range {
            font-size: 12px;
            font-weight: 500;
            margin-left: auto;
            white-space: nowrap;
        }

        .color-yehui .set-effect { border-color: #e06050; }
        .color-yehui .set-effect .label { color: #e06050; }
        .color-yehui .attr-list .tag { color: #e06050; }
        .color-yehui .attr-list .range { color: #e06050; }

        .color-zhenchan .set-effect .label { color: #4a6a9e; }
        .color-zhenchan .attr-list .tag { color: #4a6a9e; }
        .color-zhenchan .attr-list .range { color: #4a6a9e; }

        .color-jielv .stone-name { color: #f6d365; }
        .color-jielv .set-effect { border-color: #f6d365; }
        .color-jielv .set-effect .label { color: #f6d365; }
        .color-jielv .attr-list .tag { color: #f6d365; }
        .color-jielv .attr-list .range { color: #f6d365; }

        .color-pingzhang .stone-name { color: #6cb4ee; }
        .color-pingzhang .set-effect { border-color: #6cb4ee; }
        .color-pingzhang .set-effect .label { color: #6cb4ee; }
        .color-pingzhang .attr-list .tag { color: #6cb4ee; }
        .color-pingzhang .attr-list .range { color: #6cb4ee; }

        .color-pohuai .set-effect .label { color: #b088d0; }
        .color-pohuai .attr-list .tag { color: #b088d0; }

        }
        .scheme-card {

        .scheme-card .scheme-name {

            font-weight: 700;
            letter-spacing: 1px;
            margin-top: 4px;

        .scheme-card .scheme-scene {

            margin-bottom: 8px;
            display: inline-block;
            background: rgba(255,255,255,0.05);
            padding: 2px 10px;
            border-radius: 20px;
            border: 1px solid #2a3a4a;

        .scheme-card .scheme-stone {

            border-radius: 6px;
            display: inline-block;

        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 18px;
            padding: 10px 14px;
            background: rgba(20, 25, 35, 0.5);
            border-radius: 10px;
            border: 1px solid #2a3a4a;
            margin-bottom: 16px;
            justify-content: center;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #b0c4d9;
        }
        .legend-item .dot {
            width: 14px;
            height: 14px;
            border-radius: 4px;
            flex-shrink: 0;
        }
        .dot-red { background: #e06050; }
        .dot-orange { background: #e89a4a; }
        .dot-darkblue { background: #4a6a9e; }
        .dot-yellow { background: #f6d365; }
        .dot-lightblue { background: #6cb4ee; }
        .dot-purple { background: #b088d0; }

        @media (max-width: 640px) {
            .stone-grid,
            .scheme-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            .header h1 {
                font-size: 18px;
            }
            .header .sub {
                font-size: 11px;
            }
            .tab-btn {
                font-size: 13px;
                padding: 10px 12px;
            }
            .stone-card .stone-name {
                font-size: 16px;
            }
            .stone-card .attr-list li {
                font-size: 12px;
            }
            .scheme-card .scheme-name {
                font-size: 15px;
            }
            .scheme-card .scheme-list li {
                font-size: 12px;
            }
            .legend {
                gap: 6px 12px;
                padding: 8px 10px;
            }
            .legend-item {
                font-size: 11px;
            }
        }
        @media (max-width: 400px) {
            .header .avatar {
                width: 32px;
                height: 32px;
            }
            .tab-btn {
                font-size: 12px;
                padding: 8px 10px;
            }
        }
    </style>
</head>

    // ================================================================
    //  渲染函数
    // ================================================================

    function renderStones() {
        var grid = document.getElementById('stoneGrid');
        var html = '';
        STONES.forEach(function(s) {
            var color = COLOR_MAP[s.colorKey];
            var colorClass = color ? color.class : '';
            var barColor = color ? color.bar : '#666';
            html += '<div class="stone-card ' + colorClass + '">';
            html += '<div class="color-bar" style="background:' + barColor + ';"></div>';
            html += '<div class="stone-name">' + s.name + '</div>';
            html += '<div class="stone-cost">' + s.cost + '</div>';
            html += '<div class="set-effect"><span class="label">⚔️ 套装效果（3件激活）</span><br>' + s.setEffect + '</div>';
            html += '<ul class="attr-list">';
            s.attrs.forEach(function(a) {
                html += '<li><span class="tag">' + a.tag + '</span> ' + a.desc + ' <span class="range">' + a.range + '</span></li>';
            });
            html += '</ul>';
            html += '</div>';
        });
        grid.innerHTML = html;
    }

    function renderSchemes() {
        var grid = document.getElementById('schemeGrid');
        var html = '';
        SCHEMES.forEach(function(s) {
            var color = COLOR_MAP[s.colorKey];
            var colorClass = color ? color.class : '';
            var barColor = color ? color.bar : '#666';
            html += '<div class="scheme-card ' + colorClass + '">';

            html += '<div class="scheme-scene">🎯 ' + s.scene + '</div>';
            html += '<div class="scheme-stone">💎 ' + s.stoneType + '（3件激活套装）</div>';
            html += '<div class="scheme-set"><span class="label">⚔️ 套装效果</span><br>' + s.setEffect + '</div>';
            html += '<ul class="scheme-list">';
            s.attrs.forEach(function(a) {
                html += '<li><span class="tag">' + a.tag + '</span> ' + a.desc + '</li>';
            });
            html += '</ul>';
            html += '</div>';
        });
        grid.innerHTML = html;
    }

    // ================================================================
    //  Tab 切换
    // ================================================================

    function switchTab(tab) {
        document.querySelectorAll('.tab-content').forEach(function(el) {
            el.classList.remove('active');
        });
        document.querySelectorAll('.tab-btn').forEach(function(el) {
            el.classList.remove('active');
        });
        document.getElementById('tab-' + tab).classList.add('active');
        var btns = document.querySelectorAll('.tab-btn');
        if (tab === 'tujian') {
            btns[0].classList.add('active');
        } else {
            btns[1].classList.add('active');
        }
    }

    // ================================================================

    window.onload = function() {
        renderStones();
        renderSchemes();
