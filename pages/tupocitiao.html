<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>暗黑不灭 · 突破属性图鉴</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* ===== 全局样式 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0e14;
            background-image: radial-gradient(ellipse at 50% 0%, #1a212b 0%, #0b0e14 70%);
            color: #e0e6ed;
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            min-height: 100vh;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .page-wrap {
            max-width: 1000px;
            width: 100%;
        }

        /* ===== 头部 ===== */
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #2a3a4a;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .header .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid rgba(200, 169, 110, 0.3);
            object-fit: cover;
            flex-shrink: 0;
        }
        .header .title-group {
            display: flex;
            align-items: baseline;
            gap: 8px;
            flex-wrap: wrap;
        }
        .header h1 {
            font-family: 'Cinzel', 'Times New Roman', serif;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #f6d365, #c8a96e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .sub {
            font-size: 13px;
            color: #7a8a9e;
            letter-spacing: 1px;
        }

        /* ===== Tab 切换 ===== */
        .tab-bar {
            display: flex;
            gap: 0;
            margin-bottom: 20px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #2a3a4a;
            background: #0f161e;
        }
        .tab-btn {
            flex: 1;
            padding: 12px 16px;
            background: transparent;
            border: none;
            color: #7a8a9e;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.25s;
            letter-spacing: 1px;
            font-family: 'Cinzel', 'Times New Roman', serif;
        }
        .tab-btn:hover {
            color: #c8a96e;
            background: rgba(200, 169, 110, 0.05);
        }
        .tab-btn.active {
            color: #f6d365;
            background: rgba(200, 169, 110, 0.10);
            border-bottom: 2px solid #c8a96e;
        }
        .tab-btn:first-child {
            border-right: 1px solid #2a3a4a;
        }

        /* ===== 卡片容器 ===== */
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== 图鉴卡片网格 ===== */
        .stone-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        .stone-card {
            background: rgba(20, 25, 35, 0.75);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: 1px solid #2a3a4a;
            border-radius: 14px;
            padding: 16px 14px;
            transition: border-color 0.25s, transform 0.2s;
        }
        .stone-card:hover {
            border-color: #c8a96e;
            transform: translateY(-2px);
        }
        .stone-card .stone-name {
            font-family: 'Cinzel', 'Times New Roman', serif;
            font-size: 18px;
            font-weight: 700;
            color: #f6d365;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }
        .stone-card .stone-cost {
            font-size: 12px;
            color: #7a8a9e;
            margin-bottom: 8px;
        }
        .stone-card .set-effect {
            font-size: 13px;
            color: #5fcb9a;
            background: rgba(95, 203, 154, 0.08);
            padding: 6px 10px;
            border-radius: 8px;
            border-left: 2px solid #5fcb9a;
            margin-bottom: 10px;
            line-height: 1.5;
        }
        .stone-card .set-effect .label {
            color: #7a8a9e;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stone-card .attr-list {
            list-style: none;
            padding: 0;
        }
        .stone-card .attr-list li {
            font-size: 13px;
            color: #d0d8e0;
            padding: 3px 0;
            border-bottom: 1px solid rgba(42, 58, 74, 0.3);
            display: flex;
            align-items: baseline;
            gap: 6px;
        }
        .stone-card .attr-list li:last-child {
            border-bottom: none;
        }
        .stone-card .attr-list .tag {
            color: #c8a96e;
            font-weight: 600;
            font-size: 12px;
            min-width: 44px;
        }
        .stone-card .attr-list .range {
            color: #6cb4ee;
            font-size: 12px;
            font-weight: 500;
            margin-left: auto;
            white-space: nowrap;
        }

        /* ===== 方案卡片 ===== */
        .scheme-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        .scheme-card {
            background: rgba(20, 25, 35, 0.75);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: 1px solid #2a3a4a;
            border-radius: 14px;
            padding: 16px 14px;
            transition: border-color 0.25s, transform 0.2s;
        }
        .scheme-card:hover {
            border-color: #c8a96e;
            transform: translateY(-2px);
        }
        .scheme-card .scheme-name {
            font-family: 'Cinzel', 'Times New Roman', serif;
            font-size: 17px;
            font-weight: 700;
            color: #f6d365;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }
        .scheme-card .scheme-scene {
            font-size: 12px;
            color: #7a8a9e;
            margin-bottom: 10px;
            display: inline-block;
            background: rgba(200, 169, 110, 0.10);
            padding: 2px 10px;
            border-radius: 20px;
            border: 1px solid rgba(200, 169, 110, 0.10);
        }
        .scheme-card .scheme-list {
            list-style: none;
            padding: 0;
        }
        .scheme-card .scheme-list li {
            font-size: 13px;
            color: #d0d8e0;
            padding: 3px 0;
            border-bottom: 1px solid rgba(42, 58, 74, 0.3);
        }
        .scheme-card .scheme-list li:last-child {
            border-bottom: none;
        }
        .scheme-card .scheme-list .highlight {
            color: #5fcb9a;
            font-weight: 500;
        }

        /* ===== 返回链接 ===== */
        .back-link {
            display: block;
            text-align: center;
            margin-top: 18px;
            color: #5a6a7e;
            font-size: 13px;
            text-decoration: none;
            transition: 0.2s;
            letter-spacing: 0.5px;
        }
        .back-link:hover {
            color: #c8a96e;
        }

        /* ===== 信息脚注 ===== */
        .footer-note {
            font-size: 11px;
            color: #4a5a6e;
            text-align: center;
            margin-top: 12px;
            border-top: 1px solid #1e2c38;
            padding-top: 12px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 640px) {
            .stone-grid,
            .scheme-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            .header h1 {
                font-size: 18px;
            }
            .header .sub {
                font-size: 11px;
            }
            .tab-btn {
                font-size: 13px;
                padding: 10px 12px;
            }
            .stone-card .stone-name {
                font-size: 16px;
            }
            .stone-card .attr-list li {
                font-size: 12px;
            }
            .scheme-card .scheme-name {
                font-size: 15px;
            }
            .scheme-card .scheme-list li {
                font-size: 12px;
            }
        }
        @media (max-width: 400px) {
            .header .avatar {
                width: 32px;
                height: 32px;
            }
            .tab-btn {
                font-size: 12px;
                padding: 8px 10px;
            }
        }
    </style>
</head>
<body>

<div class="page-wrap">

    <!-- 头部 -->
    <div class="header">
        <img src="../images/douyintouxiang.png" alt="头像" class="avatar">
        <div class="title-group">
            <h1>⚔️ 突破属性图鉴</h1>
            <span class="sub">暗黑不灭 · 词条 &amp; 方案</span>
        </div>
    </div>

    <!-- Tab 切换 -->
    <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('tujian')">📖 图鉴</button>
        <button class="tab-btn" onclick="switchTab('fangan')">🎯 推荐方案</button>
    </div>

    <!-- ============================================================ -->
    <!-- 图鉴内容 -->
    <!-- ============================================================ -->
    <div id="tab-tujian" class="tab-content active">
        <div class="stone-grid" id="stoneGrid">
            <!-- 由 JS 生成 -->
        </div>
    </div>

    <!-- ============================================================ -->
    <!-- 方案内容 -->
    <!-- ============================================================ -->
    <div id="tab-fangan" class="tab-content">
        <div class="scheme-grid" id="schemeGrid">
            <!-- 由 JS 生成 -->
        </div>
    </div>

    <!-- 返回 -->
    <a href="https://ahbm8888.top" class="back-link">🏠 返回暗黑不朽百宝箱</a>
    <div class="footer-note">数据仅供参考 · 以游戏内为准</div>
</div>

<script>
    // ================================================================
    //  数据
    // ================================================================

    // 突破石数据
    var STONES = [{

        attrs: [
            { tag: '智慧', desc: '普攻伤害提高', range: '2.0-4.0%' },
            { tag: '卓越', desc: '技能伤害提高', range: '1.0-2.0%' },
            { tag: '追猎', desc: '对生命低于 30% 的敌人伤害提高', range: '2.0-4.0%' },
            { tag: '领悟', desc: '暴击伤害加成', range: '1.5-3.0%' },
            { tag: '牺牲', desc: '阵亡时为队友回复其最大生命的', range: '1.0-2.0%' }
        ]
    }, {
        name: '地裂石',
        cost: '1000 洗炼石',
        setEffect: '你造成普攻伤害时有 2% 概率释放先祖之力，造成 55524 伤害并震晕附近的敌人 1.5 秒。',
        attrs: [
            { tag: '重击', desc: '普攻使目标受到的治疗效果降低', range: '3.0-6.0%' },
            { tag: '威', desc: '普攻 3.0-6.0% 使目标移速和攻速 3 秒内降低 20%', range: '—' },
            { tag: '护佑', desc: '受到的持续性伤害降低', range: '3.0-6.0%' },
            { tag: '刚毅', desc: '昏迷抵抗率', range: '3.0-6.0%' },
            { tag: '魁梧', desc: '击退抵抗率', range: '3.0-6.0%' }
        ]
    }, {
        name: '震颤石',
        cost: '1000 洗炼石',
        setEffect: '受击时，有 2% 概率召唤雷电惩罚攻击者，并令其在原地麻痹定身。',
        attrs: [
            { tag: '灵巧', desc: '受到来自玩家的伤害降低', range: '0.5-1.0%' },
            { tag: '禅护', desc: '在控制类状态下受到的伤害降低', range: '2.0-4.0%' },
            { tag: '修行', desc: '致命抵抗率', range: '3.0-6.0%' },
            { tag: '仙法', desc: '增益状态持续时间增加', range: '1.5-3.0%' },
            { tag: '疾步', desc: '减速抵抗率', range: '3.0-6.0%' }
        ]
    }, {
        name: '戒律石',
        cost: '1000 洗炼石',
        setEffect: '你造成普攻伤害时有 2% 概率获得精神集中，使得在 1 秒内伤害提高 100%。',
        attrs: [
            { tag: '决心', desc: '急速', range: '1.0-2.0%' },
            { tag: '无情', desc: '对玩家造成的伤害提高', range: '0.5-1.5%' },
            { tag: '憎恨', desc: '对恶魔造成的伤害提高', range: '3.0-6.0%' },
            { tag: '狩猎', desc: '对控制类状态下的敌人伤害提高', range: '2.5-5.0%' },
            { tag: '戒律', desc: '对有护盾的目标造成的伤害提高', range: '3.0-6.0%' }
        ]
    }, {
        name: '屏障石',
        cost: '1000 洗炼石',
        setEffect: '受击时，有 2% 概率得到一个持续 6 秒的吸收伤害的护盾。',
        attrs: [
            { tag: '信仰', desc: '对亡灵造成的伤害提高', range: '3.0-6.0%' },
            { tag: '守护', desc: '最大生命', range: '0.5-1.0%' },
            { tag: '铁壁', desc: '附近的敌人对你的伤害减少', range: '1.0-2.0%' },
            { tag: '盾墙', desc: '格挡率', range: '1.0-2.0%' },
            { tag: '意志', desc: '恐惧抵抗率', range: '3.0-6.0%' }
        ]
    }, {
        name: '破坏石',
        cost: '1000 洗炼石',
        setEffect: '你击败敌人时，有 2% 概率引爆精魂。',
        attrs: [
            { tag: '研究', desc: '治疗药水的冷却时间减少', range: '1.0-2.0%' },
            { tag: '永生', desc: '生命恢复', range: '1.0-2.0%' },
            { tag: '诅咒', desc: '对精英敌人造成的伤害提高', range: '3.0-6.0%' },
            { tag: '石魔', desc: '你的召唤物造成的伤害提高', range: '2.0-4.0%' },
            { tag: '遗言', desc: '你的召唤物受到的伤害降低', range: '2.0-4.0%' }
        ]
    }];

    // 推荐方案数据
    var SCHEMES = [{
        name: 'PVE 戒律套',
        scene: '副本 · 输出',
        attrs: [
            '爆伤 3%',
            '增益时间延长 3%',
            '极速 2%',
            '对恶魔增伤 6%',
            '对控制状态下的敌人增伤 5%'
        ]
    }, {
        name: 'PVP 护盾套（生存）',
        scene: '玩家对战 · 生存',
        attrs: [
            '格挡 2%',
            '生命 1%',
            '附近敌人对你伤害减少 2%',
            '受到玩家伤害降低 1%',
            '对玩家增伤 1.5%'
        ]
    }, {
        name: 'PVP 全职业通用',
        scene: '玩家对战 · 通用',
        attrs: [
            '格挡 2%',
            '生命 1%',
            '增益时间延长 3%',
            '受到玩家伤害降低 1%',
            '对玩家增伤 1.5%'
        ]
    }, {
        name: 'PVP 戒律套（输出）',
        scene: '玩家对战 · 输出',
        attrs: [
            '对玩家增伤 1.5%',
            '对控制状态下的敌人增伤 5%',
            '对护盾状态下的敌人增伤 6%',
            '生命 1%',
            '增益时间延长 3%'
        ]
    }];

    // ================================================================
    //  渲染函数
    // ================================================================

    function renderStones() {
        var grid = document.getElementById('stoneGrid');
        var html = '';
        STONES.forEach(function(s) {
            html += '<div class="stone-card">';
            html += '<div class="stone-name">' + s.name + '</div>';
            html += '<div class="stone-cost">' + s.cost + '</div>';
            html += '<div class="set-effect"><span class="label">⚔️ 套装效果</span><br>' + s.setEffect + '</div>';
            html += '<ul class="attr-list">';
            s.attrs.forEach(function(a) {
                html += '<li><span class="tag">' + a.tag + '</span> ' + a.desc + ' <span class="range">' + a
                .range + '</span></li>';
            });
            html += '</ul>';
            html += '</div>';
        });
        grid.innerHTML = html;
    }

    function renderSchemes() {
        var grid = document.getElementById('schemeGrid');
        var html = '';
        SCHEMES.forEach(function(s) {
            html += '<div class="scheme-card">';
            html += '<div class="scheme-name">' + s.name + '</div>';
            html += '<div class="scheme-scene">🎯 ' + s.scene + '</div>';
            html += '<ul class="scheme-list">';
            s.attrs.forEach(function(a) {
                html += '<li>✦ ' + a + '</li>';
            });
            html += '</ul>';
            html += '</div>';
        });
        grid.innerHTML = html;
    }

    // ================================================================
    //  Tab 切换
    // ================================================================

    function switchTab(tab) {
        // 隐藏所有内容
        document.querySelectorAll('.tab-content').forEach(function(el) {
            el.classList.remove('active');
        });
        // 取消所有按钮激活状态
        document.querySelectorAll('.tab-btn').forEach(function(el) {
            el.classList.remove('active');
        });
        // 显示目标内容
        document.getElementById('tab-' + tab).classList.add('active');
        // 激活对应按钮
        var btns = document.querySelectorAll('.tab-btn');
        if (tab === 'tujian') {
            btns[0].classList.add('active');
        } else {
            btns[1].classList.add('active');
        }
    }

    // ================================================================
    //  初始化
    // ================================================================

    window.onload = function() {
        renderStones();
        renderSchemes();
    };
</script>

</body>
</html>
