<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>传奇宝石消耗计算</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0e14;
            background-image: radial-gradient(ellipse at 50% 0%, #1a212b 0%, #0b0e14 70%);
            color: #e0e6ed;
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            min-height: 100vh;
            padding: 12px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .wrap {
            max-width: 820px;
            width: 100%;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #2a3a4a;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .header img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid rgba(200, 169, 110, 0.3);
        }
        .header h1 {
            font-family: 'Cinzel', 'Times New Roman', serif;
            font-size: 20px;
            background: linear-gradient(135deg, #f6d365, #c8a96e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .sub {
            font-size: 12px;
            color: #7a8a9e;
            margin-left: auto;
        }

        .card {
            background: rgba(20, 25, 35, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid #2a3a4a;
            border-radius: 12px;
            padding: 18px 14px;
            margin-bottom: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .field {
            margin-bottom: 16px;
        }
        .field label {
            display: block;
            font-size: 13px;
            color: #9aabbf;
            margin-bottom: 4px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .field input,
        .field select {
            width: 100%;
            padding: 10px 12px;
            background: #0f161e;
            border: 1px solid #2a3a4a;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.2s;
            -webkit-appearance: none;
        }
        .field input:focus,
        .field select:focus {
            border-color: #c8a96e;
            box-shadow: 0 0 0 2px rgba(200, 169, 110, 0.12);
        }
        .field input::placeholder {
            color: #5a6a7e;
        }

        /* 单价输入行（带重置按钮） */
        .price-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .price-row input {
            flex: 1;
        }
        .price-row .reset-btn {
            padding: 10px 14px;
            background: #2a3a4a;
            border: none;
            border-radius: 8px;
            color: #e0e6ed;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.2s;
        }
        .price-row .reset-btn:active {
            transform: scale(0.95);
            background: #3a4a5a;
        }
        /* 五星宝石的提示 */
        .hint {
            font-size: 11px;
            color: #5a6a7e;
            margin-top: 4px;
        }
        .hint .star {
            color: #f6d365;
        }

        .calc-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #c8a96e, #f6d365);
            border: none;
            border-radius: 8px;
            color: #0b0e14;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
        }
        .calc-btn:active {
            transform: scale(0.97);
        }

        #result {
            margin-top: 16px;
            padding: 12px;
            background: #0f161e;
            border-radius: 8px;
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            color: #f6d365;
            border: 1px solid #2a3a4a;
        }
        #result .sub {
            font-size: 14px;
            font-weight: 400;
            color: #8a9aae;
            display: block;
            margin-bottom: 4px;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: #5a6a7e;
            font-size: 12px;
            text-decoration: none;
            transition: 0.2s;
            letter-spacing: 0.5px;
        }
        .back-link:hover {
            color: #c8a96e;
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 17px;
            }
            .header .sub {
                font-size: 10px;
                margin-left: 0;
                width: 100%;
            }
            .field input,
            .field select {
                font-size: 15px;
                padding: 8px 10px;
            }
            .price-row .reset-btn {
                padding: 8px 12px;
                font-size: 13px;
            }
            #result {
                font-size: 18px;
            }
        }
        @media (max-width: 380px) {
            .field input,
            .field select {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="wrap">

        <!-- 头部 -->
        <div class="header">
            <img src="../images/douyintouxiang.png" alt="头像">
            <h1>🔥 传奇宝石消耗计算</h1>
            <span class="sub">暗黑不朽 · 白金币模拟</span>
        </div>

        <!-- 计算卡片 -->
        <div class="card">
            <!-- 宝石星级 -->
            <div class="field">
                <label>宝石星级</label>
                <select id="gemStar">
                    <option value="1">⭐ 一星宝石</option>
                    <option value="2">⭐⭐ 二星宝石</option>
                    <option value="5" selected>⭐⭐⭐⭐⭐ 五星宝石</option>
                </select>
            </div>

            <!-- 宝石数量 -->
            <div class="field">
                <label>宝石数量（个）</label>
                <input type="number" id="gemCount" value="1" min="1" step="1">
            </div>

            <!-- 单价（自适应） -->
            <div class="field">
                <label id="priceLabel">单价（白金币 / 个）</label>
                <div class="price-row">
                    <input type="number" id="unitPrice" step="0.01" placeholder="请输入单价">
                    <button class="reset-btn" id="resetBtn" onclick="resetPrice()">重置默认</button>
                </div>
                <div class="hint" id="priceHint">💡 可清空输入框，自行填写任意金额</div>
            </div>

            <!-- 计算按钮 -->
            <button class="calc-btn" onclick="calculate()">计算总消耗</button>

            <!-- 结果 -->
            <div id="result">
                <span class="sub">总消耗</span>
                <span id="totalDisplay">0</span> 白金币
            </div>
        </div>

        <!-- 返回首页 -->
        <a href="index.html" class="back-link">🏠 返回首页</a>

    </div>

    <script>
        // ---------- 各星级默认单价 ----------
        const DEFAULT_PRICES = {
            1: 400,   // 一星：400
            2: 1600,  // 二星：1600
            5: null   // 五星：无默认值，需用户自行输入
        };

        // ---------- DOM 元素 ----------
        const starSelect = document.getElementById('gemStar');
        const countInput = document.getElementById('gemCount');
        const priceInput = document.getElementById('unitPrice');
        const priceLabel = document.getElementById('priceLabel');
        const priceHint = document.getElementById('priceHint');
        const resetBtn = document.getElementById('resetBtn');
        const totalDisplay = document.getElementById('totalDisplay');

        // ---------- 切换星级时更新单价输入框 ----------
        function updatePriceByStar() {
            const star = parseInt(starSelect.value);
            const defaultPrice = DEFAULT_PRICES[star];

            if (defaultPrice === null) {
                // 五星：清空输入框，提示用户输入
                priceInput.value = '';
                priceInput.placeholder = '请输入五星宝石单价';
                priceLabel.textContent = '单价（白金币 / 个）⭐ 自定义';
                priceHint.innerHTML = '💡 五星宝石无默认价格，请自行输入金额';
                resetBtn.style.display = 'none';  // 五星不显示重置按钮
            } else {
                // 一星 / 二星：填入默认值
                priceInput.value = defaultPrice;
                priceInput.placeholder = '请输入单价';
                priceLabel.textContent = '单价（白金币 / 个）';
                priceHint.innerHTML = '💡 可清空输入框，自行填写任意金额';
                resetBtn.style.display = 'inline-block';  // 显示重置按钮
            }

            // 自动重新计算
            calculate();
        }

        // ---------- 重置为默认单价（仅一星/二星可用） ----------
        function resetPrice() {
            const star = parseInt(starSelect.value);
            const defaultPrice = DEFAULT_PRICES[star];
            if (defaultPrice !== null) {
                priceInput.value = defaultPrice;
                calculate();
            }
        }

        // ---------- 计算总消耗 ----------
        function calculate() {
            const count = parseFloat(countInput.value) || 0;
            const price = parseFloat(priceInput.value);

            // 如果单价为空或非数字，视为 0
            let total = 0;
            if (!isNaN(count) && count >= 0 && !isNaN(price) && price >= 0) {
                total = count * price;
            }

            totalDisplay.textContent = total.toFixed(2);
        }

        // ---------- 绑定事件 ----------
        starSelect.addEventListener('change', updatePriceByStar);
        countInput.addEventListener('input', calculate);
        priceInput.addEventListener('input', calculate);

        // ---------- 页面加载时初始化 ----------
        window.addEventListener('DOMContentLoaded', function() {
            updatePriceByStar();  // 默认选中五星，单价为空
        });
    </script>
</body>
</html>
