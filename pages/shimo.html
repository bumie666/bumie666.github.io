<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>暗黑不灭 · 使魔特性查询</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0e14;
            background-image: radial-gradient(ellipse at 50% 0%, #1a212b 0%, #0b0e14 70%);
            color: #e0e6ed;
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            min-height: 100vh;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .page-wrap {
            max-width: 820px;
            width: 100%;
        }

        /* ===== 头部 ===== */
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #2a3a4a;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .header .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid rgba(200, 169, 110, 0.3);
            object-fit: cover;
            flex-shrink: 0;
        }
        .header .title-group {
            display: flex;
            align-items: baseline;
            gap: 8px;
            flex-wrap: wrap;
        }
        .header h1 {
            font-family: 'Cinzel', 'Times New Roman', serif;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #f6d365, #c8a96e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .sub {
            font-size: 13px;
            color: #7a8a9e;
            letter-spacing: 1px;
        }

        /* ===== 筛选栏 ===== */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
            background: rgba(20, 25, 35, 0.5);
            border-radius: 12px;
            padding: 12px 14px;
            border: 1px solid #2a3a4a;
        }
        .filter-bar .fg {
            flex: 1 1 0;
            min-width: 120px;
        }
        .filter-bar .fg label {
            display: block;
            font-size: 10px;
            font-weight: 600;
            color: #7a8a9e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 3px;
        }
        .filter-bar .fg select {
            width: 100%;
            padding: 8px 10px;
            background: #0f161e;
            border: 1px solid #2a3a4a;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            outline: none;
            cursor: pointer;
            -webkit-appearance: none;
            appearance: none;
            height: 38px;
        }
        .filter-bar .fg select:focus {
            border-color: #c8a96e;
        }
        .filter-bar .btn-reset {
            flex: 0 0 auto;
            padding: 8px 18px;
            background: #2a3a4a;
            border: none;
            border-radius: 8px;
            color: #e0e6ed;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            height: 38px;
            align-self: flex-end;
        }
        .filter-bar .btn-reset:hover {
            background: #3a4a5a;
        }

        /* ===== 统计 ===== */
        .stats {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .stats .item {
            background: #0f161e;
            border: 1px solid #2a3a4a;
            border-radius: 8px;
            padding: 4px 14px;
            text-align: center;
            flex: 1;
            min-width: 70px;
        }
        .stats .item .l {
            font-size: 9px;
            color: #7a8a9e;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .stats .item .v {
            font-size: 18px;
            font-weight: 700;
            color: #f6d365;
        }

        /* ===== 使魔卡片网格 ===== */
        .familiar-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .familiar-card {
            background: rgba(20, 25, 35, 0.75);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            border: 1px solid #2a3a4a;
            border-radius: 14px;
            padding: 16px 14px;
            transition: border-color 0.25s, transform 0.2s;
        }
        .familiar-card:hover {
            border-color: #c8a96e;
            transform: translateY(-2px);
        }
        .familiar-card .name {
            font-family: 'Cinzel', 'Times New Roman', serif;
            font-size: 17px;
            font-weight: 700;
            color: #f6d365;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }
        .familiar-card .attrs {
            font-size: 12px;
            color: #b0c4d9;
            margin-bottom: 6px;
        }
        .familiar-card .attrs .label {
            color: #7a8a9e;
            font-size: 11px;
        }
        .familiar-card .traits {
            display: flex;
            flex-wrap: wrap;
            gap: 4px 6px;
            margin-top: 6px;
        }
        .familiar-card .trait-tag {
            background: rgba(200, 169, 110, 0.08);
            border: 1px solid rgba(200, 169, 110, 0.15);
            border-radius: 20px;
            padding: 2px 10px;
            font-size: 11px;
            color: #c8a96e;
            transition: 0.2s;
            cursor: default;
        }
        .familiar-card .trait-tag:hover {
            background: rgba(200, 169, 110, 0.15);
        }
        .familiar-card .meta {
            display: flex;
            gap: 12px;
            margin-top: 8px;
            font-size: 12px;
            color: #7a8a9e;
            border-top: 1px solid rgba(42, 58, 74, 0.4);
            padding-top: 8px;
        }
        .familiar-card .meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .familiar-card .meta .val {
            color: #b0c4d9;
            font-weight: 500;
        }

        /* ===== 特性效果对照表（底部） ===== */
        .trait-reference {
            margin-top: 16px;
            background: rgba(20, 25, 35, 0.5);
            border: 1px solid #2a3a4a;
            border-radius: 12px;
            padding: 14px 16px;
        }
        .trait-reference .ref-title {
            font-family: 'Cinzel', 'Times New Roman', serif;
            font-size: 14px;
            color: #c8a96e;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .trait-reference .ref-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px 12px;
        }
        .trait-reference .ref-item {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: #b0c4d9;
            padding: 2px 0;
            border-bottom: 1px solid rgba(42, 58, 74, 0.2);
        }
        .trait-reference .ref-item .trait-name {
            color: #c8a96e;
        }
        .trait-reference .ref-item .trait-effect {
            color: #7a8a9e;
        }

        .no-result {
            text-align: center;
            color: #7a8a9e;
            padding: 30px 0;
            font-size: 15px;
            grid-column: 1 / -1;
        }
        .no-result .icon {
            font-size: 36px;
            display: block;
            margin-bottom: 8px;
        }

        /* ===== 底部 ===== */
        .back-link {
            display: block;
            text-align: center;
            margin-top: 18px;
            color: #5a6a7e;
            font-size: 13px;
            text-decoration: none;
            transition: 0.2s;
            letter-spacing: 0.5px;
        }
        .back-link:hover {
            color: #c8a96e;
        }
        .footer-note {
            font-size: 11px;
            color: #4a5a6e;
            text-align: center;
            margin-top: 12px;
            border-top: 1px solid #1e2c38;
            padding-top: 12px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 640px) {
            .familiar-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }
            .header h1 {
                font-size: 18px;
            }
            .header .sub {
                font-size: 11px;
            }
            .filter-bar .fg {
                min-width: 100px;
            }
            .filter-bar .fg select {
                font-size: 13px;
                height: 34px;
                padding: 6px 8px;
            }
            .filter-bar .btn-reset {
                font-size: 12px;
                height: 34px;
                padding: 6px 14px;
            }
            .familiar-card .name {
                font-size: 16px;
            }
            .trait-reference .ref-grid {
                grid-template-columns: 1fr;
            }
            .stats .item .v {
                font-size: 16px;
            }
        }
        @media (max-width: 400px) {
            .header .avatar {
                width: 32px;
                height: 32px;
            }
            .filter-bar .fg {
                min-width: 80px;
            }
            .filter-bar .fg select {
                font-size: 12px;
                height: 30px;
            }
            .filter-bar .btn-reset {
                font-size: 11px;
                height: 30px;
            }
            .familiar-card {
                padding: 12px 10px;
            }
            .familiar-card .name {
                font-size: 15px;
            }
            .familiar-card .trait-tag {
                font-size: 10px;
                padding: 1px 8px;
            }
        }
    </style>
</head>
<body>

<div class="page-wrap">

    <!-- 头部 -->
    <div class="header">
        <img src="../images/douyintouxiang.png" alt="头像" class="avatar">
        <div class="title-group">
            <h1>⚔️ 使魔特性查询</h1>
            <span class="sub">暗黑不灭 · 图鉴</span>
        </div>
    </div>

    <!-- 筛选栏 -->
    <div class="filter-bar">
        <div class="fg">
            <label>🎯 使魔</label>
            <select id="familiarFilter" onchange="applyFilter()">
                <option value="">全部使魔</option>
            </select>
        </div>
        <div class="fg">
            <label>⚡ 特性</label>
            <select id="traitFilter" onchange="applyFilter()">
                <option value="">全部特性</option>
            </select>
        </div>
        <button class="btn-reset" onclick="resetFilter()">重置</button>
    </div>

    <!-- 统计 -->
    <div class="stats">
        <div class="item"><div class="l">使魔总数</div><div class="v" id="totalCount">0</div></div>
        <div class="item"><div class="l">当前显示</div><div class="v" id="showCount">0</div></div>
        <div class="item"><div class="l">特性种类</div><div class="v" id="traitCount">0</div></div>
    </div>

    <!-- 卡片网格 -->
    <div class="familiar-grid" id="familiarGrid"></div>

    <!-- 特性效果对照表 -->
    <div class="trait-reference">
        <div class="ref-title">📋 特性效果对照</div>
        <div class="ref-grid" id="refGrid"></div>
    </div>

    <a href="https://ahbm8888.top" class="back-link">🏠 返回暗黑不朽百宝箱</a>
    <div class="footer-note">数据仅供参考 · 以游戏内为准</div>
</div>

<script>
    // ================================================================
    //  数据
    // ================================================================

    var FAMILIARS = [{
        name: '沙角',
        traits: ['狂牙利爪', '元素共鸣', '地狱之息', '野兽本性'],
        mainAttr: '力量',
        subAttr: '韧性'
    }, {
        name: '潮汐幻影',
        traits: ['元素共鸣', '天生领袖', '生存本能', '生生不息'],
        mainAttr: '力量',
        subAttr: '韧性'
    }, {
        name: '苍白之焰',
        traits: ['狂牙利爪', '天生领袖', '野兽本性', '生生不息'],
        mainAttr: '敏捷',
        subAttr: '魔力'
    }, {
        name: '风暴假面',
        traits: ['元素共鸣', '地狱之息', '满腔怒火', '生生不息'],
        mainAttr: '敏捷',
        subAttr: '魔力'
    }, {
        name: '乌鸟',
        traits: ['地狱之息', '生存本能', '满腔怒火', '生生不息'],
        mainAttr: '魔力',
        subAttr: '力量'
    }, {
        name: '影爪',
        traits: ['狂牙利爪', '天生领袖', '野兽本性', '满腔怒火'],
        mainAttr: '魔力',
        subAttr: '敏捷'
    }, {
        name: '荆棘猎手',
        traits: ['元素共鸣', '天生领袖', '生存本能', '满腔怒火'],
        mainAttr: '韧性',
        subAttr: '力量'
    }, {
        name: '石之御者',
        traits: ['元素共鸣', '天生领袖', '生存本能', '满腔怒火'],
        mainAttr: '韧性',
        subAttr: '敏捷'
    }, {
        name: '暮影猎灵',
        traits: ['狂牙利爪', '地狱之息', '生存本能', '野兽本性'],
        mainAttr: '韧性',
        subAttr: '敏捷'
    }];

    var TRAIT_EFFECTS = {
        '狂牙利爪': '暴击率',
        '元素共鸣': '技能伤害',
        '地狱之息': '玩家增伤',
        '野兽本性': '普攻增伤',
        '天生领袖': '玩家减伤',
        '生存本能': '生命提升',
        '生生不息': '伤害减免',
        '满腔怒火': '爆伤提升'
    };

    var ALL_TRAITS = Object.keys(TRAIT_EFFECTS);

    // ================================================================
    //  初始化
    // ================================================================

    window.onload = function() {
        var familiarSel = document.getElementById('familiarFilter');
        FAMILIARS.forEach(function(f) {
            var opt = document.createElement('option');
            opt.value = f.name;
            opt.textContent = f.name;
            familiarSel.appendChild(opt);
        });

        var traitSel = document.getElementById('traitFilter');
        ALL_TRAITS.forEach(function(t) {
            var opt = document.createElement('option');
            opt.value = t;
            opt.textContent = t + ' → ' + TRAIT_EFFECTS[t];
            traitSel.appendChild(opt);
        });

        renderReference();
        applyFilter();
    };

    // ================================================================
    //  渲染参考表
    // ================================================================

    function renderReference() {
        var grid = document.getElementById('refGrid');
        var html = '';
        ALL_TRAITS.forEach(function(t) {
            html += '<div class="ref-item">' +
                '<span class="trait-name">' + t + '</span>' +
                '<span class="trait-effect">' + TRAIT_EFFECTS[t] + '</span>' +
                '</div>';
        });
        grid.innerHTML = html;
    }

    // ================================================================
    //  筛选逻辑
    // ================================================================

    function applyFilter() {
        var familiarFilter = document.getElementById('familiarFilter').value;
        var traitFilter = document.getElementById('traitFilter').value;

        var filtered = FAMILIARS.filter(function(f) {
            var matchFamiliar = true;
            var matchTrait = true;
            if (familiarFilter) {
                matchFamiliar = f.name === familiarFilter;
            }
            if (traitFilter) {
                matchTrait = f.traits.indexOf(traitFilter) !== -1;
            }
            return matchFamiliar && matchTrait;
        });

        // 统计
        document.getElementById('totalCount').textContent = FAMILIARS.length;
        document.getElementById('showCount').textContent = filtered.length;
        document.getElementById('traitCount').textContent = ALL_TRAITS.length;

        // 渲染卡片
        var grid = document.getElementById('familiarGrid');
        if (filtered.length === 0) {
            grid.innerHTML = '<div class="no-result"><span class="icon">🔍</span>未找到匹配的使魔</div>';
            return;
        }

        var html = '';
        filtered.forEach(function(f) {
            var traitsHtml = f.traits.map(function(t) {
                return '<span class="trait-tag">' + t + '</span>';
            }).join('');
            html += '<div class="familiar-card">';
            html += '<div class="name">' + f.name + '</div>';
            html += '<div class="attrs"><span class="label">特性</span></div>';
            html += '<div class="traits">' + traitsHtml + '</div>';
            html += '<div class="meta">' +
                '<span>主属性 <span class="val">' + f.mainAttr + '</span></span>' +
                '<span>副属性 <span class="val">' + f.subAttr + '</span></span>' +
                '</div>';
            html += '</div>';
        });
        grid.innerHTML = html;
    }

    // ================================================================
    //  重置
    // ================================================================

    function resetFilter() {
        document.getElementById('familiarFilter').value = '';
        document.getElementById('traitFilter').value = '';
        applyFilter();
    }
</script>

</body>
</html>
