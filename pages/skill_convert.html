<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>恐惧词条转换</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0e14;
            color: #e0e6ed;
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            padding: 8px 6px;
            min-height: 100vh;
        }
        .wrap {
            max-width: 100%;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
            border-bottom: 1px solid #2a3a4a;
            margin-bottom: 8px;
        }
        .header img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid rgba(200, 169, 110, 0.3);
        }
        .header h1 {
            font-size: 16px;
            background: linear-gradient(135deg, #f6d365, #c8a96e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .sub {
            font-size: 10px;
            color: #7a8a9e;
            margin-left: 4px;
        }

        .card {
            background: rgba(20, 25, 35, 0.8);
            border: 1px solid #2a3a4a;
            border-radius: 10px;
            padding: 8px 6px;
            margin-bottom: 8px;
        }

        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 4px 4px;
            align-items: center;
        }
        .form-row .fg {
            flex: 1 1 auto;
            min-width: 60px;
            max-width: 130px;
        }
        .form-row .fg label {
            display: block;
            font-size: 9px;
            color: #7a8a9e;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 2px;
        }
        .form-row .fg select {
            width: 100%;
            padding: 4px 6px;
            background: #0f161e;
            border: 1px solid #2a3a4a;
            border-radius: 6px;
            color: #fff;
            font-size: 13px;
            height: 30px;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }
        .form-row .fg select:focus {
            border-color: #c8a96e;
        }
        .form-row .btn {
            flex: 0 0 auto;
            padding: 4px 14px;
            background: linear-gradient(135deg, #c8a96e, #f6d365);
            border: none;
            border-radius: 6px;
            color: #0b0e14;
            font-weight: 700;
            font-size: 13px;
            height: 30px;
            cursor: pointer;
        }
        .form-row .hint {
            font-size: 9px;
            color: #5a6a7e;
            white-space: nowrap;
            line-height: 30px;
        }

        .slot-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .slot-section {
            background: #0f161e;
            border: 1px solid #2a3a4a;
            border-radius: 8px;
            padding: 6px 8px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .slot-title {
            font-size: 14px;
            font-weight: 600;
            color: #c8a96e;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .skill-row {
            display: flex;
            align-items: center;
            padding: 4px 0;
            border-bottom: 1px solid #1a212b;
            font-size: 16px;
            transition: font-size 0.2s, background 0.2s;
        }
        .skill-row:last-child {
            border-bottom: none;
        }
        .skill-row .from-skill {
            flex: 1;
            text-align: left;
            color: #ffa94d;
            font-weight: 500;
        }
        .skill-row .arrow-icon {
            flex: 0 0 auto;
            margin: 0 10px;
            color: #7a8a9e;
            font-size: 13px;
        }
        .skill-row .to-skill {
            flex: 1;
            text-align: right;
            color: #4fc3f7;
            font-weight: 500;
        }

        .slot-section.matched {
            border-color: #c8a96e;
            box-shadow: 0 0 20px rgba(200, 169, 110, 0.08);
        }
        .slot-section.matched .slot-title {
            font-size: 16px;
            color: #f6d365;
        }
        .slot-section.matched .skill-row {
            font-size: 19px;
            padding: 5px 0;
        }
        .slot-section.matched .skill-row .arrow-icon {
            font-size: 15px;
        }

        .slot-section.unmatched .slot-title {
            opacity: 0.6;
        }
        .slot-section.unmatched .skill-row {
            opacity: 0.5;
        }

        .skill-row.hidden {
            display: none;
        }

        .no-result {
            text-align: center;
            color: #7a8a9e;
            padding: 16px 0;
            font-size: 13px;
            grid-column: 1 / -1;
        }

        .skill-desc-box {
            margin-top: 12px;
            padding: 12px 14px;
            background: #0f161e;
            border: 1px solid #2a3a4a;
            border-radius: 8px;
            border-left: 3px solid #c8a96e;
            display: none;
        }
        .skill-desc-box .desc-title {
            font-size: 13px;
            font-weight: 600;
            color: #f6d365;
            margin-bottom: 4px;
        }
        .skill-desc-box .desc-item {
            font-size: 14px;
            color: #d0d8e0;
            line-height: 1.6;
            padding: 2px 0;
        }
        .skill-desc-box .desc-item .desc-label {
            color: #ffa94d;
            font-weight: 500;
        }
        .skill-desc-box .desc-item .desc-label-to {
            color: #4fc3f7;
            font-weight: 500;
        }
        .skill-desc-box .desc-empty {
            font-size: 13px;
            color: #7a8a9e;
        }
        .skill-desc-box .desc-divider {
            border-top: 1px dashed #2a3a4a;
            margin: 6px 0;
        }

        .info {
            font-size: 10px;
            color: #7a8a9e;
            text-align: center;
            border-top: 1px dashed #2a3a4a;
            padding-top: 6px;
            margin-top: 6px;
        }
        .back {
            display: block;
            text-align: center;
            margin-top: 8px;
            color: #5a6a7e;
            font-size: 11px;
            text-decoration: none;
        }
        .back:hover {
            color: #c8a96e;
        }

        .lock-box {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 14, 20, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            padding: 20px;
        }
        .lock-box .inner {
            background: rgba(20, 25, 35, 0.9);
            border: 1px solid #2a3a4a;
            border-radius: 16px;
            padding: 24px 20px;
            max-width: 340px;
            width: 100%;
            text-align: center;
        }
        .lock-box .inner h2 {
            color: #f6d365;
            font-size: 18px;
            margin-bottom: 4px;
        }
        .lock-box .inner p {
            color: #7a8a9e;
            font-size: 12px;
            margin-bottom: 12px;
        }
        .lock-box .inner input {
            width: 100%;
            padding: 8px 12px;
            background: #0f161e;
            border: 1px solid #2a3a4a;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            text-align: center;
            letter-spacing: 4px;
            outline: none;
        }
        .lock-box .inner input:focus {
            border-color: #c8a96e;
        }
        .lock-box .inner button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: linear-gradient(135deg, #c8a96e, #f6d365);
            border: none;
            border-radius: 8px;
            color: #0b0e14;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
        }
        .lock-box .inner .err {
            color: #f87171;
            font-size: 12px;
            margin-top: 6px;
            min-height: 20px;
            opacity: 0;
        }

        @media (max-width: 480px) {
            .form-row {
                gap: 8px 6px;
            }
            .form-row .fg {
                min-width: 70px;
                max-width: 140px;
            }
            .form-row .fg select {
                font-size: 14px;
                height: 34px;
                padding: 4px 8px;
            }
            .form-row .btn {
                font-size: 14px;
                height: 34px;
                padding: 4px 16px;
            }
            .form-row .hint {
                font-size: 10px;
                line-height: 34px;
            }

            .slot-grid {
                grid-template-columns: 1fr 1fr;
                gap: 4px;
            }
            .slot-section {
                padding: 4px 5px;
                border-radius: 6px;
            }
            .slot-title {
                font-size: 12px;
            }
            .skill-row {
                font-size: 14px;
                padding: 3px 0;
            }
            .skill-row .arrow-icon {
                font-size: 11px;
                margin: 0 6px;
            }
            .slot-section.matched .slot-title {
                font-size: 14px;
            }
            .slot-section.matched .skill-row {
                font-size: 16px;
                padding: 4px 0;
            }
            .slot-section.matched .skill-row .arrow-icon {
                font-size: 13px;
            }
            .skill-desc-box .desc-item {
                font-size: 13px;
            }
        }

        @media (max-width: 380px) {
            .form-row .fg {
                min-width: 60px;
                max-width: 120px;
            }
            .form-row .fg select {
                font-size: 13px;
                height: 32px;
                padding: 3px 6px;
            }
            .form-row .btn {
                font-size: 13px;
                height: 32px;
                padding: 3px 12px;
            }
            .slot-grid {
                gap: 3px;
            }
            .slot-section {
                padding: 3px 4px;
            }
            .slot-title {
                font-size: 11px;
            }
            .skill-row {
                font-size: 12px;
                padding: 2px 0;
            }
            .slot-section.matched .slot-title {
                font-size: 13px;
            }
            .slot-section.matched .skill-row {
                font-size: 14px;
            }
            .skill-desc-box .desc-item {
                font-size: 12px;
            }
        }
    </style>
</head>

    <div class="lock-box" id="lockScreen">

            <h2>🔐 工具已加密</h2>
            <p>请输入访问密码</p>
            <input type="password" id="lockInput" placeholder="密码" maxlength="20" autofocus>
            <button id="lockBtn">解锁</button>
            <div class="err" id="lockError">❌ 密码错误</div>
        </div>
    </div>

    <div class="wrap">

        </div>

        <div class="card">
            <div class="form-row">
                <div class="fg"><label>当前</label><select id="classFrom" onchange="updateFrom()"></select></div>
                <div class="fg"><label>目标</label><select id="classTo" onchange="updateTo()"></select></div>
                <div class="fg"><label>当前技能</label><select id="skillFrom"><option value="">全部</option></select></div>
                <div class="fg"><label>目标技能</label><select id="skillTo"><option value="">全部</option></select></div>
                <button class="btn" onclick="calc()">查询</button>
                <span class="hint">组合筛选</span>
            </div>
        </div>

        <div id="resultArea" style="display:none;">
            <div class="card" style="padding:6px 4px;">
                <div class="slot-grid" id="tableContainer"></div>

                <div class="skill-desc-box" id="skillDescBox">
                    <div class="desc-title" id="descTitle">📖 技能效果</div>
                    <div id="descContent"></div>
                </div>

                <div class="info" id="infoNote">💡 选择技能后，仅显示匹配的技能行</div>
            </div>
        </div>

        <a href="https://bumie666.github.io" class="back">🏠 返回暗黑の不灭</a>
    </div>

    <script>
        // ----- 密码锁 -----
        (function() {
            var pw = '666888';
            var screen = document.getElementById('lockScreen');
            var input = document.getElementById('lockInput');
            var btn = document.getElementById('lockBtn');
            var err = document.getElementById('lockError');
            if (sessionStorage.getItem('skill_unlocked') === 'true') {
                screen.style.display = 'none';
                return;
            }

            function unlock() {
                if (input.value.trim() === pw) {
                    sessionStorage.setItem('skill_unlocked', 'true');
                    screen.style.display = 'none';
                    err.style.opacity = '0';
                } else {
                    err.style.opacity = '1';
                    input.value = '';
                    input.focus();
                    input.style.borderColor = '#f87171';
                    setTimeout(function() { input.style.borderColor = ''; }, 500);
                }
            }
            btn.addEventListener('click', unlock);
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') { e.preventDefault();
                    unlock(); }
            });
            input.focus();
        })();

        var KEYS = Object.keys(DATA);

        function getSkills(cls) {
            var s = [],
                seen = {};
            KEYS.forEach(function(k) {
                var v = DATA[k][cls];
                if (v && v !== '—' && !seen[v]) { seen[v] = 1;
                    s.push(v); }
            });
            return s;
        }

        function buildAllData(from, to) {
            var map = {};
            SLOTS.forEach(function(s) { map[s] = []; });
            KEYS.forEach(function(k) {
                var fs = DATA[k][from] || '—',
                    ts = DATA[k][to] || '—';
                if (fs === '—' || ts === '—') return;
                var parts = k.split('_');
                parts.forEach(function(p) {
                    var slot = p.replace('_2', '');
                    if (SLOTS.indexOf(slot) !== -1) {
                        var exists = map[slot].some(function(item) { return item.fs === fs && item.ts === ts; });
                        if (!exists) map[slot].push({ fs: fs, ts: ts });
                    }
                });
            });
            return map;
        }

        // ================================================================
        //  核心计算 + 同时显示两个技能描述
        // ================================================================

        function calc() {
            var from = document.getElementById('classFrom').value,
                to = document.getElementById('classTo').value;
            var fFrom = document.getElementById('skillFrom').value,
                fTo = document.getElementById('skillTo').value;
            if (from === to) { alert('当前职业和目标职业不能相同！'); return; }

            var fullMap = buildAllData(from, to);

            var matchedCount = 0;
            var displayItems = [];
            var order = ['头盔', '衣服', '肩膀', '裤子', '主手', '副手'];

            order.forEach(function(slot) {
                var list = fullMap[slot] || [];
                var hasMatch = false;
                var filteredList = [];

                if (fFrom || fTo) {
                    list.forEach(function(pair) {
                        var match = true;
                        if (fFrom && pair.fs !== fFrom) match = false;
                        if (fTo && pair.ts !== fTo) match = false;
                        if (match) {
                            hasMatch = true;
                            filteredList.push(pair);
                        }
                    });
                } else {
                    filteredList = list;
                    hasMatch = list.length > 0;
                }

                if (hasMatch) matchedCount++;
                displayItems.push({
                    slot: slot,
                    list: filteredList,
                    hasMatch: hasMatch,
                    totalCount: list.length
                });
            });

            document.getElementById('resultArea').style.display = 'block';

            var container = document.getElementById('tableContainer');
            container.innerHTML = '';

            var hasAny = displayItems.some(function(item) { return item.list.length > 0; });
            if (!hasAny) {
                container.innerHTML = '<div class="no-result">🔍 未找到任何匹配的技能映射</div>';
                document.getElementById('infoNote').textContent = '💡 ' + from + ' → ' + to + '：无匹配技能。';
                document.getElementById('skillDescBox').style.display = 'none';
                return;
            }

            // 收集所有匹配的技能对（用于描述）
            var matchedPairs = [];
            displayItems.forEach(function(item) {
                item.list.forEach(function(pair) {
                    matchedPairs.push(pair);
                });
            });

            // 去重（避免重复显示相同的描述）
            var uniquePairs = [];
            var seenPairs = {};
            matchedPairs.forEach(function(pair) {
                var key = pair.fs + '||' + pair.ts;
                if (!seenPairs[key]) {
                    seenPairs[key] = true;
                    uniquePairs.push(pair);
                }
            });

            displayItems.forEach(function(item) {
                var sec = document.createElement('div');
                sec.className = 'slot-section';

                if (item.hasMatch && (fFrom || fTo)) {
                    sec.classList.add('matched');
                } else {
                    sec.classList.add('unmatched');
                }

                var title = document.createElement('div');
                title.className = 'slot-title';
                // 去掉 ✅，只显示部位名称
                title.textContent = '📌 ' + item.slot;
                sec.appendChild(title);

                if (item.list.length === 0) {
                    var emptyRow = document.createElement('div');
                    emptyRow.className = 'skill-row';
                    emptyRow.style.justifyContent = 'center';
                    emptyRow.style.color = '#5a6a7e';
                    emptyRow.style.fontSize = '10px';
                    emptyRow.style.opacity = '0.5';
                    emptyRow.textContent = '— 无匹配 —';
                    sec.appendChild(emptyRow);
                } else {
                    item.list.forEach(function(pair) {
                        var row = document.createElement('div');
                        row.className = 'skill-row';
                        row.innerHTML =
                            '<span class="from-skill">' + pair.fs + '</span>' +
                            '<span class="arrow-icon">→</span>' +
                            '<span class="to-skill">' + pair.ts + '</span>';
                        sec.appendChild(row);
                    });
                }

                container.appendChild(sec);
            });

            // ============================================================
            //  显示技能描述：同时显示当前职业和目标职业
            // ============================================================
            var descBox = document.getElementById('skillDescBox');
            var descContent = document.getElementById('descContent');
            var descTitle = document.getElementById('descTitle');

            if (uniquePairs.length > 0 && (fFrom || fTo)) {
                descBox.style.display = 'block';
                descTitle.textContent = '📖 技能效果';

                var html = '';
                uniquePairs.forEach(function(pair) {
                    // 当前职业（from）描述
                    var fromKey = from + '_' + pair.fs;
                    var fromDesc = SKILL_DESC[fromKey];
                    if (fromDesc) {
                        html += '<div class="desc-item"><span class="desc-label">【' + from + '】' + pair.fs +
                            '</span><br>' + fromDesc + '</div>';
                    } else {
                        html += '<div class="desc-item"><span class="desc-label">【' + from + '】' + pair.fs +
                            '</span><br><span style="color:#f87171;">⚠️ 暂无描述</span></div>';
                    }

                    // 分隔线
                    html += '<div class="desc-divider"></div>';

                    // 目标职业（to）描述
                    var toKey = to + '_' + pair.ts;
                    var toDesc = SKILL_DESC[toKey];
                    if (toDesc) {
                        html += '<div class="desc-item"><span class="desc-label-to">【' + to + '】' + pair.ts +
                            '</span><br>' + toDesc + '</div>';
                    } else {
                        html += '<div class="desc-item"><span class="desc-label-to">【' + to + '】' + pair.ts +
                            '</span><br><span style="color:#f87171;">⚠️ 暂无描述</span></div>';
                    }

                    html += '<div class="desc-divider"></div>';
                });

                // 去掉最后一个多余的分隔线
                html = html.replace(/<div class="desc-divider"><\/div>$/, '');
                descContent.innerHTML = html;
            } else {
                descBox.style.display = 'none';
            }

            document.getElementById('infoNote').textContent = '💡 ' + from + ' → ' + to + '：共 ' + displayItems.length +
                ' 个部位。';
        }
    </script>
</body>
</html>
