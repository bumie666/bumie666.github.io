<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>恐惧词条转换</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e14;
            --bg-secondary: #151e27;
            --bg-card: rgba(20, 25, 35, 0.80);
            --border-color: #2a3a4a;
            --border-glow: #c8a96e;
            --gold: #c8a96e;
            --gold-light: #f6d365;
            --gold-gradient: linear-gradient(135deg, #c8a96e, #f6d365);
            --text-primary: #e8edf4;
            --text-secondary: #8a9aae;
            --text-muted: #5a6a7e;
            --font-display: 'Cinzel', 'Times New Roman', serif;
            --font-body: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-image: 
                linear-gradient(rgba(10, 14, 20, 0.80), rgba(10, 14, 20, 0.88)),
                url('../images/beijingtu.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-primary);
            font-family: var(--font-body);
            min-height: 100vh;
            padding: 12px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .page-wrap {
            max-width: 1100px;
            width: 100%;
        }

        /* ----- 头部：头像 + 标题 ----- */
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 0 6px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .header .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid rgba(200, 169, 110, 0.3);
            object-fit: cover;
            flex-shrink: 0;
        }
        .header .title-group {
            display: flex;
            align-items: baseline;
            gap: 8px;
            flex-wrap: wrap;
        }
        .header h1 {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 20px;
            letter-spacing: 2px;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }
        .header .sub {
            font-size: 13px;
            color: var(--text-secondary);
            letter-spacing: 1px;
        }

        /* ----- 卡片 ----- */
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 12px 14px;
            margin-bottom: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        /* ----- 表单：左右排列 ----- */
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 10px;
            align-items: flex-end;
        }
        .form-row .form-group {
            flex: 1 1 auto;
            min-width: 80px;
            max-width: 160px;
        }
        .form-row .form-group label {
            display: block;
            font-size: 10px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 2px;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }
        .form-row .form-group select {
            width: 100%;
            padding: 6px 8px;
            background: #0f161e;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            outline: none;
            transition: 0.2s;
            -webkit-appearance: none;
            appearance: none;
            cursor: pointer;
            height: 32px;
        }
        .form-row .form-group select:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 2px rgba(200, 169, 110, 0.12);
        }
        .form-row .form-group select option {
            background: #1a212b;
        }
        .form-row .form-group-btn {
            flex: 0 0 auto;
            display: flex;
            align-items: flex-end;
        }
        .form-row .form-group-btn .calc-btn {
            padding: 6px 18px;
            background: var(--gold-gradient);
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            color: #0b0e14;
            cursor: pointer;
            transition: 0.2s;
            font-family: var(--font-display);
            letter-spacing: 1px;
            height: 32px;
            line-height: 1;
        }
        .form-row .form-group-btn .calc-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 16px rgba(200, 169, 110, 0.25);
        }
        .form-row .form-group-btn .calc-btn:active {
            transform: scale(0.97);
        }
        .form-row .filter-hint {
            font-size: 10px;
            color: var(--text-muted);
            line-height: 32px;
            padding-left: 4px;
            white-space: nowrap;
        }

        /* ----- 汇总 ----- */
        .result-grid-summary {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
        }
        .summary-item {
            background: #0f161e;
            border-radius: 10px;
            padding: 6px 4px;
            text-align: center;
            border: 1px solid var(--border-color);
        }
        .summary-item .label {
            font-size: 9px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .summary-item .value {
            font-size: 16px;
            font-weight: 700;
            color: var(--gold-light);
        }
        .summary-item .value.green { color: #5fcb9a; }

        /* ----- 表格样式（关键修改） ----- */
        .table-wrap {
            overflow-x: auto;
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }
        .result-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            min-width: 280px;
        }
        .result-table th {
            background: #1a212b;
            color: var(--gold);
            font-weight: 600;
            padding: 8px 10px;
            text-align: left;
            border-bottom: 2px solid var(--border-color);
            font-family: var(--font-display);
            letter-spacing: 0.5px;
        }
        .result-table th:first-child {
            border-right: 1px solid var(--border-color);
        }
        .result-table td {
            padding: 6px 10px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
        }
        .result-table td:first-child {
            border-right: 1px solid var(--border-color);
            color: #f6d365;
            font-weight: 500;
        }
        .result-table td:last-child {
            color: #6cb4ee;
            font-weight: 500;
        }
        .result-table tr:last-child td {
            border-bottom: none;
        }
        .result-table tr:hover td {
            background: rgba(200, 169, 110, 0.04);
        }
        .result-table .highlight-row td {
            background: rgba(200, 169, 110, 0.08);
        }
        .result-table .empty-row td {
            color: var(--text-muted);
            text-align: center;
            padding: 20px 0;
            border-right: none;
        }

        /* 无结果 */
        .no-result {
            text-align: center;
            color: var(--text-muted);
            padding: 20px 0;
            font-size: 14px;
        }
        .no-result .icon {
            font-size: 28px;
            display: block;
            margin-bottom: 4px;
        }

        /* ----- 底部 ----- */
        .info-note {
            color: var(--text-secondary);
            font-size: 11px;
            margin-top: 8px;
            text-align: center;
            border-top: 1px dashed var(--border-color);
            padding-top: 8px;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 12px;
            color: var(--text-muted);
            font-size: 12px;
            text-decoration: none;
            transition: 0.2s;
            letter-spacing: 0.5px;
        }
        .back-link:hover {
            color: var(--gold);
        }

        /* 每个部位单独的小标题 */
        .slot-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--gold);
            padding: 10px 10px 4px 10px;
            border-bottom: 1px solid var(--border-color);
            margin-top: 4px;
        }
        .slot-title:first-of-type {
            margin-top: 0;
        }

        /* ----- 响应式 ----- */
        @media (max-width: 640px) {
            .header h1 { font-size: 17px; }
            .header .sub { font-size: 11px; }
            .header .avatar { width: 32px; height: 32px; }
            .form-row .form-group { min-width: 60px; max-width: 120px; }
            .form-row .form-group select { font-size: 11px; padding: 4px 4px; height: 28px; }
            .form-row .form-group-btn .calc-btn { font-size: 12px; height: 28px; padding: 4px 12px; }
            .form-row { gap: 4px 6px; }
            .result-table { font-size: 12px; }
            .result-table th, .result-table td { padding: 4px 6px; }
            .slot-title { font-size: 11px; padding: 6px 6px 2px 6px; }
        }
        @media (max-width: 420px) {
            .form-row .form-group { flex: 1 1 100%; max-width: 100%; }
            .form-row .filter-hint { display: none; }
            .result-table { font-size: 11px; }
            .result-table th, .result-table td { padding: 3px 4px; }
        }
        @media (min-width: 641px) {
            .header h1 { font-size: 26px; }
            .header .sub { font-size: 14px; }
            .header .avatar { width: 48px; height: 48px; }
        }
    </style>
</head>
<body>

    <!-- ===== 密码锁 ===== -->
    <div id="lockScreen" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(10,14,20,0.93);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;padding:20px;transition:opacity 0.4s ease;overflow:hidden;">
        <div style="background:var(--bg-card);border:1px solid var(--border-color);border-radius:20px;padding:28px 22px 24px;max-width:360px;width:100%;text-align:center;box-shadow:0 16px 48px rgba(0,0,0,0.6);">
            <span style="font-size:36px;display:block;margin-bottom:6px;">🔐</span>
            <h2 style="font-family:var(--font-display);font-size:18px;color:var(--gold-light);letter-spacing:1px;margin-bottom:4px;">工具已加密</h2>
            <p style="font-size:12px;color:var(--text-secondary);margin-bottom:14px;">请输入访问密码</p>
            <input type="password" id="lockInput" placeholder="密码" maxlength="20" autofocus style="width:100%;padding:8px 12px;background:#0f161e;border:1px solid var(--border-color);border-radius:10px;color:#fff;font-size:16px;font-weight:600;text-align:center;letter-spacing:6px;outline:none;transition:0.2s;">
            <button id="lockBtn" style="width:100%;padding:10px;margin-top:10px;background:var(--gold-gradient);border:none;border-radius:10px;font-size:15px;font-weight:700;color:#0b0e14;cursor:pointer;transition:0.2s;font-family:var(--font-display);letter-spacing:1px;">解锁</button>
            <div id="lockError" style="color:#f87171;font-size:12px;margin-top:8px;min-height:20px;opacity:0;transition:opacity 0.3s;">❌ 密码错误</div>
        </div>

    <!-- ===== 主内容 ===== -->
    <div class="page-wrap">

        <div class="header">
            <img src="../images/douyintouxiang.png" alt="头像" class="avatar">
            <div class="title-group">
                <h1>⚔️ 恐惧词条转换</h1>

        <div class="card">
            <div class="form-row">
                <div class="form-group">
                    <label>⚔️ 当前</label>
                    <select id="classFrom" onchange="updateFromSkills()"></select>
                </div>
                <div class="form-group">
                    <label>🎯 目标</label>
                    <select id="classTo" onchange="updateToSkills()"></select>
                </div>
                <div class="form-group">
                    <label>🔍 当前技能</label>

                <div class="form-group">

                <div class="summary-item"><div class="label">筛选</div><div class="value" id="filterDisplay" style="font-size:13px;">全部</div></div>

        <a href="https://bumie666.github.io" class="back-link">🏠 返回暗黑の不灭</a>
    </div>

        (function() {
            var CORRECT_PASSWORD = '666888';
            var lockScreen = document.getElementById('lockScreen');
            var lockInput = document.getElementById('lockInput');
            var lockBtn = document.getElementById('lockBtn');
            var lockError = document.getElementById('lockError');

            if (sessionStorage.getItem('skill_convert_unlocked') === 'true') {
                lockScreen.style.display = 'none';
                lockInput.disabled = true;

            function unlock() {
                var inputVal = lockInput.value.trim();
                if (inputVal === CORRECT_PASSWORD) {
                    sessionStorage.setItem('skill_convert_unlocked', 'true');
                    lockScreen.style.display = 'none';
                    lockInput.disabled = true;
                    lockError.style.opacity = '0';
                } else {
                    lockError.style.opacity = '1';
                    lockInput.value = '';
                    lockInput.focus();
                    lockInput.style.borderColor = '#f87171';
                    setTimeout(function() { lockInput.style.borderColor = ''; }, 500);
                }
            }
            lockBtn.addEventListener('click', unlock);
            lockInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') { e.preventDefault(); unlock(); }

            lockInput.focus();

        function getSkillsForClass(cls) {
            var skills = [], seen = {};
            for (var key in RAW_DATA) {
                var skill = RAW_DATA[key][cls];
                if (skill && skill !== '—' && !seen[skill]) { seen[skill] = true; skills.push(skill); }
            }
            return skills;
        }

        function buildSlotData(fromCls, toCls, filterFrom, filterTo) {
            var slotMap = {};
            SLOT_NAMES.forEach(function(s) { slotMap[s] = []; });
            for (var key in RAW_DATA) {
                var entry = RAW_DATA[key], fromSkill = entry[fromCls] || '—', toSkill = entry[toCls] || '—';
                if (fromSkill === '—' || toSkill === '—') continue;
                if (filterFrom && fromSkill !== filterFrom) continue;
                if (filterTo && toSkill !== filterTo) continue;
                var parts = key.split('_');
                parts.forEach(function(p) {
                    var slotName = p.replace('_2', '');
                    if (SLOT_NAMES.indexOf(slotName) !== -1) {
                        var exists = slotMap[slotName].some(function(item) {
                            return item.fromSkill === fromSkill && item.toSkill === toSkill;
                        });
                        if (!exists) slotMap[slotName].push({ fromSkill: fromSkill, toSkill: toSkill });
                    }
                });
            }
            return slotMap;
        }

        window.onload = function() {
            var fromSel = document.getElementById('classFrom'), toSel = document.getElementById('classTo');
            CLASSES.forEach(function(cls) {
                var o1 = document.createElement('option'); o1.value = cls; o1.textContent = cls; fromSel.appendChild(o1);
                var o2 = document.createElement('option'); o2.value = cls; o2.textContent = cls; toSel.appendChild(o2);
            });
            fromSel.value = '野蛮人'; toSel.value = '法师';
            updateFromSkills(); updateToSkills(); calculate();
        };

        function updateFromSkills() {
            var cls = document.getElementById('classFrom').value, sel = document.getElementById('skillFrom'), cur = sel.value;
            sel.innerHTML = '<option value="">全部</option>';
            getSkillsForClass(cls).forEach(function(s) {
                var o = document.createElement('option'); o.value = s; o.textContent = s; sel.appendChild(o);
            });
            var exists = false; for (var i = 0; i < sel.options.length; i++) { if (sel.options[i].value === cur) { exists = true; break; } }
            if (exists) sel.value = cur;
        }

        function updateToSkills() {
            var cls = document.getElementById('classTo').value, sel = document.getElementById('skillTo'), cur = sel.value;
            sel.innerHTML = '<option value="">全部</option>';
            getSkillsForClass(cls).forEach(function(s) {
                var o = document.createElement('option'); o.value = s; o.textContent = s; sel.appendChild(o);
            });
            var exists = false; for (var i = 0; i < sel.options.length; i++) { if (sel.options[i].value === cur) { exists = true; break; } }
            if (exists) sel.value = cur;
        }

        function calculate() {
            var fromCls = document.getElementById('classFrom').value, toCls = document.getElementById('classTo').value;
            var filterFrom = document.getElementById('skillFrom').value, filterTo = document.getElementById('skillTo').value;
            if (fromCls === toCls) { alert('当前职业和目标职业不能相同！'); return; }
            var slotData = buildSlotData(fromCls, toCls, filterFrom, filterTo);
            
            var totalSlots = 0, totalMatches = 0;
            var displaySlots = [];
            SLOT_NAMES.forEach(function(slot) {
                var items = slotData[slot] || [];
                if (items.length > 0) { totalSlots++; totalMatches += items.length; displaySlots.push({ slot: slot, items: items }); }
            });

            document.getElementById('resultArea').style.display = 'block';
            document.getElementById('totalSlots').textContent = totalSlots;
            document.getElementById('totalMatches').textContent = totalMatches;
            var fd = '';
            if (filterFrom && filterTo) fd = filterFrom + ' → ' + filterTo;
            else if (filterFrom) fd = '当前:' + filterFrom;
            else if (filterTo) fd = '目标:' + filterTo;
            else fd = '全部';
            document.getElementById('filterDisplay').textContent = fd;

            var container = document.getElementById('tableContainer');
            container.innerHTML = '';

            if (displaySlots.length === 0) {
                container.innerHTML = '<div class="no-result"><span class="icon">🔍</span><div>未找到匹配的技能转换</div></div>';
                document.getElementById('infoNote').textContent = '💡 ' + fromCls + ' → ' + toCls + '：未找到可转换的恐惧词条。';
                return;
            }

            // 按部位生成表格
            displaySlots.forEach(function(item, index) {
                // 部位标题
                var title = document.createElement('div');
                title.className = 'slot-title';
                title.textContent = '📌 ' + item.slot + '（' + item.items.length + ' 个）';
                container.appendChild(title);

                // 表格
                var wrap = document.createElement('div');
                wrap.className = 'table-wrap';

                var table = document.createElement('table');
                table.className = 'result-table';

                // 表头
                var thead = document.createElement('thead');
                var trHead = document.createElement('tr');
                trHead.innerHTML = '<th>' + fromCls + '</th><th>' + toCls + '</th>';
                thead.appendChild(trHead);
                table.appendChild(thead);

                // 表体
                var tbody = document.createElement('tbody');
                item.items.forEach(function(pair) {
                    var tr = document.createElement('tr');
                    var isH = (filterFrom && filterTo && pair.fromSkill === filterFrom && pair.toSkill === filterTo);
                    if (isH) tr.className = 'highlight-row';
                    tr.innerHTML = '<td>' + pair.fromSkill + '</td><td>' + pair.toSkill + '</td>';
                    tbody.appendChild(tr);
                });
                table.appendChild(tbody);
                wrap.appendChild(table);
                container.appendChild(wrap);
            });

            document.getElementById('infoNote').textContent = '💡 ' + fromCls + ' → ' + toCls + '：' + totalSlots + ' 个部位，' + totalMatches + ' 个技能可转换。';
        }
    </script>
</body>
</html>
