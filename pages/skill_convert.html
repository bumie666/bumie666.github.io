<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>技能词条转换 · 双技能匹配</title>
    <style>
        /* ===== 全局重置 & 基础 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0e14;
            color: #e0e6ed;
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            padding: 8px 6px;
            min-height: 100vh;
        }
        .wrap {
            max-width: 100%;
        }

        /* ===== 头部 ===== */
        .header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
            border-bottom: 1px solid #2a3a4a;
            margin-bottom: 8px;
        }
        .header img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid rgba(200, 169, 110, 0.3);
        }
        .header h1 {
            font-size: 16px;
            background: linear-gradient(135deg, #f6d365, #c8a96e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .sub {
            font-size: 10px;
            color: #7a8a9e;
            margin-left: 4px;
        }
        .header .badge {
            font-size: 9px;
            background: #c8a96e22;
            color: #c8a96e;
            border: 1px solid #c8a96e44;
            border-radius: 12px;
            padding: 0 8px;
            line-height: 18px;
            margin-left: auto;
            white-space: nowrap;
        }

        /* ===== 卡片 ===== */
        .card {
            background: rgba(20, 25, 35, 0.8);
            border: 1px solid #2a3a4a;
            border-radius: 10px;
            padding: 8px 6px;
            margin-bottom: 8px;
        }

        /* ===== 筛选表单 ===== */
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 4px 4px;
            align-items: center;
        }
        .form-row .fg {
            flex: 1 1 auto;
            min-width: 60px;
            max-width: 130px;
        }
        .form-row .fg label {
            display: block;
            font-size: 9px;
            color: #7a8a9e;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 2px;
        }
        .form-row .fg select {
            width: 100%;
            padding: 4px 6px;
            background: #0f161e;
            border: 1px solid #2a3a4a;
            border-radius: 6px;
            color: #fff;
            font-size: 13px;
            height: 30px;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-row .fg select:focus {
            border-color: #c8a96e;
        }
        .form-row .fg select.required {
            border-color: #f6d365;
            box-shadow: 0 0 0 1px rgba(200, 169, 110, 0.25);
        }

        .form-row .btn {
            flex: 0 0 auto;
            padding: 4px 14px;
            background: linear-gradient(135deg, #c8a96e, #f6d365);
            border: none;
            border-radius: 6px;
            color: #0b0e14;
            font-weight: 700;
            font-size: 13px;
            height: 30px;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .form-row .btn:active {
            transform: scale(0.95);
        }
        .form-row .btn-match {
            background: linear-gradient(135deg, #4fc3f7, #29b6f6);
            color: #0b0e14;
        }
        .form-row .btn-match:active {
            transform: scale(0.95);
        }
        .form-row .hint {
            font-size: 9px;
            color: #5a6a7e;
            white-space: nowrap;
            line-height: 30px;
        }

        /* ===== 双技能匹配模式切换 ===== */
        .mode-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 0;
            border-bottom: 1px solid #1a212b;
            margin-bottom: 6px;
            flex-wrap: wrap;
        }
        .mode-toggle .label {
            font-size: 11px;
            color: #7a8a9e;
            font-weight: 500;
        }
        .mode-toggle .switch {
            position: relative;
            width: 40px;
            height: 22px;
            background: #1a2530;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.3s;
            flex: 0 0 40px;
            border: 1px solid #2a3a4a;
        }
        .mode-toggle .switch.active {
            background: #c8a96e;
            border-color: #c8a96e;
        }
        .mode-toggle .switch .knob {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.3s;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
        }
        .mode-toggle .switch.active .knob {
            transform: translateX(18px);
            background: #0b0e14;
        }
        .mode-toggle .status {
            font-size: 11px;
            color: #7a8a9e;
            font-weight: 500;
        }
        .mode-toggle .status.active {
            color: #f6d365;
        }
        .mode-toggle .clear-btn {
            font-size: 10px;
            color: #7a8a9e;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0 6px;
            text-decoration: underline;
            opacity: 0.6;
            transition: opacity 0.2s;
        }
        .mode-toggle .clear-btn:hover {
            opacity: 1;
            color: #f6d365;
        }
        .mode-toggle .badge-match {
            font-size: 9px;
            background: #4fc3f722;
            color: #4fc3f7;
            border: 1px solid #4fc3f744;
            border-radius: 12px;
            padding: 0 8px;
            line-height: 18px;
            display: none;
        }
        .mode-toggle .badge-match.show {
            display: inline-block;
        }

        /* ===== 技能网格 ===== */
        .slot-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
        }

        .slot-section {
            background: #0f161e;
            border: 1px solid #2a3a4a;
            border-radius: 8px;
            padding: 6px 8px;
            transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
            position: relative;
        }
        .slot-section .slot-badge {
            position: absolute;
            top: -1px;
            right: 8px;
            font-size: 8px;
            background: #2a3a4a;
            color: #7a8a9e;
            padding: 0 6px;
            border-radius: 0 0 6px 6px;
            line-height: 16px;
            letter-spacing: 0.3px;
        }
        .slot-title {
            font-size: 14px;
            font-weight: 600;
            color: #c8a96e;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        /* ===== 技能行 ===== */
        .skill-row {
            display: flex;
            align-items: center;
            padding: 4px 0;
            border-bottom: 1px solid #1a212b;
            font-size: 16px;
            transition: font-size 0.2s, background 0.2s;
        }
        .skill-row:last-child {
            border-bottom: none;
        }

        .from-skill,
        .to-skill {
            flex: 1;
            font-weight: 500;
            cursor: pointer;
            position: relative;
            transition: color 0.15s, text-shadow 0.15s;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            border-radius: 4px;
            padding: 0 2px;
        }
        .from-skill {
            text-align: left;
            color: #ffa94d;
        }
        .to-skill {
            text-align: right;
            color: #4fc3f7;
        }

        .from-skill:hover,
        .to-skill:hover {
            text-shadow: 0 0 12px rgba(255, 169, 77, 0.25);
        }
        .from-skill:hover {
            color: #ffc107;
        }
        .to-skill:hover {
            color: #81d4fa;
        }
        .from-skill:active,
        .to-skill:active {
            transform: scale(0.96);
        }

        .skill-info-icon {
            display: inline-block;
            font-size: 0.6em;
            margin-left: 4px;
            opacity: 0.4;
            transition: opacity 0.2s;
            vertical-align: middle;
            line-height: 1;
        }
        .from-skill:hover .skill-info-icon,
        .to-skill:hover .skill-info-icon {
            opacity: 0.9;
        }

        .arrow-icon {
            flex: 0 0 auto;
            margin: 0 10px;
            color: #7a8a9e;
            font-size: 13px;
        }

        /* ===== 高亮匹配 ===== */
        .slot-section.matched {
            border-color: #c8a96e;
            box-shadow: 0 0 20px rgba(200, 169, 110, 0.08);
            background: rgba(200, 169, 110, 0.04);
        }
        .slot-section.matched .slot-title {
            font-size: 16px;
            color: #f6d365;
        }
        .slot-section.matched .skill-row {
            font-size: 19px;
            padding: 5px 0;
        }
        .slot-section.matched .arrow-icon {
            font-size: 15px;
        }

        .slot-section.unmatched .slot-title {
            opacity: 0.6;
        }
        .slot-section.unmatched .skill-row {
            opacity: 0.5;
        }
        .slot-section.unmatched .from-skill,
        .slot-section.unmatched .to-skill {
            cursor: default;
            opacity: 0.7;
        }
        .slot-section.unmatched .from-skill:hover,
        .slot-section.unmatched .to-skill:hover {
            text-shadow: none;
            color: inherit;
        }
        .slot-section.unmatched .skill-info-icon {
            opacity: 0.2;
        }

        .no-result {
            text-align: center;
            color: #7a8a9e;
            padding: 16px 0;
            font-size: 13px;
            grid-column: 1 / -1;
        }

        /* ===== 技能描述区域 (双技能并排) ===== */
        .skill-desc-box {
            margin-top: 12px;
            padding: 12px 14px;
            background: #0f161e;
            border: 1px solid #2a3a4a;
            border-radius: 8px;
            border-left: 3px solid #c8a96e;
            display: none;
        }
        .skill-desc-box .desc-title {
            font-size: 13px;
            font-weight: 600;
            color: #f6d365;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .skill-desc-box .desc-title .desc-tag {
            font-size: 10px;
            background: #1a2530;
            color: #7a8a9e;
            padding: 0 10px;
            border-radius: 10px;
            line-height: 20px;
            font-weight: 400;
        }
        .skill-desc-box .desc-title .desc-tag.active {
            color: #f6d365;
            border: 1px solid #c8a96e44;
        }

        .desc-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .desc-col {
            background: #0a0e14;
            border-radius: 6px;
            padding: 8px 10px;
            border: 1px solid #1a212b;
        }
        .desc-col .desc-col-title {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
            padding-bottom: 4px;
            border-bottom: 1px solid #1a212b;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .desc-col .desc-col-title .dc-from {
            color: #ffa94d;
        }
        .desc-col .desc-col-title .dc-to {
            color: #4fc3f7;
        }
        .desc-col .desc-col-title .dc-slot {
            font-size: 9px;
            color: #7a8a9e;
            font-weight: 400;
        }
        .desc-col .desc-col-body {
            font-size: 13px;
            color: #d0d8e0;
            line-height: 1.7;
            word-break: break-word;
        }
        .desc-col .desc-col-body .highlight-number {
            color: #5fcb9a;
            font-weight: 600;
        }
        .desc-col .desc-col-body .empty-desc {
            color: #7a8a9e;
            font-style: italic;
        }
        .desc-divider {
            border-top: 1px dashed #2a3a4a;
            margin: 6px 0;
        }

        .info {
            font-size: 10px;
            color: #7a8a9e;
            text-align: center;
            border-top: 1px dashed #2a3a4a;
            padding-top: 6px;
            margin-top: 6px;
        }
        .back {
            display: block;
            text-align: center;
            margin-top: 8px;
            color: #5a6a7e;
            font-size: 11px;
            text-decoration: none;
        }
        .back:hover {
            color: #c8a96e;
        }

        /* ================================================================
              悬浮窗 (Tooltip)
              ================================================================ */
        #tooltip-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 999;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            display: none;
            animation: overlayFadeIn 0.2s ease;
        }
        @keyframes overlayFadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        #tooltip {
            position: fixed;
            z-index: 1000;
            max-width: 380px;
            width: 90%;
            background: #141c26;
            border: 1px solid #3a4a5a;
            border-radius: 14px;
            padding: 18px 20px 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(200, 169, 110, 0.15);
            color: #e0e6ed;
            font-size: 14px;
            line-height: 1.6;
            transition: opacity 0.15s ease, transform 0.15s ease;
            display: none;
            transform-origin: top left;
            pointer-events: auto;
        }
        #tooltip.show {
            display: block;
            animation: tooltipPop 0.18s cubic-bezier(0.22, 1, 0.36, 1);
        }
        @keyframes tooltipPop {
            from {
                opacity: 0;
                transform: scale(0.92) translateY(4px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        #tooltip .tooltip-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 8px;
            border-bottom: 1px solid #2a3a4a;
            padding-bottom: 8px;
        }
        #tooltip .tooltip-title {
            font-size: 16px;
            font-weight: 700;
            color: #f6d365;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        #tooltip .tooltip-title .tt-class {
            font-size: 12px;
            font-weight: 400;
            color: #7a8a9e;
            background: #1a2530;
            padding: 0 8px;
            border-radius: 12px;
            line-height: 22px;
        }
        #tooltip .tooltip-title .tt-skill {
            color: #ffa94d;
        }
        #tooltip .tooltip-title .tt-skill.to-skill-tt {
            color: #4fc3f7;
        }

        #tooltip .tooltip-close {
            flex: 0 0 28px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #1a2530;
            border: none;
            color: #7a8a9e;
            font-size: 18px;
            line-height: 28px;
            text-align: center;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            font-weight: 300;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #tooltip .tooltip-close:hover {
            background: #2a3a4a;
            color: #f6d365;
        }

        #tooltip .tooltip-body {
            color: #d0d8e0;
            font-size: 14px;
            line-height: 1.7;
            word-break: break-word;
        }
        #tooltip .tooltip-body .highlight-number {
            color: #5fcb9a;
            font-weight: 600;
        }
        #tooltip .tooltip-body .tt-desc-empty {
            color: #7a8a9e;
            font-style: italic;
        }

        #tooltip .tooltip-arrow {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #141c26;
            border-left: 1px solid #3a4a5a;
            border-top: 1px solid #3a4a5a;
            transform: rotate(45deg);
            pointer-events: none;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 600px) {
            .desc-grid {
                grid-template-columns: 1fr;
                gap: 8px;
            }
        }

        @media (max-width: 480px) {
            .form-row {
                gap: 8px 6px;
            }
            .form-row .fg {
                min-width: 70px;
                max-width: 140px;
            }
            .form-row .fg select {
                font-size: 14px;
                height: 34px;
                padding: 4px 8px;
            }
            .form-row .btn {
                font-size: 14px;
                height: 34px;
                padding: 4px 16px;
            }
            .form-row .hint {
                font-size: 10px;
                line-height: 34px;
            }

            .slot-grid {
                grid-template-columns: 1fr 1fr;
                gap: 4px;
            }
            .slot-section {
                padding: 4px 5px;
                border-radius: 6px;
            }
            .slot-title {
                font-size: 12px;
            }
            .skill-row {
                font-size: 14px;
                padding: 3px 0;
            }
            .arrow-icon {
                font-size: 11px;
                margin: 0 6px;
            }
            .slot-section.matched .slot-title {
                font-size: 14px;
            }
            .slot-section.matched .skill-row {
                font-size: 16px;
                padding: 4px 0;
            }
            .slot-section.matched .arrow-icon {
                font-size: 13px;
            }

            #tooltip {
                max-width: 92%;
                padding: 14px 16px 12px;
                font-size: 13px;
            }
            #tooltip .tooltip-title {
                font-size: 15px;
            }

            .desc-col .desc-col-body {
                font-size: 12px;
            }
            .mode-toggle .label {
                font-size: 10px;
            }
            .mode-toggle .switch {
                width: 34px;
                height: 20px;
            }
            .mode-toggle .switch .knob {
                width: 14px;
                height: 14px;
            }
            .mode-toggle .switch.active .knob {
                transform: translateX(14px);
            }
            .header .badge {
                font-size: 8px;
                padding: 0 6px;
                line-height: 16px;
            }
        }

        @media (max-width: 380px) {
            .form-row .fg {
                min-width: 60px;
                max-width: 120px;
            }
            .form-row .fg select {
                font-size: 13px;
                height: 32px;
                padding: 3px 6px;
            }
            .form-row .btn {
                font-size: 13px;
                height: 32px;
                padding: 3px 12px;
            }
            .slot-grid {
                gap: 3px;
            }
            .slot-section {
                padding: 3px 4px;
            }
            .slot-title {
                font-size: 11px;
            }
            .skill-row {
                font-size: 12px;
                padding: 2px 0;
            }
            .slot-section.matched .slot-title {
                font-size: 13px;
            }
            .slot-section.matched .skill-row {
                font-size: 14px;
            }

            #tooltip {
                padding: 12px 14px 10px;
                font-size: 12px;
            }
            #tooltip .tooltip-title {
                font-size: 13px;
            }
            .desc-col .desc-col-body {
                font-size: 11px;
            }
        }

        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #0f161e;
        }
        ::-webkit-scrollbar-thumb {
            background: #2a3a4a;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3a4a5a;
        }
    </style>
</head>
<body>

    <div class="wrap">

        <!-- ===== 头部 ===== -->
        <div class="header">
            <img src="../images/douyintouxiang.png" alt="头像">
            <h1>⚔️ 技能词条转换</h1>
            <span class="sub">暗黑不灭 · 双技能匹配</span>
            <span class="badge" id="modeBadge">🔍 双技能模式</span>
        </div>

        <!-- ===== 筛选栏 ===== -->
        <div class="card">
            <!-- 模式切换 -->
            <div class="mode-toggle">
                <span class="label">🎯 双技能匹配</span>
                <div class="switch" id="modeSwitch" onclick="toggleMatchMode()">
                    <div class="knob"></div>
                </div>
                <span class="status" id="modeStatus">关闭</span>
                <span class="badge-match" id="matchBadge">⚡ 已匹配</span>
                <button class="clear-btn" onclick="clearFilters()">清空筛选</button>
            </div>

            <div class="form-row">
                <div class="fg"><label>当前职业</label><select id="classFrom" onchange="updateFrom()"></select></div>
                <div class="fg"><label>目标职业</label><select id="classTo" onchange="updateTo()"></select></div>
                <div class="fg" id="skillFromGroup"><label id="skillFromLabel">当前技能</label><select id="skillFrom"><option value="">全部</option></select></div>
                <div class="fg" id="skillToGroup"><label id="skillToLabel">目标技能</label><select id="skillTo"><option value="">全部</option></select></div>
                <button class="btn" onclick="calc()">查询</button>
                <button class="btn btn-match" id="matchBtn" onclick="doMatch()" style="display:none;">🔗 匹配</button>
                <span class="hint" id="filterHint">组合筛选</span>
            </div>
        </div>

        <!-- ===== 结果区域 ===== -->
        <div id="resultArea" style="display:none;">
            <div class="card" style="padding:6px 4px;">

                <!-- 技能网格 -->
                <div class="slot-grid" id="tableContainer"></div>

                <!-- 技能描述 (双技能并排) -->
                <div class="skill-desc-box" id="skillDescBox">
                    <div class="desc-title" id="descTitle">
                        📖 技能效果对比
                        <span class="desc-tag" id="descTagFrom">当前</span>
                        <span class="desc-tag" id="descTagTo">目标</span>
                        <span class="desc-tag active" id="descTagCount">0 对匹配</span>
                    </div>
                    <div class="desc-grid" id="descGrid"></div>
                </div>

        var KEYS = Object.keys(DATA);

        // ================================================================
        //  状态
        // ================================================================

        var matchMode = false; // 双技能匹配模式是否开启

        // ================================================================
        //  辅助函数
        // ================================================================

        function getSkills(cls) {
            var s = [],
                seen = {};
            KEYS.forEach(function(k) {
                var v = DATA[k][cls];
                if (v && v !== '—' && !seen[v]) { seen[v] = 1;
                    s.push(v); }
            });
            return s;
        }

        function buildAllData(from, to) {
            var map = {};
            SLOTS.forEach(function(s) { map[s] = []; });
            KEYS.forEach(function(k) {
                var fs = DATA[k][from] || '—',
                    ts = DATA[k][to] || '—';
                if (fs === '—' || ts === '—') return;
                var parts = k.split('_');
                parts.forEach(function(p) {
                    var slot = p.replace('_2', '');
                    if (SLOTS.indexOf(slot) !== -1) {
                        var exists = map[slot].some(function(item) { return item.fs === fs && item.ts === ts; });
                        if (!exists) map[slot].push({ fs: fs, ts: ts });
                    }
                });
            });
            return map;
        }

        function highlightNumbers(text) {
            if (!text) return text;
            return text.replace(/(\d+(?:\.\d+)?%?)/g, '<span class="highlight-number">$1</span>');
        }

        function getDesc(cls, skill) {
            var key = cls + '_' + skill;
            return SKILL_DESC[key] || null;
        }

        // ================================================================
        //  悬浮窗 (Tooltip) 逻辑
        // ================================================================

        var tooltipEl = document.getElementById('tooltip');
        var overlayEl = document.getElementById('tooltip-overlay');
        var ttClass = document.getElementById('ttClass');
        var ttSkill = document.getElementById('ttSkill');
        var ttBody = document.getElementById('ttBody');
        var ttClose = document.getElementById('ttClose');
        var ttArrow = document.getElementById('ttArrow');

        var tooltipVisible = false;

        function showTooltip(e, className, skillName) {
            var key = className + '_' + skillName;
            var desc = SKILL_DESC[key] || null;

            ttClass.textContent = className;
            ttSkill.textContent = skillName;
            ttSkill.className = 'tt-skill';
            var side = e.target ? e.target.dataset.side : 'from';
            if (side === 'to') {
                ttSkill.classList.add('to-skill-tt');
            } else {
                ttSkill.classList.remove('to-skill-tt');
            }

            if (desc) {
                ttBody.innerHTML = highlightNumbers(desc);
            } else {
                ttBody.innerHTML = '<span class="tt-desc-empty">📭 暂无技能描述</span>';
            }

            var rect = e.target ? e.target.getBoundingClientRect() : null;
            if (rect) {
                var x = rect.left + rect.width / 2;
                var y = rect.top - 8;

                tooltipEl.style.display = 'block';
                tooltipEl.style.opacity = '0';
                tooltipEl.style.visibility = 'hidden';

                var tw = tooltipEl.offsetWidth || 320;
                var th = tooltipEl.offsetHeight || 200;
                var vw = window.innerWidth;
                var vh = window.innerHeight;

                var left = x - tw / 2;
                var top = y - th - 12;

                if (left < 12) left = 12;
                if (left + tw > vw - 12) left = vw - tw - 12;

                if (top < 12) {
                    top = y + rect.height + 12;
                }
                if (top + th > vh - 12) {
                    top = vh - th - 12;
                }
                if (top < 12) top = 12;

                tooltipEl.style.left = left + 'px';
                tooltipEl.style.top = top + 'px';

                var arrowX = x - left;
                var isBelow = (top > y + rect.height);
                if (isBelow) {
                    ttArrow.style.top = '-6px';
                    ttArrow.style.bottom = 'auto';
                    ttArrow.style.borderLeft = '1px solid #3a4a5a';
                    ttArrow.style.borderTop = '1px solid #3a4a5a';
                    ttArrow.style.borderRight = 'none';
                    ttArrow.style.borderBottom = 'none';
                } else {
                    ttArrow.style.bottom = '-6px';
                    ttArrow.style.top = 'auto';
                    ttArrow.style.borderRight = '1px solid #3a4a5a';
                    ttArrow.style.borderBottom = '1px solid #3a4a5a';
                    ttArrow.style.borderLeft = 'none';
                    ttArrow.style.borderTop = 'none';
                }
                var arrowLeft = Math.min(Math.max(arrowX - 6, 16), tw - 28);
                ttArrow.style.left = arrowLeft + 'px';
                ttArrow.style.right = 'auto';

                tooltipEl.style.opacity = '1';
                tooltipEl.style.visibility = 'visible';
                tooltipEl.classList.add('show');
                overlayEl.style.display = 'block';
                tooltipVisible = true;
            } else {
                tooltipEl.style.left = '50%';
                tooltipEl.style.top = '50%';
                tooltipEl.style.transform = 'translate(-50%, -50%)';
                tooltipEl.style.opacity = '1';
                tooltipEl.style.visibility = 'visible';
                tooltipEl.classList.add('show');
                overlayEl.style.display = 'block';
                tooltipVisible = true;
                ttArrow.style.display = 'none';
            }
        }

        function hideTooltip() {
            tooltipEl.classList.remove('show');
            tooltipEl.style.opacity = '0';
            tooltipEl.style.visibility = 'hidden';
            tooltipEl.style.display = 'none';
            overlayEl.style.display = 'none';
            tooltipVisible = false;
            ttArrow.style.display = 'block';
        }

        ttClose.addEventListener('click', function(e) {
            e.stopPropagation();
            hideTooltip();
        });
        overlayEl.addEventListener('click', function() { hideTooltip(); });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && tooltipVisible) hideTooltip();
        });
        window.addEventListener('resize', function() { if (tooltipVisible) hideTooltip(); });
        window.addEventListener('scroll', function() { if (tooltipVisible) hideTooltip(); });

        // ================================================================
        //  UI 初始化 & 计算
        // ================================================================

        window.onload = function() {
            var fromSel = document.getElementById('classFrom'),
                toSel = document.getElementById('classTo');
            CLASSES.forEach(function(c) {
                var o1 = document.createElement('option');
                o1.value = c;
                o1.textContent = c;
                fromSel.appendChild(o1);
                var o2 = document.createElement('option');
                o2.value = c;
                o2.textContent = c;
                toSel.appendChild(o2);
            });
            fromSel.value = '野蛮人';
            toSel.value = '法师';
            updateFrom();
            updateTo();
            calc();
            updateModeUI();
        };

        function updateFrom() {
            var cls = document.getElementById('classFrom').value;
            var selFrom = document.getElementById('skillFrom');
            var selTo = document.getElementById('skillTo');
            var curFrom = selFrom.value;
            var curTo = selTo.value;

            // 重新填充两个下拉框（如果匹配模式，都用当前职业的技能）
            var skillList = getSkills(cls);
            var populate = function(sel, curVal) {
                sel.innerHTML = '<option value="">全部</option>';
                skillList.forEach(function(s) {
                    var o = document.createElement('option');
                    o.value = s;
                    o.textContent = s;
                    sel.appendChild(o);
                });
                var found = false;
                for (var i = 0; i < sel.options.length; i++) { if (sel.options[i].value === curVal) { found = true; break; } }
                if (found) sel.value = curVal;
            };

            populate(selFrom, curFrom);
            // 在匹配模式下，两个下拉框都用当前职业技能
            if (matchMode) {
                populate(selTo, curTo);
            } else {
                // 非匹配模式，目标技能下拉框填充目标职业的技能（由updateTo处理）
                // 但这里可能被调用，需要恢复目标职业技能列表
                var toCls = document.getElementById('classTo').value;
                var toSkillList = getSkills(toCls);
                var curToVal = selTo.value;
                selTo.innerHTML = '<option value="">全部</option>';
                toSkillList.forEach(function(s) {
                    var o = document.createElement('option');
                    o.value = s;
                    o.textContent = s;
                    selTo.appendChild(o);
                });
                var foundTo = false;
                for (var i = 0; i < selTo.options.length; i++) { if (selTo.options[i].value === curToVal) { foundTo = true; break; } }
                if (foundTo) selTo.value = curToVal;
            }

            // 更新标签
            updateLabels();
        }

        function updateTo() {
            if (matchMode) {
                // 匹配模式下，目标职业切换时，两个下拉框都使用当前职业的技能（因为都是当前技能）
                updateFrom();
                return;
            }
            var cls = document.getElementById('classTo').value,
                sel = document.getElementById('skillTo'),
                cur = sel.value;
            sel.innerHTML = '<option value="">全部</option>';
            getSkills(cls).forEach(function(s) {
                var o = document.createElement('option');
                o.value = s;
                o.textContent = s;
                sel.appendChild(o);
            });
            var found = false;
            for (var i = 0; i < sel.options.length; i++) { if (sel.options[i].value === cur) { found = true; break; } }
            if (found) sel.value = cur;
        }

        function toggleMatchMode() {
            matchMode = !matchMode;
            updateModeUI();
            // 切换时刷新下拉框
            updateFrom();
            updateTo();
            if (matchMode) {
                doMatch();
            } else {
                calc();
            }
        }

        function updateModeUI() {
            var sw = document.getElementById('modeSwitch');
            var st = document.getElementById('modeStatus');
            var badge = document.getElementById('matchBadge');
            var matchBtn = document.getElementById('matchBtn');
            var fSel = document.getElementById('skillFrom');

            if (matchMode) {
                sw.classList.add('active');

                document.getElementById('skillFromLabel').textContent = '技能 1';
                document.getElementById('skillToLabel').textContent = '技能 2';

                sw.classList.remove('active');
                st.textContent = '关闭';
                st.classList.remove('active');
                badge.classList.remove('show');
                matchBtn.style.display = 'none';
                fSel.classList.remove('required');
                tSel.classList.remove('required');
                document.getElementById('filterHint').textContent = '组合筛选 (可选)';

                document.getElementById('skillFromLabel').textContent = '当前技能';
                document.getElementById('skillToLabel').textContent = '目标技能';
            }
        }

        function updateLabels() {
            // 由updateFrom和updateTo调用
            if (matchMode) {
                document.getElementById('skillFromLabel').textContent = '技能 1';
                document.getElementById('skillToLabel').textContent = '技能 2';
            } else {
                document.getElementById('skillFromLabel').textContent = '当前技能';
                document.getElementById('skillToLabel').textContent = '目标技能';
            }
        }

        function clearFilters() {
            document.getElementById('skillFrom').value = '';
            document.getElementById('skillTo').value = '';
            if (matchMode) {
                doMatch();
            } else {
                calc();
            }
        }

        // ================================================================
        //  核心计算 (支持双技能匹配)
        // ================================================================

        function doMatch() {
            // 双技能匹配：选择两个当前技能
            var from = document.getElementById('classFrom').value;
            var to = document.getElementById('classTo').value;
            var fFrom = document.getElementById('skillFrom').value;
            var fTo = document.getElementById('skillTo').value; // 此时是当前技能2

            if (from === to) { alert('当前职业和目标职业不能相同！'); return; }
            if (!fFrom || !fTo) {
                alert('⚠️ 双技能匹配模式需要同时选择两个当前技能！');
                return;
            }

            performCalc(from, to, fFrom, fTo, true);
        }

        function calc() {
            var from = document.getElementById('classFrom').value;
            var to = document.getElementById('classTo').value;
            var fFrom = document.getElementById('skillFrom').value;
            var fTo = document.getElementById('skillTo').value;

            if (from === to) { alert('当前职业和目标职业不能相同！'); return; }

            if (matchMode) {
                // 匹配模式下，两个都必须是当前技能，所以如果只选了一个，提示
                if (!fFrom || !fTo) {
                    alert('⚠️ 双技能匹配模式需要同时选择两个当前技能！');
                    return;
                }
                performCalc(from, to, fFrom, fTo, true);
            } else {
                // 普通模式：fFrom是当前技能，fTo是目标技能（或空）
                performCalc(from, to, fFrom, fTo, false);
            }
        }

        function performCalc(from, to, fFrom, fTo, isMatchMode) {
            var fullMap = buildAllData(from, to);

            var displayItems = [];
            var order = ['头盔', '衣服', '肩膀', '裤子', '主手', '副手'];

            order.forEach(function(slot) {
                var list = fullMap[slot] || [];
                var filteredList = [];

                if (isMatchMode) {
                    // 匹配模式：筛选当前技能为 fFrom 或 fTo 的行（或关系）
                    if (fFrom && fTo) {
                        list.forEach(function(pair) {
                            if (pair.fs === fFrom || pair.fs === fTo) {
                                filteredList.push(pair);
                            }
                        });
                    } else if (fFrom) {
                        list.forEach(function(pair) {
                            if (pair.fs === fFrom) filteredList.push(pair);
                        });
                    } else if (fTo) {
                        list.forEach(function(pair) {
                            if (pair.fs === fTo) filteredList.push(pair);
                        });
                    } else {
                        filteredList = list;
                    }
                } else {
                    // 普通模式：筛选当前技能和目标技能（与关系）
                    list.forEach(function(pair) {
                        var match = true;
                        if (fFrom && pair.fs !== fFrom) match = false;
                        if (fTo && pair.ts !== fTo) match = false;
                        if (match) filteredList.push(pair);
                    });
                }

                displayItems.push({
                    slot: slot,
                    list: filteredList,
                    hasMatch: filteredList.length > 0,
                    totalCount: list.length
                });
            });

            document.getElementById('resultArea').style.display = 'block';

            var container = document.getElementById('tableContainer');
            container.innerHTML = '';

            var hasAny = displayItems.some(function(item) { return item.list.length > 0; });
            if (!hasAny) {
                var msg = '🔍 未找到任何匹配的技能映射';
                if (isMatchMode && fFrom && fTo) {
                    msg = '🔍 未找到「' + fFrom + '」或「' + fTo + '」在目标职业中的映射';
                }
                container.innerHTML = '<div class="no-result">' + msg + '</div>';
                document.getElementById('infoNote').textContent = '💡 ' + from + ' → ' + to + '：无匹配技能。';
                document.getElementById('skillDescBox').style.display = 'none';
                return;
            }

            // 收集所有匹配的技能对
            var matchedPairs = [];
            displayItems.forEach(function(item) {
                item.list.forEach(function(pair) {
                    matchedPairs.push(pair);
                });
            });
            var uniquePairs = [];
            var seenPairs = {};
            matchedPairs.forEach(function(pair) {
                var key = pair.fs + '||' + pair.ts;
                if (!seenPairs[key]) {
                    seenPairs[key] = true;
                    uniquePairs.push(pair);
                }
            });

            // ---- 渲染网格 ----
            displayItems.forEach(function(item) {
                var sec = document.createElement('div');
                sec.className = 'slot-section';

                var isHighlight = item.list.length > 0 && (isMatchMode || fFrom || fTo);

                if (isHighlight) {
                    sec.classList.add('matched');
                } else {
                    sec.classList.add('unmatched');
                }

                var badge = document.createElement('span');
                badge.className = 'slot-badge';
                badge.textContent = item.list.length + ' 个';
                sec.appendChild(badge);

                var title = document.createElement('div');
                title.className = 'slot-title';
                title.textContent = '📌 ' + item.slot;
                sec.appendChild(title);

                if (item.list.length === 0) {
                    var emptyRow = document.createElement('div');
                    emptyRow.className = 'skill-row';
                    emptyRow.style.justifyContent = 'center';
                    emptyRow.style.color = '#5a6a7e';
                    emptyRow.style.fontSize = '10px';
                    emptyRow.style.opacity = '0.5';
                    emptyRow.textContent = '— 无匹配 —';
                    sec.appendChild(emptyRow);
                } else {
                    item.list.forEach(function(pair) {
                        var row = document.createElement('div');
                        row.className = 'skill-row';

                        var fromSpan = document.createElement('span');
                        fromSpan.className = 'from-skill';
                        fromSpan.textContent = pair.fs;
                        fromSpan.dataset.class = from;
                        fromSpan.dataset.skill = pair.fs;
                        fromSpan.dataset.side = 'from';
                        var icon1 = document.createElement('span');
                        icon1.className = 'skill-info-icon';
                        icon1.textContent = 'ℹ️';
                        fromSpan.appendChild(icon1);
                        fromSpan.addEventListener('click', function(e) {
                            e.stopPropagation();
                            showTooltip(e, this.dataset.class, this.dataset.skill);
                        });

                        var arrow = document.createElement('span');
                        arrow.className = 'arrow-icon';
                        arrow.textContent = '→';

                        var toSpan = document.createElement('span');
                        toSpan.className = 'to-skill';
                        toSpan.textContent = pair.ts;
                        toSpan.dataset.class = to;
                        toSpan.dataset.skill = pair.ts;
                        toSpan.dataset.side = 'to';
                        var icon2 = document.createElement('span');
                        icon2.className = 'skill-info-icon';
                        icon2.textContent = 'ℹ️';
                        toSpan.appendChild(icon2);
                        toSpan.addEventListener('click', function(e) {
                            e.stopPropagation();
                            showTooltip(e, this.dataset.class, this.dataset.skill);
                        });

                        row.appendChild(fromSpan);
                        row.appendChild(arrow);
                        row.appendChild(toSpan);
                        sec.appendChild(row);
                    });
                }

                container.appendChild(sec);
            });

            // ---- 双技能并排描述 ----
            var descBox = document.getElementById('skillDescBox');
            var descGrid = document.getElementById('descGrid');
            var descTagCount = document.getElementById('descTagCount');
            var descTagFrom = document.getElementById('descTagFrom');
            var descTagTo = document.getElementById('descTagTo');

            if (uniquePairs.length > 0) {
                descBox.style.display = 'block';
                descTagFrom.textContent = '【' + from + '】';
                descTagTo.textContent = '【' + to + '】';
                descTagCount.textContent = uniquePairs.length + ' 条映射';

                // 在匹配模式下，按当前技能分组
                var groupMap = {};
                if (isMatchMode && fFrom && fTo) {
                    // 分组
                    uniquePairs.forEach(function(pair) {
                        if (!groupMap[pair.fs]) groupMap[pair.fs] = [];
                        groupMap[pair.fs].push(pair);
                    });
                    // 生成描述：每个当前技能一组
                    var html = '';
                    var skill1 = fFrom,
                        skill2 = fTo;
                    var groups = [skill1, skill2];
                    groups.forEach(function(skill) {
                        var pairs = groupMap[skill] || [];
                        if (pairs.length === 0) {
                            // 如果某个技能没有映射，显示一条提示
                            html += '<div class="desc-col">';
                            html += '<div class="desc-col-title"><span class="dc-from">⬤ ' + skill +
                                '</span>  <span style="color:#7a8a9e;font-size:11px;">无映射</span></div>';
                            html += '<div class="desc-col-body"><span class="empty-desc">该技能在目标职业中未找到映射</span></div>';
                            html += '</div>';
                        } else {
                            // 显示该技能的所有映射目标技能（可能多个）
                            pairs.forEach(function(pair, idx) {
                                var fromDesc = getDesc(from, pair.fs);
                                var toDesc = getDesc(to, pair.ts);
                                html += '<div class="desc-col">';
                                html += '<div class="desc-col-title"><span class="dc-from">⬤ ' + pair.fs +
                                    '</span> → <span class="dc-to">' + pair.ts +
                                    '</span> <span class="dc-slot">(' + pairs.map(p => p.ts).join(', ') +
                                    ')</span></div>';
                                html += '<div class="desc-col-body">';
                                html += '<div style="font-size:11px;color:#7a8a9e;margin-bottom:2px;">【当前】</div>';
                                if (fromDesc) {
                                    html += highlightNumbers(fromDesc);
                                } else {
                                    html += '<span class="empty-desc">📭 暂无描述</span>';
                                }
                                html += '<div style="font-size:11px;color:#7a8a9e;margin:4px 0 2px;">【目标】</div>';
                                if (toDesc) {
                                    html += highlightNumbers(toDesc);
                                } else {
                                    html += '<span class="empty-desc">📭 暂无描述</span>';
                                }
                                html += '</div>';
                                html += '</div>';
                            });
                        }
                        // 加分隔线（除了最后）
                        html +=
                            '<div style="grid-column:1/-1;border-top:1px dashed #1a212b;margin:2px 0;"></div>';
                    });
                    // 移除最后的分隔线
                    html = html.replace(
                        /<div style="grid-column:1\/-1;border-top:1px dashed #1a212b;margin:2px 0;"><\/div>$/, '');
                    descGrid.innerHTML = html;
                } else {
                    // 普通模式：显示所有映射对
                    var html = '';
                    uniquePairs.forEach(function(pair) {
                        var fromDesc = getDesc(from, pair.fs);
                        var toDesc = getDesc(to, pair.ts);
                        html += '<div class="desc-col">';
                        html += '<div class="desc-col-title"><span class="dc-from">⬤ ' + pair.fs +
                            '</span> → <span class="dc-to">' + pair.ts + '</span></div>';
                        html += '<div class="desc-col-body">';
                        html += '<div style="font-size:11px;color:#7a8a9e;margin-bottom:2px;">【当前】</div>';
                        if (fromDesc) {
                            html += highlightNumbers(fromDesc);
                        } else {
                            html += '<span class="empty-desc">📭 暂无描述</span>';
                        }
                        html += '<div style="font-size:11px;color:#7a8a9e;margin:4px 0 2px;">【目标】</div>';
                        if (toDesc) {
                            html += highlightNumbers(toDesc);
                        } else {
                            html += '<span class="empty-desc">📭 暂无描述</span>';
                        }
                        html += '</div>';
                        html += '</div>';
                        html +=
                            '<div style="grid-column:1/-1;border-top:1px dashed #1a212b;margin:2px 0;"></div>';
                    });
                    html = html.replace(
                        /<div style="grid-column:1\/-1;border-top:1px dashed #1a212b;margin:2px 0;"><\/div>$/, '');
                    descGrid.innerHTML = html;
                }
            } else {
                descBox.style.display = 'none';
            }

            var infoText = '💡 ' + from + ' → ' + to + '：共 ' + displayItems.length + ' 个部位';
            if (isMatchMode && fFrom && fTo) {
                infoText += ' ｜ 匹配技能: 「' + fFrom + '」和「' + fTo + '」';
            } else if (fFrom || fTo) {
                var filters = [];
                if (fFrom) filters.push('当前: ' + fFrom);
                if (fTo) filters.push('目标: ' + fTo);
                infoText += ' ｜ 筛选: ' + filters.join(' + ');
            }
            infoText += ' ｜ 点击技能名称 ℹ️ 查看详细效果';
            document.getElementById('infoNote').textContent = infoText;
        }
    </script>

</body>
</html>
