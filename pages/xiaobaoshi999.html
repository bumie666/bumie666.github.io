<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>暗黑不灭 · 小宝石升级计算器</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e14;
            --bg-secondary: #151e27;
            --bg-card: rgba(20, 25, 35, 0.80);
            --border-color: #2a3a4a;
            --border-glow: #c8a96e;
            --gold: #c8a96e;
            --gold-light: #f6d365;
            --gold-gradient: linear-gradient(135deg, #c8a96e, #f6d365);
            --text-primary: #e8edf4;
            --text-secondary: #8a9aae;
            --text-muted: #5a6a7e;
            --font-display: 'Cinzel', 'Times New Roman', serif;
            --font-body: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--bg-primary);
            background-image: radial-gradient(ellipse at 50% 0%, #1a212b 0%, #0b0e14 70%);
            color: var(--text-primary);
            font-family: var(--font-body);
            min-height: 100vh;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .page-wrap {
            max-width: 880px;
            width: 100%;
        }
        .header {
            text-align: center;
            padding: 16px 0 10px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 18px;
        }
        .header h1 {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 26px;
            letter-spacing: 3px;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 20px rgba(200, 169, 110, 0.20);
        }
        .header .sub {
            color: var(--text-secondary);
            font-size: 13px;
            margin-top: 4px;
            letter-spacing: 1.5px;
            font-weight: 300;
        }
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 20px 16px;
            margin-bottom: 16px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
            transition: border-color 0.3s ease;
        }
        .card:hover {
            border-color: var(--border-glow);
        }

        /* ===== 桌面端表单 ===== */
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px 20px;
            margin-bottom: 16px;
        }
        .form-group {
            flex: 1 1 calc(50% - 20px);
            min-width: 140px;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 4px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .form-group select,
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            background: #0f161e;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            font-weight: 500;
            outline: none;
            transition: 0.2s;
            -webkit-appearance: none;
            appearance: none;
            cursor: pointer;
        }
        .form-group select:focus,
        .form-group input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(200, 169, 110, 0.15);
        }
        .form-group select option {
            background: #1a212b;
        }
        .form-group input[type="number"]::-webkit-inner-spin-button,
        .form-group input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .form-group input[type="number"] {
            -moz-appearance: textfield;
        }

        /* ===== 紧凑行（移动端专用） ===== */
        .form-row-compact {
            display: flex;
            gap: 6px;
            margin-bottom: 6px;
        }
        .form-group-compact {
            flex: 1;
            min-width: 0;
        }
        .form-group-compact label {
            display: block;
            font-size: 9px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 1px;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }
        .form-group-compact select,
        .form-group-compact input {
            width: 100%;
            padding: 5px 6px;
            background: #0f161e;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            color: #fff;
            font-size: 12px;
            font-weight: 500;
            outline: none;
            transition: 0.2s;
            -webkit-appearance: none;
            appearance: none;
            cursor: pointer;
        }
        .form-group-compact select:focus,
        .form-group-compact input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(200, 169, 110, 0.12);
        }
        .form-group-compact select option {
            background: #1a212b;
        }
        .form-group-compact input[type="number"]::-webkit-inner-spin-button,
        .form-group-compact input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .form-group-compact input[type="number"] {
            -moz-appearance: textfield;
        }

        /* ===== 单价 + 按钮行（移动端）- 按钮居中 ===== */
        .price-action-row {
            display: flex;
            gap: 6px;
            align-items: flex-end;
            flex-wrap: nowrap;
        }
        .price-action-row .form-group-compact {
            flex: 0 0 130px;
            min-width: 100px;
        }
        .price-action-row .price-hint {
            color: var(--text-muted);
            font-size: 10px;
            white-space: nowrap;
            padding-bottom: 6px;
            flex-shrink: 0;
        }
        .price-action-row .calc-btn-mobile {
            flex: 0 0 140px;
            /* 去掉 margin-left: auto，改为居中 */
            margin: 0 auto;              /* 在剩余空间中居中 */
            padding: 5px 8px;
            background: var(--gold-gradient);
            border: none;
            border-radius: 5px;
            font-size: 12px;
            font-weight: 700;
            color: #0b0e14;
            cursor: pointer;
            transition: 0.25s;
            font-family: var(--font-display);
            white-space: nowrap;
            height: 32px;
            line-height: 1.2;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 0.3px;
        }
        .price-action-row .calc-btn-mobile:hover {
            transform: scale(1.03);
            box-shadow: 0 4px 16px rgba(200, 169, 110, 0.30);
        }
        .price-action-row .calc-btn-mobile:active {
            transform: scale(0.95);
        }

        /* ===== 桌面端按钮（全宽） ===== */
        .calc-btn-desktop {
            width: 100%;
            padding: 14px;
            background: var(--gold-gradient);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            color: #0b0e14;
            cursor: pointer;
            transition: 0.25s;
            letter-spacing: 2px;
            margin-top: 2px;
            font-family: var(--font-display);
        }
        .calc-btn-desktop:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 24px rgba(200, 169, 110, 0.35);
        }
        .calc-btn-desktop:active {
            transform: scale(0.98);
        }

        /* ===== 结果区域 ===== */
        .result-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 6px;
        }
        .result-item {
            background: #0f161e;
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
            border: 1px solid var(--border-color);
            transition: border-color 0.2s;
        }
        .result-item:hover {
            border-color: var(--gold);
        }
        .result-item .label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .result-item .value {
            font-size: 22px;
            font-weight: 700;
            color: var(--gold-light);
            margin-top: 2px;
        }
        .result-item .value.green {
            color: #5fcb9a;
        }
        .result-item .value.blue {
            color: #6cb4ee;
        }
        .result-item .value.purple {
            color: #b088d0;
        }
        .result-item .sub-text {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 1px;
        }

        .table-wrap {
            overflow-x: auto;
            margin-top: 14px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            min-width: 400px;
        }
        th {
            background: #1a212b;
            color: var(--gold);
            font-weight: 600;
            padding: 10px 6px;
            text-align: center;
            border-bottom: 2px solid var(--border-color);
            font-family: var(--font-display);
            letter-spacing: 0.5px;
            font-size: 12px;
        }
        td {
            padding: 8px 4px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
            font-size: 12px;
        }
        tr:last-child td {
            border-bottom: none;
        }
        tr:hover td {
            background: rgba(200, 169, 110, 0.05);
        }
        .highlight-row td {
            background: rgba(200, 169, 110, 0.08);
            font-weight: 600;
            border-bottom: 2px solid var(--gold);
        }
        .info-note {
            color: var(--text-secondary);
            font-size: 12px;
            margin-top: 12px;
            text-align: center;
            border-top: 1px dashed var(--border-color);
            padding-top: 12px;
            line-height: 1.6;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 14px;
            color: var(--text-muted);
            font-size: 13px;
            text-decoration: none;
            transition: 0.2s;
            letter-spacing: 0.5px;
        }
        .back-link:hover {
            color: var(--gold);
        }

        /* ============================================================
           移动端 (max-width: 600px)
           ============================================================ */
        @media (max-width: 600px) {
            body {
                padding: 10px 6px;
            }
            .header h1 {
                font-size: 18px;
                letter-spacing: 1.5px;
            }
            .header .sub {
                font-size: 10px;
            }
            .card {
                padding: 12px 8px;
                border-radius: 12px;
            }

            .form-row {
                display: none !important;
            }
            .calc-btn-desktop {
                display: none !important;
            }

            .form-row-compact {
                display: flex !important;
                gap: 4px;
                margin-bottom: 4px;
            }
            .form-group-compact select,
            .form-group-compact input {
                font-size: 11px;
                padding: 4px 4px;
                border-radius: 4px;
            }
            .form-group-compact label {
                font-size: 8px;
            }

            .price-action-row {
                display: flex !important;
                gap: 5px;
                align-items: flex-end;
            }
            .price-action-row .form-group-compact {
                flex: 0 0 130px;
                min-width: 100px;
            }
            .price-action-row .price-hint {
                font-size: 9px;
                padding-bottom: 5px;
            }
            .price-action-row .calc-btn-mobile {
                flex: 0 0 140px;
                margin: 0 auto;            /* 居中 */
                font-size: 12px;
                padding: 5px 8px;
                height: 32px;
                border-radius: 5px;
                letter-spacing: 0.3px;
            }

            .result-grid {
                grid-template-columns: 1fr 1fr;
                gap: 5px;
            }
            .result-item {
                padding: 6px 3px;
                border-radius: 6px;
            }
            .result-item .value {
                font-size: 15px;
            }
            .result-item .label {
                font-size: 7px;
            }
            .result-item .sub-text {
                font-size: 7px;
            }

            table {
                font-size: 9px;
                min-width: 240px;
            }
            th {
                font-size: 8px;
                padding: 4px 2px;
            }
            td {
                font-size: 8px;
                padding: 3px 1px;
            }
            .info-note {
                font-size: 9px;
                padding-top: 6px;
                margin-top: 6px;
            }
            .back-link {
                font-size: 11px;
                margin-top: 8px;
            }
        }

        @media (min-width: 601px) {
            .form-row {
                display: flex !important;
            }
            .form-row-compact {
                display: none !important;
            }
            .price-action-row {
                display: none !important;
            }
            .calc-btn-desktop {
                display: block !important;
            }
            .calc-btn-mobile {
                display: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="page-wrap">
        <div class="header">
            <h1>⚔️ 小宝石升级</h1>
            <div class="sub">暗黑不灭 · 消耗 &amp; 收益计算</div>
        </div>

        <div class="card">
            <!-- ===== 桌面端表单 ===== -->
            <div class="form-row">
                <div class="form-group">
                    <label>💎 宝石类型</label>
                    <select id="gemType">
                        <option value="base">🟡 黄玉</option>
                        <option value="base">🔵 蓝水晶</option>
                        <option value="base">⚪ 月亮石</option>
                        <option value="base">🟢 猫眼石</option>
                        <option value="sun">🔴 太阳石</option>
                        <option value="red">🟣 赤精石</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>📌 当前等级</label>
                    <select id="currentLevel">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>🎯 目标等级</label>
                    <select id="targetLevel">
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10" selected>10</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>💎 小宝石单价</label>
                    <input type="number" id="gemPrice" value="50" min="0" step="1" placeholder="50">
                </div>
            </div>

            <!-- ===== 桌面端按钮 ===== -->
            <button class="calc-btn-desktop" onclick="calculate()">🧮 计算升级消耗</button>

            <!-- ===== 移动端表单 ===== -->
            <div class="form-row-compact">
                <div class="form-group-compact">
                    <label>宝石</label>
                    <select id="gemTypeMobile">
                        <option value="base">黄玉</option>
                        <option value="base">蓝水晶</option>
                        <option value="base">月亮石</option>
                        <option value="base">猫眼石</option>
                        <option value="sun">太阳石</option>
                        <option value="red">赤精石</option>
                    </select>
                </div>
                <div class="form-group-compact">
                    <label>当前</label>
                    <select id="currentLevelMobile">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                    </select>
                </div>
                <div class="form-group-compact">
                    <label>目标</label>
                    <select id="targetLevelMobile">
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                        <option value="6">6</option>
                        <option value="7">7</option>
                        <option value="8">8</option>
                        <option value="9">9</option>
                        <option value="10" selected>10</option>
                    </select>
                </div>
            </div>

            <!-- 移动端：单价 + 按钮（按钮居中） -->
            <div class="price-action-row">
                <div class="form-group-compact">
                    <label>单价</label>
                    <input type="number" id="gemPriceMobile" value="50" min="0" step="1" placeholder="50">
                </div>
                <span class="price-hint">白金币/个</span>
                <button class="calc-btn-mobile" onclick="calculate()">计算最终消耗</button>
            </div>

            <div id="resultArea" style="margin-top:14px; display:none;">
                <div class="result-grid">
                    <div class="result-item">
                        <div class="label">💎 水晶石</div>
                        <div class="value" id="totalCrystal">0</div>
                        <div class="sub-text">累计消耗</div>
                    </div>
                    <div class="result-item">
                        <div class="label">💰 水晶石花费</div>
                        <div class="value green" id="crystalGold">0</div>
                        <div class="sub-text">500 白金币/个</div>
                    </div>
                    <div class="result-item">
                        <div class="label">💎 小宝石</div>
                        <div class="value blue" id="totalGem">0</div>
                        <div class="sub-text" id="gemSubLabel">最后一级消耗</div>
                    </div>
                    <div class="result-item">
                        <div class="label">💰 小宝石花费</div>
                        <div class="value purple" id="gemGold">0</div>
                        <div class="sub-text" id="gemPriceLabel">自定义单价</div>
                    </div>
                </div>

                <div class="result-grid" style="margin-top:6px;">
                    <div class="result-item" style="grid-column: span 2;">
                        <div class="label">💰 总花费</div>
                        <div class="value" id="totalGold">0</div>
                        <div class="sub-text">水晶石 + 小宝石</div>
                    </div>
                    <div class="result-item" style="grid-column: span 2;">
                        <div class="label">📈 属性收益</div>
                        <div class="value blue" id="totalStat">+0</div>
                        <div class="sub-text" id="statLabel">属性增长</div>
                    </div>
                </div>

                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>升级区间</th>
                                <th>水晶石</th>
                                <th>累计水晶石</th>
                                <th>小宝石</th>
                                <th>属性值</th>
                            </tr>
                        </thead>
                        <tbody id="detailTableBody"></tbody>
                    </table>
                </div>
                <div class="info-note" id="infoNote">💡 1~4级升级不需要水晶石，5级起每级消耗递增。</div>
            </div>
        </div>

        <a href="https://bumie666.github.io" class="back-link">🏠 返回暗黑不灭工具箱</a>
    </div>

    <script>
        // ================================================================
        //  数据区
        // ================================================================

        var STATS = {
            base: [8, 16, 24, 36, 56, 136, 368, 656, 952, 1256],
            sun: [8, 16, 32, 56, 92, 148, 216, 292, 380, 480],
            red: [80, 160, 320, 560, 920, 1480, 2160, 2920, 3800, 4800]
        };

        var CRYSTAL_PER = [0, 0, 0, 0, 1, 5, 15, 35, 75];

        var CRYSTAL_CUM = [];
        for (var i = 0; i < 10; i++) {
            if (i < 5) {
                CRYSTAL_CUM[i] = 0;
            } else if (i === 5) {
                CRYSTAL_CUM[i] = 1;
            } else {
                CRYSTAL_CUM[i] = CRYSTAL_PER[i - 1] + 3 * CRYSTAL_CUM[i - 1];
            }
        }

        var GEM_CUM = [0, 3, 9, 27, 81, 243, 729, 2187, 6561, 19683];

        var CRYSTAL_PRICE = 500;

        var GEM_NAME = {
            base: '黄玉/蓝水晶/月亮石/猫眼石',
            sun: '太阳石',
            red: '赤精石'
        };

        // ================================================================
        //  同步双端表单控件
        // ================================================================

        function syncSelects(sourceId, targetId) {
            var source = document.getElementById(sourceId);
            var target = document.getElementById(targetId);
            if (source && target && source.value !== target.value) {
                target.value = source.value;
            }
        }

        // 桌面端 → 移动端
        document.getElementById('gemType').addEventListener('change', function() {
            document.getElementById('gemTypeMobile').value = this.value;
            if (document.getElementById('resultArea').style.display !== 'none') calculate();
        });
        document.getElementById('currentLevel').addEventListener('change', function() {
            document.getElementById('currentLevelMobile').value = this.value;
            if (document.getElementById('resultArea').style.display !== 'none') calculate();
        });
        document.getElementById('targetLevel').addEventListener('change', function() {
            document.getElementById('targetLevelMobile').value = this.value;
            if (document.getElementById('resultArea').style.display !== 'none') calculate();
        });
        document.getElementById('gemPrice').addEventListener('input', function() {
            document.getElementById('gemPriceMobile').value = this.value;
            if (document.getElementById('resultArea').style.display !== 'none') calculate();
        });

        // 移动端 → 桌面端
        document.getElementById('gemTypeMobile').addEventListener('change', function() {
            document.getElementById('gemType').value = this.value;
            if (document.getElementById('resultArea').style.display !== 'none') calculate();
        });
        document.getElementById('currentLevelMobile').addEventListener('change', function() {
            document.getElementById('currentLevel').value = this.value;
            if (document.getElementById('resultArea').style.display !== 'none') calculate();
        });
        document.getElementById('targetLevelMobile').addEventListener('change', function() {
            document.getElementById('targetLevel').value = this.value;
            if (document.getElementById('resultArea').style.display !== 'none') calculate();
        });
        document.getElementById('gemPriceMobile').addEventListener('input', function() {
            document.getElementById('gemPrice').value = this.value;
            if (document.getElementById('resultArea').style.display !== 'none') calculate();
        });

        // ================================================================
        //  获取有效单价
        // ================================================================

        function getGemPrice() {
            var val = document.getElementById('gemPrice').value.trim();
            if (val === '' || isNaN(val) || parseFloat(val) < 0) {
                return 50;
            }
            return parseFloat(val);
        }

        // ================================================================
        //  核心计算
        // ================================================================

        function calculate() {
            var gemKey = document.getElementById('gemType').value;
            var cur = parseInt(document.getElementById('currentLevel').value);
            var target = parseInt(document.getElementById('targetLevel').value);
            var gemPrice = getGemPrice();

            if (cur >= target) {
                alert('目标等级必须大于当前等级！');
                return;
            }

            var stats = STATS[gemKey] || STATS.base;
            var name = GEM_NAME[gemKey] || '未知宝石';

            // 水晶石实际消耗
            var crystalActual = 0;
            for (var lv = cur; lv < target; lv++) {
                var idx = lv - 1;
                var single = CRYSTAL_PER[idx] || 0;
                var exponent = target - lv - 1;
                var multiplier = Math.pow(3, exponent);
                crystalActual += single * multiplier;
            }

            // 小宝石实际消耗
            var gemActual = GEM_CUM[target - 1] - GEM_CUM[cur - 1];

            // 价格计算
            var crystalGold = crystalActual * CRYSTAL_PRICE;
            var gemGold = gemActual * gemPrice;
            var totalGold = crystalGold + gemGold;

            // 属性收益
            var curStat = stats[cur - 1] || 0;
            var tarStat = stats[target - 1] || 0;
            var statGain = tarStat - curStat;

            // 明细行
            var rows = [];
            for (var lv = cur; lv < target; lv++) {
                var idx = lv - 1;
                var c = CRYSTAL_PER[idx] || 0;
                var cumC = CRYSTAL_CUM[lv] || 0;
                var g = GEM_CUM[lv] - GEM_CUM[lv - 1] || 0;
                rows.push({
                    from: lv,
                    to: lv + 1,
                    crystal: c,
                    crystalCum: cumC,
                    gem: g,
                    stat: stats[lv] || 0
                });
            }

            // 渲染结果
            document.getElementById('resultArea').style.display = 'block';
            document.getElementById('totalCrystal').textContent = crystalActual.toLocaleString();
            document.getElementById('crystalGold').textContent = crystalGold.toLocaleString();
            document.getElementById('totalGem').textContent = gemActual.toLocaleString();
            document.getElementById('gemGold').textContent = gemGold.toLocaleString();
            document.getElementById('totalGold').textContent = totalGold.toLocaleString();
            document.getElementById('totalStat').textContent = (statGain >= 0 ? '+' : '') + statGain.toLocaleString();
            document.getElementById('statLabel').textContent = name + ' 属性增长';
            document.getElementById('gemPriceLabel').textContent = gemPrice + ' 白金币/个';
            document.getElementById('gemSubLabel').textContent = cur + '→' + target + ' 实际消耗';

            // 渲染表格
            var tbody = document.getElementById('detailTableBody');
            tbody.innerHTML = '';
            for (var i = 0; i < rows.length; i++) {
                var r = rows[i];
                var tr = document.createElement('tr');
                if (i === rows.length - 1) {
                    tr.className = 'highlight-row';
                }
                tr.innerHTML =
                    '<td>' + r.from + ' → ' + r.to + '</td>' +
                    '<td>' + r.crystal + '</td>' +
                    '<td>' + r.crystalCum.toLocaleString() + '</td>' +
                    '<td>' + r.gem.toLocaleString() + '</td>' +
                    '<td>' + r.stat.toLocaleString() + '</td>';
                tbody.appendChild(tr);
            }

            document.getElementById('infoNote').textContent =
                '💡 从 ' + cur + ' 级升到 ' + target + ' 级，实际消耗 ' + crystalActual.toLocaleString() +
                ' 水晶石（' + crystalGold.toLocaleString() + ' 白金币）+ ' + gemActual.toLocaleString() +
                ' 小宝石（' + gemGold.toLocaleString() + ' 白金币，单价 ' + gemPrice + '），合计 ' + totalGold.toLocaleString() + ' 白金币。';
        }

        window.onload = function() {
            var selects = ['gemType', 'currentLevel', 'targetLevel'];
            selects.forEach(function(id) {
                var mobile = document.getElementById(id + 'Mobile');
                var desktop = document.getElementById(id);
                if (mobile && desktop) {
                    mobile.value = desktop.value;
                }
            });
            var priceMobile = document.getElementById('gemPriceMobile');
            var priceDesktop = document.getElementById('gemPrice');
            if (priceMobile && priceDesktop) {
                priceMobile.value = priceDesktop.value;
            }
            calculate();
        };
    </script>
</body>
</html>
