<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小宝石升级计算器</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0e14;
            background-image: radial-gradient(ellipse at 50% 0%, #1a212b 0%, #0b0e14 70%);
            color: #e0e6ed;
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            min-height: 100vh;
            padding: 12px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .wrap {
            max-width: 820px;
            width: 100%;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #2a3a4a;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .header img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid rgba(200, 169, 110, 0.3);
        }
        .header h1 {
            font-family: 'Cinzel', 'Times New Roman', serif;
            font-size: 20px;
            background: linear-gradient(135deg, #f6d365, #c8a96e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .sub {
            font-size: 12px;
            color: #7a8a9e;
            margin-left: auto;
        }

        .card {
            background: rgba(20, 25, 35, 0.8);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid #2a3a4a;
            border-radius: 12px;
            padding: 18px 14px;
            margin-bottom: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .field {
            margin-bottom: 16px;
        }
        .field label {
            display: block;
            font-size: 13px;
            color: #9aabbf;
            margin-bottom: 4px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .field input,
        .field select {
            width: 100%;
            padding: 10px 12px;
            background: #0f161e;
            border: 1px solid #2a3a4a;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.2s;
            -webkit-appearance: none;
        }
        .field input:focus,
        .field select:focus {
            border-color: #c8a96e;
            box-shadow: 0 0 0 2px rgba(200, 169, 110, 0.12);
        }
        .field input::placeholder {
            color: #5a6a7e;
        }

        /* 单价输入行（带重置按钮） */
        .price-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .price-row input {
            flex: 1;
        }
        .price-row .reset-btn {
            padding: 10px 14px;
            background: #2a3a4a;
            border: none;
            border-radius: 8px;
            color: #e0e6ed;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.2s;
        }
        .price-row .reset-btn:active {
            transform: scale(0.95);
            background: #3a4a5a;
        }

        .calc-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #c8a96e, #f6d365);
            border: none;
            border-radius: 8px;
            color: #0b0e14;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
        }
        .calc-btn:active {
            transform: scale(0.97);
        }

        #result {
            margin-top: 16px;
            padding: 12px;
            background: #0f161e;
            border-radius: 8px;
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            color: #f6d365;
            border: 1px solid #2a3a4a;
        }
        #result .sub {
            font-size: 14px;
            font-weight: 400;
            color: #8a9aae;
            display: block;
            margin-bottom: 4px;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: #5a6a7e;
            font-size: 12px;
            text-decoration: none;
            transition: 0.2s;
            letter-spacing: 0.5px;
        }
        .back-link:hover {
            color: #c8a96e;
        }

        /* 移动端适配 */
        @media (max-width: 480px) {
            .header h1 {
                font-size: 17px;
            }
            .header .sub {
                font-size: 10px;
                margin-left: 0;
                width: 100%;
            }
            .field input,
            .field select {
                font-size: 15px;
                padding: 8px 10px;
            }
            .price-row .reset-btn {
                padding: 8px 12px;
                font-size: 13px;
            }
            #result {
                font-size: 18px;
            }
        }
        @media (max-width: 380px) {
            .field input,
            .field select {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="wrap">

        <!-- 头部（和首页风格一致） -->
        <div class="header">
            <img src="../images/douyintouxiang.png" alt="头像">
            <h1>💎 小宝石升级计算器</h1>
            <span class="sub">暗黑不朽 · 白金币估算</span>
        </div>

        <!-- 计算卡片 -->
        <div class="card">
            <!-- 宝石等级 -->
            <div class="field">
                <label>宝石等级</label>
                <select id="gemLevel">
                    <option value="1">一星宝石</option>
                    <option value="2">二星宝石</option>
                    <option value="5" selected>五星宝石</option>
                </select>
            </div>

            <!-- 宝石数量 -->
            <div class="field">
                <label>宝石数量（个）</label>
                <input type="number" id="gemCount" value="1" min="1" step="1">
            </div>

            <!-- 单价（自定义 + 重置） -->
            <div class="field">
                <label>单价（白金币 / 个）</label>
                <div class="price-row">
                    <input type="number" id="unitPrice" value="50" min="0" step="0.01" placeholder="请输入单价">
                    <button class="reset-btn" onclick="resetPrice()">重置 50</button>
                </div>
                <!-- 提示：可完全删除默认值后自行输入 -->
                <div style="font-size:11px; color:#5a6a7e; margin-top:4px;">💡 可清空输入框，自行填写任意金额</div>
            </div>

            <!-- 计算按钮 -->
            <button class="calc-btn" onclick="calculate()">计算总消耗</button>

            <!-- 结果展示 -->
            <div id="result">
                <span class="sub">总消耗</span>
                <span id="totalDisplay">0</span> 白金币
            </div>
        </div>

        <!-- 返回首页 -->
        <a href="index.html" class="back-link">🏠 返回首页</a>

    </div>

    <script>
        // 重置单价为 50
        function resetPrice() {
            document.getElementById('unitPrice').value = '50';
        }

        // 计算总消耗
        function calculate() {
            var count = parseFloat(document.getElementById('gemCount').value);
            var price = parseFloat(document.getElementById('unitPrice').value);

            // 若输入为空或非数字，视为 0
            if (isNaN(count) || count < 0) count = 0;
            if (isNaN(price) || price < 0) price = 0;

            var total = count * price;
            document.getElementById('totalDisplay').textContent = total.toFixed(2);
        }

        // 页面加载时自动计算一次（显示默认值）
        window.addEventListener('DOMContentLoaded', function() {
            calculate();
        });

        // 当数量或单价变化时自动重新计算（实时反馈）
        document.getElementById('gemCount').addEventListener('input', calculate);
        document.getElementById('unitPrice').addEventListener('input', calculate);
        document.getElementById('gemLevel').addEventListener('change', calculate);
    </script>
</body>
</html>
