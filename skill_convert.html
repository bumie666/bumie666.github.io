<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>暗黑不灭 · 恐惧词条转换</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e14;
            --bg-secondary: #151e27;
            --bg-card: rgba(20, 25, 35, 0.80);
            --border-color: #2a3a4a;
            --border-glow: #c8a96e;
            --gold: #c8a96e;
            --gold-light: #f6d365;
            --gold-gradient: linear-gradient(135deg, #c8a96e, #f6d365);
            --text-primary: #e8edf4;
            --text-secondary: #8a9aae;
            --text-muted: #5a6a7e;
            --font-display: 'Cinzel', 'Times New Roman', serif;
            --font-body: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--bg-primary);
            background-image: radial-gradient(ellipse at 50% 0%, #1a212b 0%, #0b0e14 70%);
            color: var(--text-primary);
            font-family: var(--font-body);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .page-wrap {
            max-width: 1000px;
            width: 100%;
        }
        .header {
            text-align: center;
            padding: 20px 0 10px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 24px;
        }
        .header h1 {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 28px;
            letter-spacing: 4px;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 20px rgba(200, 169, 110, 0.20);
        }
        .header .sub {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 6px;
            letter-spacing: 2px;
            font-weight: 300;
        }
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 28px 24px;
            margin-bottom: 20px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
            transition: border-color 0.3s ease;
        }
        .card:hover {
            border-color: var(--border-glow);
        }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px 20px;
            margin-bottom: 20px;
        }
        .form-group {
            flex: 1 1 calc(50% - 20px);
            min-width: 140px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: #0f161e;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: 500;
            outline: none;
            transition: 0.2s;
            -webkit-appearance: none;
            appearance: none;
            cursor: pointer;
        }
        .form-group select:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(200, 169, 110, 0.15);
        }
        .form-group select option {
            background: #1a212b;
        }
        .calc-btn {
            width: 100%;
            padding: 16px;
            background: var(--gold-gradient);
            border: none;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 700;
            color: #0b0e14;
            cursor: pointer;
            transition: 0.25s;
            letter-spacing: 3px;
            margin-top: 4px;
            font-family: var(--font-display);
        }
        .calc-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 24px rgba(200, 169, 110, 0.35);
        }
        .calc-btn:active {
            transform: scale(0.98);
        }

        /* 结果卡片 - 6个部位独立展示 */
        .result-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 6px;
        }
        .result-item {
            background: #0f161e;
            border-radius: 14px;
            padding: 14px 10px;
            border: 1px solid var(--border-color);
            transition: border-color 0.2s;
            text-align: center;
        }
        .result-item:hover {
            border-color: var(--gold);
        }
        .result-item .slot-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--gold);
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 6px;
            margin-bottom: 8px;
        }
        .result-item .skill-from {
            font-size: 14px;
            color: #f6d365;
        }
        .result-item .skill-to {
            font-size: 14px;
            color: #6cb4ee;
        }
        .result-item .arrow {
            color: var(--text-muted);
            font-size: 12px;
            margin: 0 4px;
        }
        .result-item .empty {
            color: var(--text-muted);
            font-size: 13px;
        }
        .result-item .sub-text {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .result-grid-summary {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }
        .summary-item {
            background: #0f161e;
            border-radius: 14px;
            padding: 12px 10px;
            text-align: center;
            border: 1px solid var(--border-color);
        }
        .summary-item .label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .summary-item .value {
            font-size: 22px;
            font-weight: 700;
            color: var(--gold-light);
            margin-top: 2px;
        }
        .summary-item .value.green { color: #5fcb9a; }

        .info-note {
            color: var(--text-secondary);
            font-size: 13px;
            margin-top: 14px;
            text-align: center;
            border-top: 1px dashed var(--border-color);
            padding-top: 14px;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 18px;
            color: var(--text-muted);
            font-size: 14px;
            text-decoration: none;
            transition: 0.2s;
            letter-spacing: 1px;
        }
        .back-link:hover {
            color: var(--gold);
        }

        .no-result {
            text-align: center;
            color: var(--text-muted);
            padding: 30px 0;
            font-size: 16px;
        }
        .no-result .icon {
            font-size: 40px;
            display: block;
            margin-bottom: 10px;
        }

        @media (max-width: 640px) {
            .form-group {
                flex: 1 1 100%;
            }
            .result-grid {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }
            .result-grid-summary {
                grid-template-columns: 1fr 1fr;
            }
            .header h1 {
                font-size: 22px;
            }
            .card {
                padding: 16px 12px;
            }
        }
        @media (max-width: 420px) {
            .result-grid {
                grid-template-columns: 1fr 1fr;
            }
            .result-grid-summary {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="page-wrap">
        <div class="header">
            <h1>⚔️ 恐惧词条转换</h1>
            <div class="sub">暗黑不灭 · 职业技能 · 部位映射</div>
        </div>

        <div class="card">
            <div class="form-row">
                <div class="form-group">
                    <label>⚔️ 当前职业</label>
                    <select id="classFrom"></select>
                </div>
                <div class="form-group">
                    <label>🎯 目标职业</label>
                    <select id="classTo"></select>
                </div>
            </div>

            <button class="calc-btn" onclick="calculate()">🔄 查询转换</button>

            <div id="resultArea" style="margin-top:20px; display:none;">
                <!-- 汇总 -->
                <div class="result-grid-summary" id="summaryGrid">
                    <div class="summary-item">
                        <div class="label">📊 可转换部位</div>
                        <div class="value" id="totalSlots">0</div>
                    </div>
                    <div class="summary-item">
                        <div class="label">🔗 技能匹配</div>
                        <div class="value green" id="totalMatches">0</div>
                    </div>
                    <div class="summary-item">
                        <div class="label">🎯 目标职业</div>
                        <div class="value" id="targetClassDisplay" style="font-size:18px;">—</div>
                    </div>
                </div>

                <!-- 6个部位卡片 -->
                <div class="result-grid" id="slotGrid">
                    <!-- 由JS动态生成 -->
                </div>

                <div class="info-note" id="infoNote">💡 选择两个职业，查看恐惧类魔法属性的技能转换对应关系。</div>
            </div>
        </div>

        <a href="https://bumie666.github.io" class="back-link">🏠 返回暗黑不灭工具箱</a>
    </div>

        // 将原始数据转换为：按独立部位存储所有技能条目
        // 每个条目：{ slot, fromSkill, toSkill }
        function buildSlotData(fromCls, toCls) {
            var entries = [];
            var slotMap = {};

            // 初始化每个部位的空数组
            SLOT_NAMES.forEach(function(s) {
                slotMap[s] = [];
            });

            // 遍历所有原始数据条目
            for (var key in RAW_DATA) {
                var entry = RAW_DATA[key];
                var fromSkill = entry[fromCls] || '—';
                var toSkill = entry[toCls] || '—';

                // 如果两个职业的技能都是无效的（—），跳过
                if (fromSkill === '—' && toSkill === '—') continue;

                // 从key中提取部位列表
                var parts = key.split('_');
                parts.forEach(function(p) {
                    // 去除可能的 _2 后缀
                    var slotName = p.replace('_2', '');
                    // 只保留六个主要部位
                    if (SLOT_NAMES.indexOf(slotName) !== -1) {
                        // 检查是否已存在相同的技能组合（避免重复）
                        var exists = slotMap[slotName].some(function(item) {
                            return item.fromSkill === fromSkill && item.toSkill === toSkill;
                        });
                        if (!exists) {
                            slotMap[slotName].push({
                                fromSkill: fromSkill,
                                toSkill: toSkill
                            });
                        }
                    }
                });
            }

            return slotMap;
        }

        // ================================================================
        //  初始化下拉框
        // ================================================================
        window.onload = function() {
            var fromSel = document.getElementById('classFrom');
            var toSel = document.getElementById('classTo');
            CLASSES.forEach(function(cls) {
                var opt1 = document.createElement('option');
                opt1.value = cls;
                opt1.textContent = cls;
                fromSel.appendChild(opt1);

                var opt2 = document.createElement('option');
                opt2.value = cls;
                opt2.textContent = cls;
                toSel.appendChild(opt2);
            });
            fromSel.value = '法师';
            toSel.value = '野蛮人';
            calculate();
        };

        // ================================================================
        //  核心计算
        // ================================================================
        function calculate() {
            var fromCls = document.getElementById('classFrom').value;
            var toCls = document.getElementById('classTo').value;

            if (fromCls === toCls) {
                alert('当前职业和目标职业不能相同！');
                return;
            }

            var slotData = buildSlotData(fromCls, toCls);

            // 统计总匹配数
            var totalMatches = 0;
            var totalSlots = 0;
            SLOT_NAMES.forEach(function(slot) {
                var items = slotData[slot] || [];
                if (items.length > 0) {
                    totalSlots++;
                    totalMatches += items.length;
                }
            });

            // ---- 渲染汇总 ----
            document.getElementById('resultArea').style.display = 'block';
            document.getElementById('totalSlots').textContent = totalSlots;
            document.getElementById('totalMatches').textContent = totalMatches;
            document.getElementById('targetClassDisplay').textContent = toCls;

            // ---- 渲染6个部位卡片 ----
            var grid = document.getElementById('slotGrid');
            grid.innerHTML = '';

            SLOT_NAMES.forEach(function(slot) {
                var items = slotData[slot] || [];
                var div = document.createElement('div');
                div.className = 'result-item';

                var html = '<div class="slot-name">' + slot + '</div>';

                if (items.length === 0) {
                    html += '<div class="empty">—</div>';
                    html += '<div class="sub-text">无匹配</div>';
                } else {
                    items.forEach(function(item) {
                        var fromDisplay = item.fromSkill !== '—' ? item.fromSkill : '—';
                        var toDisplay = item.toSkill !== '—' ? item.toSkill : '—';
                        html += '<div>';
                        html += '<span class="skill-from">' + fromDisplay + '</span>';
                        html += '<span class="arrow"> → </span>';
                        html += '<span class="skill-to">' + toDisplay + '</span>';
                        html += '</div>';
                    });
                    html += '<div class="sub-text">' + items.length + ' 个技能</div>';
                }

                div.innerHTML = html;
                grid.appendChild(div);
            });

            // ---- 提示信息 ----
            if (totalMatches === 0) {
                document.getElementById('infoNote').textContent =
                    '💡 ' + fromCls + ' → ' + toCls + '：未找到可转换的恐惧词条，请尝试其他职业组合。';
            } else {
                document.getElementById('infoNote').textContent =
                    '💡 ' + fromCls + ' → ' + toCls + '：共 ' + totalSlots + ' 个部位，' + totalMatches + ' 个技能可转换。';
            }
        }
    </script>
