<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>暗黑不灭 · 恐惧词条转换</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e14;
            --bg-secondary: #151e27;
            --bg-card: rgba(20, 25, 35, 0.80);
            --border-color: #2a3a4a;
            --border-glow: #c8a96e;
            --gold: #c8a96e;
            --gold-light: #f6d365;
            --gold-gradient: linear-gradient(135deg, #c8a96e, #f6d365);
            --text-primary: #e8edf4;
            --text-secondary: #8a9aae;
            --text-muted: #5a6a7e;
            --font-display: 'Cinzel', 'Times New Roman', serif;
            --font-body: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--bg-primary);
            background-image: radial-gradient(ellipse at 50% 0%, #1a212b 0%, #0b0e14 70%);
            color: var(--text-primary);
            font-family: var(--font-body);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .page-wrap {
            max-width: 1000px;
            width: 100%;
        }
        .header {
            text-align: center;
            padding: 20px 0 10px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 24px;
        }
        .header h1 {
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 28px;
            letter-spacing: 4px;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 20px rgba(200, 169, 110, 0.20);
        }
        .header .sub {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 6px;
            letter-spacing: 2px;
            font-weight: 300;
        }
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 28px 24px;
            margin-bottom: 20px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
            transition: border-color 0.3s ease;
        }
        .card:hover {
            border-color: var(--border-glow);
        }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px 20px;
            margin-bottom: 20px;
        }
        .form-group {
            flex: 1 1 calc(33% - 20px);
            min-width: 120px;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 4px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .form-group select {
            width: 100%;
            padding: 10px 14px;
            background: #0f161e;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-weight: 500;
            outline: none;
            transition: 0.2s;
            -webkit-appearance: none;
            appearance: none;
            cursor: pointer;
        }
        .form-group select:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(200, 169, 110, 0.15);
        }
        .form-group select option {
            background: #1a212b;
        }
        .calc-btn {
            width: 100%;
            padding: 16px;
            background: var(--gold-gradient);
            border: none;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 700;
            color: #0b0e14;
            cursor: pointer;
            transition: 0.25s;
            letter-spacing: 3px;
            margin-top: 4px;
            font-family: var(--font-display);
        }
        .calc-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 24px rgba(200, 169, 110, 0.35);
        }
        .calc-btn:active {
            transform: scale(0.98);
        }

        .result-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 6px;
        }
        .result-item {
            background: #0f161e;
            border-radius: 14px;
            padding: 14px 10px;
            border: 1px solid var(--border-color);
            transition: border-color 0.2s;
            text-align: center;
        }
        .result-item:hover {
            border-color: var(--gold);
        }
        .result-item .slot-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--gold);
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 6px;
            margin-bottom: 8px;
        }
        .result-item .skill-pair {
            font-size: 14px;
            margin: 4px 0;
        }
        .result-item .skill-from {
            color: #f6d365;
        }
        .result-item .skill-to {
            color: #6cb4ee;
        }
        .result-item .arrow {
            color: var(--text-muted);
            font-size: 12px;
            margin: 0 4px;
        }
        .result-item .empty {
            color: var(--text-muted);
            font-size: 13px;
        }
        .result-item .sub-text {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .result-item .highlight {
            background: rgba(200, 169, 110, 0.12);
            border-radius: 4px;
            padding: 2px 6px;
        }

        .result-grid-summary {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }
        .summary-item {
            background: #0f161e;
            border-radius: 14px;
            padding: 12px 10px;
            text-align: center;
            border: 1px solid var(--border-color);
        }
        .summary-item .label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .summary-item .value {
            font-size: 22px;
            font-weight: 700;
            color: var(--gold-light);
            margin-top: 2px;
        }
        .summary-item .value.green { color: #5fcb9a; }

        .info-note {
            color: var(--text-secondary);
            font-size: 13px;
            margin-top: 14px;
            text-align: center;
            border-top: 1px dashed var(--border-color);
            padding-top: 14px;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 18px;
            color: var(--text-muted);
            font-size: 14px;
            text-decoration: none;
            transition: 0.2s;
            letter-spacing: 1px;
        }
        .back-link:hover {
            color: var(--gold);
        }

        .no-result {
            text-align: center;
            color: var(--text-muted);
            padding: 30px 0;
            font-size: 16px;
        }
        .no-result .icon {
            font-size: 40px;
            display: block;
            margin-bottom: 10px;
        }

        @media (max-width: 640px) {
            .form-group {
                flex: 1 1 100%;
            }
            .result-grid {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }
            .result-grid-summary {
                grid-template-columns: 1fr 1fr;
            }
            .header h1 {
                font-size: 22px;
            }
            .card {
                padding: 16px 12px;
            }
        }
        @media (max-width: 420px) {
            .result-grid {
                grid-template-columns: 1fr 1fr;
            }
            .result-grid-summary {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="page-wrap">
        <div class="header">
            <h1>⚔️ 恐惧词条转换</h1>
            <div class="sub">暗黑不灭 · 职业技能 · 部位映射</div>
        </div>

        <div class="card">
            <div class="form-row">
                <div class="form-group">
                    <label>⚔️ 当前职业</label>
                    <select id="classFrom" onchange="updateSkillList()"></select>
                </div>
                <div class="form-group">
                    <label>🎯 目标职业</label>
                    <select id="classTo"></select>
                </div>
                <div class="form-group">
                    <label>🔍 技能筛选（可选）</label>
                    <select id="skillFilter">
                        <option value="">全部</option>
                    </select>
                </div>
            </div>

            <button class="calc-btn" onclick="calculate()">🔄 查询转换</button>

            <div id="resultArea" style="margin-top:20px; display:none;">
                <div class="result-grid-summary" id="summaryGrid">
                    <div class="summary-item">
                        <div class="label">📊 可转换部位</div>
                        <div class="value" id="totalSlots">0</div>
                    </div>
                    <div class="summary-item">
                        <div class="label">🔗 技能匹配</div>
                        <div class="value green" id="totalMatches">0</div>
                    </div>
                    <div class="summary-item">
                        <div class="label">🎯 筛选技能</div>
                        <div class="value" id="filterDisplay" style="font-size:16px;">全部</div>
                    </div>
                </div>

                <div class="result-grid" id="slotGrid">
                    <!-- 由JS动态生成 -->
                </div>

                <div class="info-note" id="infoNote">💡 选择两个职业，可选技能筛选，查看恐惧类魔法属性的技能转换对应关系。</div>
            </div>
        </div>

        <a href="https://bumie666.github.io" class="back-link">🏠 返回暗黑不灭工具箱</a>
    </div>

        // ================================================================
        //  工具函数
        // ================================================================

        // 获取某个职业的所有技能（去重，按出现顺序）
        function getSkillsForClass(cls) {
            var skills = [];
            for (var key in RAW_DATA) {
                var skill = RAW_DATA[key][cls];
                if (skill && skill !== '—' && skills.indexOf(skill) === -1) {
                    skills.push(skill);
                }
            }
            return skills;
        }

        // 构建部位数据，并可选择过滤技能
        function buildSlotData(fromCls, toCls, filterSkill) {
            var slotMap = {};
            SLOT_NAMES.forEach(function(s) {
                slotMap[s] = [];
            });

            for (var key in RAW_DATA) {
                var entry = RAW_DATA[key];
                var fromSkill = entry[fromCls] || '—';
                var toSkill = entry[toCls] || '—';

                // 如果两个职业的技能都无效或筛选不匹配，跳过
                if (fromSkill === '—' && toSkill === '—') continue;
                if (filterSkill && fromSkill !== filterSkill) continue;

                var parts = key.split('_');
                parts.forEach(function(p) {
                    var slotName = p.replace('_2', '');
                    if (SLOT_NAMES.indexOf(slotName) !== -1) {
                        // 去重：同一个部位下同一对技能只保留一次
                        var exists = slotMap[slotName].some(function(item) {
                            return item.fromSkill === fromSkill && item.toSkill === toSkill;
                        });
                        if (!exists) {
                            slotMap[slotName].push({
                                fromSkill: fromSkill,
                                toSkill: toSkill
                            });
                        }
                    }
                });
            }
            return slotMap;
        }

        // ================================================================
        //  UI 初始化
        // ================================================================

        window.onload = function() {
            var fromSel = document.getElementById('classFrom');
            var toSel = document.getElementById('classTo');
            CLASSES.forEach(function(cls) {
                var opt1 = document.createElement('option');
                opt1.value = cls;
                opt1.textContent = cls;
                fromSel.appendChild(opt1);

                var opt2 = document.createElement('option');
                opt2.value = cls;
                opt2.textContent = cls;
                toSel.appendChild(opt2);
            });
            fromSel.value = '野蛮人';
            toSel.value = '法师';
            updateSkillList();
            calculate();
        };

        // 更新技能筛选下拉列表
        function updateSkillList() {
            var fromCls = document.getElementById('classFrom').value;
            var filterSel = document.getElementById('skillFilter');
            var currentVal = filterSel.value;

            filterSel.innerHTML = '<option value="">全部</option>';
            var skills = getSkillsForClass(fromCls);
            skills.forEach(function(skill) {
                var opt = document.createElement('option');
                opt.value = skill;
                opt.textContent = skill;
                filterSel.appendChild(opt);
            });
            // 尝试恢复之前选中的值
            if (currentVal && skills.indexOf(currentVal) !== -1) {
                filterSel.value = currentVal;
            }
        }

        // ================================================================
        //  核心计算
        // ================================================================

        function calculate() {
            var fromCls = document.getElementById('classFrom').value;
            var toCls = document.getElementById('classTo').value;
            var filterSkill = document.getElementById('skillFilter').value;

            if (fromCls === toCls) {
                alert('当前职业和目标职业不能相同！');
                return;
            }

            var slotData = buildSlotData(fromCls, toCls, filterSkill);

            // 统计
            var totalSlots = 0;
            var totalMatches = 0;
            var displaySlots = [];
            SLOT_NAMES.forEach(function(slot) {
                var items = slotData[slot] || [];
                if (items.length > 0) {
                    totalSlots++;
                    totalMatches += items.length;
                    displaySlots.push({ slot: slot, items: items });
                }
            });

            // 渲染
            document.getElementById('resultArea').style.display = 'block';
            document.getElementById('totalSlots').textContent = totalSlots;
            document.getElementById('totalMatches').textContent = totalMatches;
            document.getElementById('filterDisplay').textContent = filterSkill || '全部';

            var grid = document.getElementById('slotGrid');
            grid.innerHTML = '';

            if (displaySlots.length === 0) {
                grid.innerHTML = `
                    <div style="grid-column:1/-1; text-align:center; padding:30px 0; color:var(--text-muted);">
                        <div style="font-size:40px; margin-bottom:10px;">🔍</div>
                        <div>未找到匹配的技能转换</div>
                        <div style="font-size:13px; margin-top:6px;">请尝试调整筛选条件或选择其他职业</div>
                    </div>
                `;
                document.getElementById('infoNote').textContent =
                    '💡 ' + fromCls + ' → ' + toCls + (filterSkill ? '（筛选：' + filterSkill + '）' : '') + '：未找到可转换的恐惧词条。';
                return;
            }

            displaySlots.forEach(function(item) {
                var div = document.createElement('div');
                div.className = 'result-item';
                var html = '<div class="slot-name">' + item.slot + '</div>';
                item.items.forEach(function(pair) {
                    var fromDisplay = pair.fromSkill !== '—' ? pair.fromSkill : '—';
                    var toDisplay = pair.toSkill !== '—' ? pair.toSkill : '—';
                    html += '<div class="skill-pair">';
                    html += '<span class="skill-from">' + fromDisplay + '</span>';
                    html += '<span class="arrow"> → </span>';
                    html += '<span class="skill-to">' + toDisplay + '</span>';
                    html += '</div>';
                });
                html += '<div class="sub-text">' + item.items.length + ' 个技能</div>';
                div.innerHTML = html;
                grid.appendChild(div);
            });

            document.getElementById('infoNote').textContent =
                '💡 ' + fromCls + ' → ' + toCls + (filterSkill ? '（筛选：' + filterSkill + '）' : '') +
                '：共 ' + totalSlots + ' 个部位，' + totalMatches + ' 个技能可转换。';
        }
    </script>
</body>
</html>
