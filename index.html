<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>暗黑不朽工具箱</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">

    <!-- Font Awesome 6 免费版 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- 预加载 -->
    <link rel="prefetch" href="pages/xiaobaoshi999.html">
    <link rel="prefetch" href="pages/chuanqi999.html">
    <link rel="prefetch" href="pages/jinengcitiao.html">
    <link rel="prefetch" href="pages/skill_convert.html">
    <link rel="prefetch" href="pages/xiashuidao999.html">
    <link rel="prefetch" href="pages/shimo.html">
    <link rel="prefetch" href="pages/fuwuqi.html">
    <link rel="prefetch" href="pages/tupocitiao.html">
    <link rel="prefetch" href="pages/pvpcitiao.html">
    <link rel="prefetch" href="pages/yaoshi.html">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-image: 
                linear-gradient(rgba(10, 14, 20, 0.75), rgba(10, 14, 20, 0.85)),
                url('images/lilisi.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #e0e6ed;
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
        }
        .container {
            max-width: 700px;
            width: 100%;
        }

        /* ===== 头部 ===== */
        .header {
            text-align: left;
            margin-bottom: 30px;
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 2px;
        }
        /* 标题无图标 */
        .header-top .main-title {
            font-family: 'Cinzel', 'Times New Roman', serif;
            font-size: 38px;
            font-weight: 700;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #f6d365, #c8a96e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 30px rgba(200, 169, 110, 0.10);
            flex: 1;
        }
        .refresh-btn {
            background: none;
            border: none;
            color: #c8a96e;
            font-size: 28px;
            cursor: pointer;
            transition: 0.25s;
            padding: 4px 8px;
            border-radius: 8px;
            line-height: 1;
            flex-shrink: 0;
        }
        .refresh-btn:hover {
            transform: rotate(60deg);
            color: #f6d365;
            background: rgba(200, 169, 110, 0.08);
        }
        .refresh-btn:active {
            transform: rotate(120deg) scale(0.9);
        }
        /* 作者颜色 #f6d365 */
        .brand-name {
            font-family: 'Cinzel', 'Times New Roman', serif;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #f6d365;
            margin-top: 2px;
            text-align: left;
        }

        /* ===== 导航栏（增加“全部”标签，默认选中） ===== */
        .nav-bar {
            display: flex;
            gap: 24px;
            padding: 10px 0 6px 0;
            margin-top: 8px;
            border-top: 1px solid rgba(200, 169, 110, 0.2);
            border-bottom: 1px solid rgba(200, 169, 110, 0.2);
            justify-content: flex-start;
            flex-wrap: wrap;
        }
        .nav-bar .nav-tab {
            font-size: 15px;
            font-weight: 600;
            color: #7a8a9e;
            cursor: pointer;
            transition: 0.25s;
            padding: 4px 0;
            border-bottom: 2px solid transparent;
            letter-spacing: 0.5px;
            user-select: none;
        }
        .nav-bar .nav-tab:hover {
            color: #d0d8e0;
        }
        .nav-bar .nav-tab.active {
            color: #f6d365;
            border-bottom-color: #f6d365;
        }

        /* ===== 卡片网格 ===== */
        .tool-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 30px;
            margin-top: 16px;
        }

        .tool-card {
            display: block;
            padding: 16px 14px;
            background: rgba(20, 25, 35, 0.72);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(42, 58, 74, 0.6);
            border-radius: 16px;
            color: #e0e6ed;
            text-decoration: none;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            min-height: 110px;
        }
        .tool-card:hover {
            border-color: #c8a96e;
            background: rgba(200, 169, 110, 0.08);
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
        }
        .tool-card .icon {
            font-size: 26px;
            display: block;
            margin-bottom: 4px;
            color: #c8a96e;
            transition: color 0.25s;
        }
        .tool-card:hover .icon {
            color: #f6d365;
        }
        .tool-card .name {
            font-size: 16px;
            font-weight: 600;
            display: block;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
            line-height: 1.2;
        }
        .tool-card .desc {
            font-size: 12px;
            color: #6a7a8e;
            display: block;
            flex: 1;
            line-height: 1.3;
        }
        .tool-card .badge {
            position: absolute;
            top: 10px;
            right: 12px;
            font-size: 9px;
            background: rgba(200, 169, 110, 0.15);
            color: #c8a96e;
            padding: 2px 8px;
            border-radius: 20px;
            border: 1px solid rgba(200, 169, 110, 0.15);
            letter-spacing: 0.5px;
        }

        /* 全宽卡片（关注抖音） */
        .tool-card.full-width {
            grid-column: 1 / -1;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding: 18px 16px;
            min-height: auto;
            text-align: center;
        }
        .tool-card.full-width .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid rgba(200, 169, 110, 0.3);
            object-fit: cover;
            flex-shrink: 0;
        }
        .tool-card.full-width .info {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        .tool-card.full-width .info .name {
            font-size: 17px;
            margin-bottom: 0;
        }
        .tool-card.full-width .info .desc {
            font-size: 13px;
            color: #6a7a8e;
        }

        .footer {
            text-align: center;
            border-top: 1px solid rgba(30, 44, 56, 0.6);
            padding-top: 20px;
            margin-top: 6px;
        }
        .footer p {
            color: #4a5a6e;
            font-size: 13px;
            letter-spacing: 1px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 480px) {
            .tool-grid {
                gap: 10px;
            }
            .tool-card {
                padding: 12px 10px;
                min-height: 90px;
            }
            .tool-card .icon {
                font-size: 22px;
            }
            .tool-card .name {
                font-size: 14px;
            }
            .tool-card .desc {
                font-size: 11px;
            }
            .tool-card .badge {
                font-size: 8px;
                padding: 1px 6px;
                top: 8px;
                right: 8px;
            }
            .tool-card.full-width {
                flex-direction: column;
                gap: 8px;
                padding: 16px 12px;
            }
            .tool-card.full-width .info {
                align-items: center;
                text-align: center;
            }
            .tool-card.full-width .avatar {
                width: 38px;
                height: 38px;
            }
            .tool-card.full-width .info .name {
                font-size: 15px;
            }
            .tool-card.full-width .info .desc {
                font-size: 12px;
            }
            .header-top .main-title {
                font-size: 28px;
            }
            .refresh-btn {
                font-size: 24px;
            }
            .brand-name {
                font-size: 16px;
            }
            .nav-bar {
                gap: 16px;
            }
            .nav-bar .nav-tab {
                font-size: 13px;
            }
        }

        @media (max-width: 380px) {
            .tool-grid {
                gap: 8px;
            }
            .tool-card {
                padding: 10px 8px;
                min-height: 80px;
            }
            .tool-card .icon {
                font-size: 20px;
            }
            .tool-card .name {
                font-size: 13px;
            }
            .tool-card .desc {
                font-size: 10px;
            }
            .tool-card .badge {
                display: none;
            }
            .header-top .main-title {
                font-size: 24px;
            }
            .refresh-btn {
                font-size: 20px;
            }
            .brand-name {
                font-size: 14px;
            }
            .nav-bar {
                gap: 12px;
            }
            .nav-bar .nav-tab {
                font-size: 12px;
            }
        }

        /* ===== 密码锁 ===== */
        #lockScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 14, 20, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 20px;
            transition: opacity 0.4s ease;
        }
        #lockScreen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .lock-box {
            background: rgba(20, 25, 35, 0.85);
            border: 1px solid #2a3a4a;
            border-radius: 20px;
            padding: 40px 32px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
        }
        .lock-box .lock-icon {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
        }
        .lock-box .lock-title {
            font-family: 'Cinzel', 'Times New Roman', serif;
            font-size: 20px;
            color: #f6d365;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        .lock-box .lock-desc {
            font-size: 14px;
            color: #8a9aae;
            margin-bottom: 24px;
            line-height: 1.6;
        }
        .lock-box input {
            width: 100%;
            padding: 14px 18px;
            background: #0f161e;
            border: 1px solid #2a3a4a;
            border-radius: 12px;
            color: #fff;
            font-size: 20px;
            font-weight: 600;
            text-align: center;
            letter-spacing: 8px;
            outline: none;
            transition: 0.2s;
        }
        .lock-box input:focus {
            border-color: #c8a96e;
            box-shadow: 0 0 0 3px rgba(200, 169, 110, 0.15);
        }
        .lock-box button {
            width: 100%;
            padding: 14px;
            margin-top: 16px;
            background: linear-gradient(135deg, #c8a96e, #f6d365);
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            color: #0b0e14;
            cursor: pointer;
            transition: 0.25s;
            font-family: 'Cinzel', 'Times New Roman', serif;
            letter-spacing: 2px;
        }
        .lock-box button:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 24px rgba(200, 169, 110, 0.35);
        }
        .lock-box button:active {
            transform: scale(0.98);
        }
        .lock-box .lock-error {
            color: #f87171;
            font-size: 14px;
            margin-top: 12px;
            min-height: 24px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .lock-box .lock-error.show {
            opacity: 1;
        }
        @media (max-width: 480px) {
            .lock-box {
                padding: 30px 20px;
            }
            .lock-box .lock-title {
                font-size: 18px;
            }
            .lock-box .lock-desc {
                font-size: 13px;
            }
            .lock-box input {
                font-size: 18px;
                padding: 12px 14px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 密码锁 ===== -->
    <div id="lockScreen">
        <div class="lock-box">
            <span class="lock-icon">🔐</span>
            <div class="lock-title">工具箱正在开发期间</div>
            <div class="lock-desc">想提前体验的朋友请加不灭粉丝群获取密码</div>
            <input type="password" id="passwordInput" placeholder="输入密码" maxlength="20" autofocus>
            <button onclick="unlock()">解锁</button>
            <div class="lock-error" id="lockError">❌ 密码错误，请重试</div>
        </div>
    </div>

    <!-- ===== 主内容 ===== -->
    <div class="container">

        <div class="header">
            <div class="header-top">
                <div class="main-title">暗黑不朽工具箱</div>
                <button class="refresh-btn" onclick="location.reload()" title="刷新页面获取最新更新">⟳</button>
            </div>
            <div class="brand-name">作者：暗黑の不灭</div>

            <!-- ===== 导航栏：全部 / 推荐 / 热门 / 新 ===== -->
            <div class="nav-bar" id="navBar">
                <span class="nav-tab active" data-filter="all">📋 全部</span>
                <span class="nav-tab" data-filter="recommend">🏆 推荐</span>
                <span class="nav-tab" data-filter="hot">🔥 热门</span>
                <span class="nav-tab" data-filter="new">✨ 新</span>
            </div>
        </div>

        <!-- 卡片网格 -->
        <div class="tool-grid" id="toolGrid">
            <!-- 由 JavaScript 动态生成 -->
        </div>

        <div class="footer">
            <p>数据仅供参考 · 以游戏内为准</p>
        </div>

    </div>

    <script>
        // ================================================================
        //  工具数据（使用你实际的文件名作为 id）
        // ================================================================

        const TOOLS = [
            {
                id: 'xiaobaoshi999',
                icon: 'fa-gem',
                name: '小宝石升级计算器',
                desc: '消耗 &amp; 白金币模拟',
                badges: ['推荐'],
                category: 'recommend'
            },
            {
                id: 'chuanqi999',
                icon: 'fa-star',
                name: '传奇宝石消耗计算',
                desc: '一星 / 二星 / 五星',
                badges: ['热门'],
                category: 'hot'
            },
            {
                id: 'jinengcitiao',
                icon: 'fa-scroll',
                name: '各职业技能词条一览图',
                desc: '全职业词条汇总 · 一键查阅',
                badges: ['新'],
                category: 'new'
            },
            {
                id: 'skill_convert',
                icon: 'fa-arrows-rotate',
                name: '技能词条转换',
                desc: '职业技能 · 部位映射',
                badges: ['热门'],
                category: 'hot'
            },
            {
                id: 'xiashuidao999',
                icon: 'fa-landmark',
                name: '赫拉迪姆遗志计算器',
                desc: '三种材料独立计算 · 天数模拟',
                badges: ['新'],
                category: 'new'
            },
            {
                id: 'shimo',
                icon: 'fa-paw',
                name: '使魔特性查询',
                desc: '使魔图鉴 · 特性对照',
                badges: ['新'],
                category: 'new'
            },
            {
                id: 'fuwuqi',
                icon: 'fa-globe',
                name: '服务器互通查询',
                desc: '四大互通 · 一键搜索',
                badges: ['新'],
                category: 'new'
            },
            {
                id: 'tupocitiao',
                icon: 'fa-book',
                name: '突破属性图鉴及推荐',
                desc: '6种突破石 · 词条 &amp; 方案',
                badges: ['新'],
                category: 'new'
            },
            {
                id: 'pvpcitiao',
                icon: 'fa-shield-halved',
                name: 'PVP词条衰减大全',
                desc: '洗炼套装 · 衰减一览',
                badges: ['新'],
                category: 'new'
            },
            {
                id: 'yaoshi',
                icon: 'fa-key',
                name: '强化不朽钥匙攻略',
                desc: '获取渠道 · 月度汇总',
                badges: ['新'],
                category: 'new'
            }
        ];

        // ================================================================
        //  渲染函数（支持全部 / 推荐 / 热门 / 新）
        // ================================================================

        function renderTools(filter = 'all') {
            const grid = document.getElementById('toolGrid');
            let filtered = TOOLS;

            if (filter === 'recommend') {
                filtered = TOOLS.filter(t => t.category === 'recommend' || t.badges.includes('推荐'));
            } else if (filter === 'hot') {
                filtered = TOOLS.filter(t => t.badges.includes('热门'));
            } else if (filter === 'new') {
                filtered = TOOLS.filter(t => t.badges.includes('新'));
            }
            // 'all' 不做筛选，显示全部

            let html = '';
            filtered.forEach(tool => {
                let badgesHtml = '';
                tool.badges.forEach(b => {
                    let cls = '';
                    if (b === '推荐') cls = 'recommend';
                    else if (b === '热门') cls = 'hot';
                    else if (b === '新') cls = 'new';
                    badgesHtml += `<span class="badge ${cls}">${b}</span>`;
                });

                html += `
                    <a href="pages/${tool.id}.html" class="tool-card" data-id="${tool.id}">
                        <i class="icon fas ${tool.icon}"></i>
                        <span class="name">${tool.name}</span>
                        <span class="desc">${tool.desc}</span>
                        ${badgesHtml ? badgesHtml : ''}
                    </a>
                `;
            });

            // 如果过滤后没有卡片，显示提示
            if (!html) {
                html = `<p style="grid-column:1/-1;text-align:center;color:#4a5a6e;padding:30px 0;">暂无该分类下的工具</p>`;
            }

            grid.innerHTML = html;
        }

        // ================================================================
        //  导航栏切换
        // ================================================================

        document.addEventListener('DOMContentLoaded', function() {
            const tabs = document.querySelectorAll('.nav-tab');
            // 默认选中 'all'
            let currentFilter = 'all';

            tabs.forEach(tab => {
                tab.addEventListener('click', function() {
                    tabs.forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    const filter = this.dataset.filter;
                    currentFilter = filter;
                    renderTools(filter);
                });
            });

            // 初始渲染：全部
            renderTools('all');
        });

        // ================================================================
        //  密码锁逻辑（保持不变）
        // ================================================================

        (function() {
            var CORRECT_PASSWORD = '8888';
            var lockScreen = document.getElementById('lockScreen');
            var passwordInput = document.getElementById('passwordInput');
            var lockError = document.getElementById('lockError');

            if (sessionStorage.getItem('index_unlocked') === 'true') {
                lockScreen.classList.add('hidden');
                passwordInput.disabled = true;
                return;
            }

            function unlock() {
                var inputVal = passwordInput.value.trim();
                if (inputVal === CORRECT_PASSWORD) {
                    sessionStorage.setItem('index_unlocked', 'true');
                    lockScreen.classList.add('hidden');
                    passwordInput.disabled = true;
                    lockError.classList.remove('show');
                } else {
                    lockError.classList.add('show');
                    passwordInput.value = '';
                    passwordInput.focus();
                    passwordInput.style.borderColor = '#f87171';
                    setTimeout(function() {
                        passwordInput.style.borderColor = '';
                    }, 500);
                }
            }

            document.querySelector('.lock-box button').addEventListener('click', unlock);
            passwordInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    unlock();
                }
            });

            passwordInput.focus();
            window.unlock = unlock;
        })();
    </script>

</body>
</html>
