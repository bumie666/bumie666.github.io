<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>暗黑不朽工具箱</title>
    <!-- Font Awesome 6 免费版 CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0e14;
            background-image: radial-gradient(ellipse at 50% 0%, #1a212b 0%, #0b0e14 70%);
            color: #e0e6ed;
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            min-height: 100vh;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .page-wrap {
            max-width: 860px;
            width: 100%;
        }

        /* ===== 头部 ===== */
        .header {
            text-align: center;
            padding: 20px 0 16px 0;
            border-bottom: 1px solid #2a3a4a;
            margin-bottom: 20px;
        }
        .header h1 {
            font-family: 'Cinzel', 'Times New Roman', serif;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #f6d365, #c8a96e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2px;
        }
        .header h1 i {
            -webkit-text-fill-color: transparent; /* 让图标也继承渐变 */
            background: linear-gradient(135deg, #f6d365, #c8a96e);
            -webkit-background-clip: text;
            margin-right: 6px;
        }
        .header .sub {
            font-size: 14px;
            color: #7a8a9e;
            letter-spacing: 2px;
            margin-bottom: 4px;
        }
        .header .author {
            font-size: 13px;
            color: #5a6a7e;
            letter-spacing: 1px;
        }
        .header .author span {
            color: #c8a96e;
        }

        /* ===== 分类标签 ===== */
        .category-tabs {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .category-tabs .tab {
            padding: 6px 24px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            background: rgba(20, 25, 35, 0.5);
            border: 1px solid #2a3a4a;
            color: #7a8a9e;
            cursor: pointer;
            transition: 0.25s;
            user-select: none;
        }
        .category-tabs .tab:hover {
            border-color: #c8a96e;
            color: #d0d8e0;
        }
        .category-tabs .tab.active {
            background: rgba(200, 169, 110, 0.12);
            border-color: #c8a96e;
            color: #f6d365;
        }

        /* ===== 工具卡片网格 ===== */
        .tool-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 24px;
        }

        .tool-card {
            background: rgba(20, 25, 35, 0.70);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid #2a3a4a;
            border-radius: 14px;
            padding: 18px 16px 14px 16px;
            transition: border-color 0.25s, transform 0.2s, box-shadow 0.25s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
            position: relative;
        }
        .tool-card:hover {
            border-color: #c8a96e;
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }
        /* 卡片悬停时图标变色 */
        .tool-card:hover .card-icon i {
            color: #f6d365;
        }

        .tool-card .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
            gap: 8px;
        }
        .tool-card .card-icon {
            font-size: 28px;
            line-height: 1;
            flex-shrink: 0;
            width: 32px;
            text-align: center;
        }
        .tool-card .card-icon i {
            color: #c8a96e;
            transition: color 0.25s;
        }

        .tool-card .card-badges {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            justify-content: flex-end;
            flex-shrink: 0;
        }
        .tool-card .badge {
            font-size: 10px;
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 12px;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .badge.recommend {
            background: rgba(246, 211, 101, 0.12);
            border: 1px solid rgba(246, 211, 101, 0.25);
            color: #f6d365;
        }
        .badge.hot {
            background: rgba(224, 96, 80, 0.12);
            border: 1px solid rgba(224, 96, 80, 0.25);
            color: #e06050;
        }
        .badge.new {
            background: rgba(95, 203, 154, 0.12);
            border: 1px solid rgba(95, 203, 154, 0.25);
            color: #5fcb9a;
        }

        .tool-card .card-title {
            font-size: 15px;
            font-weight: 700;
            color: #d0d8e0;
            margin-bottom: 4px;
            line-height: 1.3;
        }
        .tool-card .card-desc {
            font-size: 12px;
            color: #7a8a9e;
            line-height: 1.5;
        }

        /* ===== 底部 ===== */
        .footer {
            margin-top: 10px;
            padding-top: 16px;
            border-top: 1px solid #1e2c38;
            text-align: center;
        }
        .footer .follow-btn {
            display: inline-block;
            background: rgba(200, 169, 110, 0.10);
            border: 1px solid #c8a96e;
            color: #c8a96e;
            padding: 8px 32px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            transition: 0.25s;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        .footer .follow-btn i {
            margin-right: 8px;
        }
        .footer .follow-btn:hover {
            background: rgba(200, 169, 110, 0.20);
            box-shadow: 0 0 20px rgba(200, 169, 110, 0.08);
        }
        .footer .copyright {
            font-size: 12px;
            color: #5a6a7e;
            letter-spacing: 0.5px;
            line-height: 1.8;
        }
        .footer .copyright .highlight {
            color: #c8a96e;
        }
        .footer .copyright .small-note {
            font-size: 10px;
            color: #3a4a5e;
            display: block;
            margin-top: 2px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 640px) {
            .tool-grid {
                grid-template-columns: 1fr;
                gap: 10px;
            }
            .header h1 {
                font-size: 22px;
                letter-spacing: 2px;
            }
            .header .sub {
                font-size: 12px;
            }
            .category-tabs .tab {
                padding: 4px 16px;
                font-size: 12px;
            }
            .tool-card .card-icon {
                font-size: 22px;
                width: 26px;
            }
            .tool-card .card-title {
                font-size: 14px;
            }
        }
        @media (max-width: 400px) {
            .header h1 {
                font-size: 18px;
            }
            .tool-card {
                padding: 14px 12px;
            }
        }
    </style>
</head>
<body>

<div class="page-wrap">

    <!-- ===== 头部（用 Font Awesome 替换了剑盾图标） ===== -->
    <div class="header">
        <h1><i class="fas fa-sword"></i> 暗黑不朽工具箱</h1>
        <div class="sub">实用工具集合，助你畅玩不朽世界</div>
        <div class="author">作者：<span>暗黑の不灭</span></div>
    </div>

    <!-- ===== 分类标签 ===== -->
    <div class="category-tabs" id="categoryTabs">
        <span class="tab active" data-filter="recommend"><i class="fas fa-star"></i> 推荐</span>
        <span class="tab" data-filter="hot"><i class="fas fa-fire"></i> 热门</span>
        <span class="tab" data-filter="new"><i class="fas fa-sparkles"></i> 新</span>
    </div>

    <!-- ===== 工具卡片网格 ===== -->
    <div class="tool-grid" id="toolGrid">
        <!-- 由 JavaScript 动态生成 -->
    </div>

    <!-- ===== 底部 ===== -->
    <div class="footer">
        <a href="#" class="follow-btn"><i class="fab fa-tiktok"></i> 关注抖音：暗黑の不灭</a>
        <div class="copyright">
            <span>关注获取更多工具与游戏攻略</span>
            <span class="highlight">暗黑不朽工具箱 · 实用工具集合</span>
            <span class="small-note">数据仅供参考 · 以游戏内为准</span>
        </div>
    </div>

</div>

<script>
    // ================================================================
    //  工具数据（图标全部换成 Font Awesome 类名）
    //  映射规则：fa-xxx 免费版均可使用
    // ================================================================

    const TOOLS = [
        {
            id: 'gem_calc',
            icon: 'fa-gem',         // 💎 -> 钻石
            title: '小宝石升级计算器',
            desc: '消耗&白金币模拟 · 一星/二星/五星',
            badges: ['推荐'],
            category: 'recommend'
        },
        {
            id: 'legendary_calc',
            icon: 'fa-bolt',        // ⚡ -> 闪电
            title: '传奇宝石消耗计算',
            desc: '消耗&白金币模拟 · 一星/二星/五星',
            badges: ['热门'],
            category: 'hot'
        },
        {
            id: 'skill_words',
            icon: 'fa-scroll',      // 📜 -> 卷轴
            title: '各职业技能词条一览图',
            desc: '全职业词条汇总 · 一键查阅',
            badges: ['新', '热门'],
            category: 'new'
        },
        {
            id: 'skill_mapping',
            icon: 'fa-arrows-rotate', // 🔄 -> 旋转箭头
            title: '技能词条转换',
            desc: '职业技能 · 部位映射',
            badges: ['新'],
            category: 'new'
        },
        {
            id: 'heradium',
            icon: 'fa-landmark',    // 🏛️ -> 希腊神庙
            title: '赫拉迪姆遗志计算器',
            desc: '三种材料独立计算 · 天数模拟',
            badges: ['新'],
            category: 'new'
        },
        {
            id: 'familiar',
            icon: 'fa-paw',         // 🐾 -> 爪印
            title: '使魔特性查询',
            desc: '使魔图鉴 · 特性对照',
            badges: ['新'],
            category: 'new'
        },
        {
            id: 'server_query',
            icon: 'fa-globe',       // 🌐 -> 地球
            title: '服务器互通查询',
            desc: '四大互通 · 一键搜索',
            badges: ['新'],
            category: 'new'
        },
        {
            id: 'break_attr',
            icon: 'fa-hammer',      // ⚔️ -> 锤子（更贴合“打造”）
            title: '突破属性图鉴及推荐',
            desc: '6种突破石 · 词条&方案',
            badges: ['热门'],
            category: 'hot'
        },
        {
            id: 'pvp_decay',
            icon: 'fa-shield-halved', // 🛡️ -> 半盾
            title: 'PVP词条衰减大全',
            desc: 'PVP词条衰减大全',
            badges: [],
            category: 'recommend'
        },
        {
            id: 'key_guide',
            icon: 'fa-key',         // 🔑 -> 钥匙
            title: '强化不朽钥匙攻略',
            desc: '获取渠道 · 月度汇总',
            badges: ['新'],
            category: 'new'
        },
        {
            id: 'wash_suit',
            icon: 'fa-flask',       // 🧼 -> 药剂瓶（暗黑风炼金）
            title: '洗炼套装·衰减一览',
            desc: '洗炼套装 · 衰减一览',
            badges: ['新'],
            category: 'new'
        }
    ];

    // ================================================================
    //  渲染 & 筛选逻辑
    // ================================================================

    function renderTools(filter = 'recommend') {
        const grid = document.getElementById('toolGrid');
        let filtered = TOOLS;

        if (filter === 'recommend') {
            filtered = TOOLS.filter(t => t.category === 'recommend' || t.badges.includes('推荐'));
        } else if (filter === 'hot') {
            filtered = TOOLS.filter(t => t.badges.includes('热门'));
        } else if (filter === 'new') {
            filtered = TOOLS.filter(t => t.badges.includes('新'));
        }

        let html = '';
        filtered.forEach(tool => {
            let badgesHtml = '';
            tool.badges.forEach(b => {
                let cls = '';
                if (b === '推荐') cls = 'recommend';
                else if (b === '热门') cls = 'hot';
                else if (b === '新') cls = 'new';
                badgesHtml += `<span class="badge ${cls}">${b}</span>`;
            });

            // 关键点：这里把 Emoji 换成了 <i class="fas fa-xxx"></i>
            html += `
                <a href="#" class="tool-card" data-id="${tool.id}">
                    <div class="card-top">
                        <span class="card-icon"><i class="fas ${tool.icon}"></i></span>
                        <div class="card-badges">${badgesHtml}</div>
                    </div>
                    <div class="card-title">${tool.title}</div>
                    <div class="card-desc">${tool.desc}</div>
                </a>
            `;
        });

        grid.innerHTML = html || '<p style="grid-column:1/-1;text-align:center;color:#4a5a6e;padding:30px 0;">暂无该分类下的工具</p>';
    }

    document.addEventListener('DOMContentLoaded', function() {
        const tabs = document.querySelectorAll('.tab');
        tabs.forEach(tab => {
            tab.addEventListener('click', function() {
                tabs.forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                renderTools(this.dataset.filter);
            });
        });
        renderTools('recommend');
    });
</script>

</body>
</html>
