<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>暗黑不朽百宝箱 · 首页</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0e14;
            background-image: radial-gradient(ellipse at 50% 0%, #1a212b 0%, #0b0e14 70%);
            color: #e0e6ed;
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            min-height: 100vh;
            padding: 12px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .wrap {
            max-width: 820px;
            width: 100%;
        }

        /* ----- 头部 ----- */
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #2a3a4a;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .header img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid rgba(200, 169, 110, 0.3);
        }
        .header h1 {
            font-family: 'Cinzel', 'Times New Roman', serif;
            font-size: 20px;
            background: linear-gradient(135deg, #f6d365, #c8a96e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header .sub {
            font-size: 12px;
            color: #7a8a9e;
            margin-left: auto;
        }

        /* ----- 功能网格（两列） ----- */
        .func-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 12px 0;
        }

        .func-card {
            background: rgba(20, 25, 35, 0.7);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid #2a3a4a;
            border-radius: 10px;
            padding: 14px 8px;
            text-align: center;
            transition: 0.2s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 4px;
            text-decoration: none;
            color: inherit;
        }
        .func-card:active {
            transform: scale(0.96);
            border-color: #c8a96e;
        }
        .func-card .icon {
            font-size: 22px;
            line-height: 1.2;
        }
        .func-card .title {
            font-size: 14px;
            font-weight: 700;
            color: #e8edf4;
            line-height: 1.3;
        }
        .func-card .title .hot {
            background: #c8a96e;
            color: #0b0e14;
            font-size: 9px;
            padding: 0 6px;
            border-radius: 3px;
            margin-left: 4px;
            font-weight: 700;
            vertical-align: middle;
        }
        .func-card .desc {
            font-size: 11px;
            color: #8a9aae;
            line-height: 1.4;
            border-top: 1px dashed #1f2a36;
            padding-top: 5px;
        }

        /* 全宽横幅（关注抖音） */
        .func-grid .full-width {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, #1a212b, #0f161e);
            border-color: #c8a96e;
            border-width: 1px 1px 1px 4px;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 12px;
            padding: 12px 10px;
        }
        .func-grid .full-width .title {
            font-size: 15px;
            color: #f6d365;
        }
        .func-grid .full-width .desc {
            border: none;
            padding: 0;
            font-size: 11px;
            color: #7a8a9e;
        }

        /* ----- 底部返回链接（模仿原风格） ----- */
        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            color: #5a6a7e;
            font-size: 12px;
            text-decoration: none;
            transition: 0.2s;
            letter-spacing: 0.5px;
        }
        .back-link:hover {
            color: #c8a96e;
        }

        /* ----- 移动端微调 ----- */
        @media (max-width: 480px) {
            .header h1 {
                font-size: 17px;
            }
            .header .sub {
                font-size: 10px;
                margin-left: 0;
                width: 100%;
            }
            .func-card {
                padding: 12px 6px;
            }
            .func-card .title {
                font-size: 13px;
            }
            .func-card .desc {
                font-size: 10px;
            }
            .func-grid .full-width .title {
                font-size: 14px;
            }
        }
        @media (max-width: 380px) {
            .func-card .title {
                font-size: 12px;
            }
            .func-card .icon {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="wrap">

        <!-- ====== 头部 ====== -->
        <div class="header">
            <!-- 头像图片路径请根据实际情况调整，默认指向 ../images/douyintouxiang.png -->
            <img src="../images/douyintouxiang.png" alt="头像">
            <h1>⚔️ 暗黑不朽百宝箱</h1>
            <span class="sub">暗黑の不灭 · 数据工具箱</span>
        </div>

        <!-- ====== 功能网格 ====== -->
        <div class="func-grid">

            <!-- 1. 小宝石升级计算器 -->
            <a class="func-card" href="#">
                <span class="icon">💎</span>
                <span class="title">小宝石升级计算器 <span class="hot">推荐</span></span>
                <span class="desc">一星 / 二星 / 五星</span>
            </a>

            <!-- 2. 传奇宝石消耗计算 -->
            <a class="func-card" href="#">
                <span class="icon">🔥</span>
                <span class="title">传奇宝石消耗计算 <span class="hot">热门</span></span>
                <span class="desc">消耗 &amp; 白金币模拟</span>
            </a>

            <!-- 3. 赫拉迪姆遗忘计算器 -->
            <a class="func-card" href="#">
                <span class="icon">📜</span>
                <span class="title">赫拉迪姆遗忘计算器 <span class="hot">热门</span></span>
                <span class="desc">三种材料独立计算 · 天数模拟</span>
            </a>

            <!-- 4. 技能词条转换 -->
            <a class="func-card" href="#">
                <span class="icon">🔄</span>
                <span class="title">技能词条转换</span>
                <span class="desc">职业技能 · 部位映射</span>
            </a>

            <!-- 5. 服务器互通查询 -->
            <a class="func-card" href="#">
                <span class="icon">⚔️</span>
                <span class="title">服务器互通查询 <span class="hot">热门</span></span>
                <span class="desc">四大互通，一键搜索</span>
            </a>

            <!-- 6. 各职业技能词条一览图 -->
            <a class="func-card" href="#">
                <span class="icon">📊</span>
                <span class="title">各职业技能词条一览图</span>
                <span class="desc">全职业词条汇总 · 一键查阅</span>
            </a>

            <!-- 7. 突破属性图鉴及推荐 -->
            <a class="func-card" href="#">
                <span class="icon">🛡️</span>
                <span class="title">突破属性图鉴及推荐</span>
                <span class="desc">6种突破石 · 词条 &amp; 方案</span>
            </a>

            <!-- 8. 底部横幅：关注抖音（占满一行） -->
            <a class="func-card full-width" href="https://www.douyin.com/" target="_blank">
                <span class="icon">📱</span>
                <span class="title">关注抖音：暗黑の不灭</span>
                <span class="desc">获取更多暗黑不朽攻略 &amp; 工具更新</span>
            </a>

        </div>

        <!-- ====== 底部链接（可选） ====== -->
        <a href="https://bumie666.github.io" class="back-link">🏠 返回暗黑不朽百宝箱</a>

    </div>
</body>
</html>
