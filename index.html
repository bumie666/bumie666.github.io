<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>暗黑不朽工具箱</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">

    <!-- ===== 预加载功能模块 ===== -->
    <link rel="prefetch" href="pages/xiaobaoshi999.html">
    <link rel="prefetch" href="pages/chuanqi999.html">
    <link rel="prefetch" href="pages/xiashuidao999.html">
    <link rel="prefetch" href="pages/skill_convert.html">
    <link rel="prefetch" href="pages/fuwuqi.html">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0e14;
            background-image: radial-gradient(ellipse at 50% 0%, #1a212b 0%, #0b0e14 70%);
            color: #e0e6ed;
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            min-height: 100vh;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 720px;
            width: 100%;
        }

        /* ===== 头部 ===== */
        .header {
            text-align: left;
            padding: 4px 0 18px 0;
            border-bottom: 1px solid #2a3a4a;
            margin-bottom: 20px;
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        .header-top .main-title {
            font-family: 'Cinzel', 'Times New Roman', serif;
            font-size: 36px;
            font-weight: 900;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #f6d365, #c8a96e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            flex: 1;
        }
        .refresh-btn {
            background: none;
            border: none;
            color: #c8a96e;
            font-size: 28px;
            cursor: pointer;
            transition: 0.3s;
            padding: 4px 8px;
            border-radius: 8px;
            line-height: 1;
            flex-shrink: 0;
            opacity: 0.7;
        }
        .refresh-btn:hover {
            transform: rotate(60deg);
            color: #f6d365;
            opacity: 1;
            background: rgba(200, 169, 110, 0.06);
        }
        .refresh-btn:active {
            transform: rotate(120deg) scale(0.9);
        }
        .header .sub-title {
            font-size: 15px;
            color: #8a9aae;
            letter-spacing: 1px;
            margin-top: 4px;
        }
        .header .author {
            font-size: 13px;
            color: #5a6a7e;
            margin-top: 2px;
            letter-spacing: 0.5px;
        }
        .header .author span {
            color: #c8a96e;
        }

        /* ===== 分类标签 ===== */
        .category-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .category-tabs .tab {
            padding: 6px 24px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            background: rgba(20, 25, 35, 0.5);
            border: 1px solid #2a3a4a;
            color: #7a8a9e;
            cursor: pointer;
            transition: 0.25s;
            user-select: none;
            font-family: inherit;
        }
        .category-tabs .tab:hover {
            border-color: #c8a96e;
            color: #d0d8e0;
        }
        .category-tabs .tab.active {
            background: rgba(200, 169, 110, 0.10);
            border-color: #c8a96e;
            color: #f6d365;
        }

        /* ===== 工具卡片网格 ===== */
        .tool-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 28px;
        }

        .tool-card {
            display: block;
            padding: 18px 16px 14px 16px;
            background: rgba(20, 25, 35, 0.70);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(42, 58, 74, 0.5);
            border-radius: 16px;
            color: #e0e6ed;
            text-decoration: none;
            transition: all 0.3s ease;
            position: relative;
            min-height: 110px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        .tool-card:hover {
            border-color: #c8a96e;
            background: rgba(200, 169, 110, 0.06);
            transform: translateY(-4px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
        }
        .tool-card .icon {
            font-size: 28px;
            display: block;
            margin-bottom: 6px;
        }
        .tool-card .name {
            font-size: 16px;
            font-weight: 700;
            display: block;
            letter-spacing: 0.3px;
            margin-bottom: 2px;
            line-height: 1.25;
            color: #d8e0e8;
        }
        .tool-card .desc {
            font-size: 12px;
            color: #6a7a8e;
            display: block;
            line-height: 1.4;
        }
        /* 右上角徽章 */
        .tool-card .badge {
            position: absolute;
            top: 12px;
            right: 14px;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 12px;
            border-radius: 20px;
            letter-spacing: 0.5px;
            border: 1px solid transparent;
        }
        .badge-recommend {
            background: rgba(246, 211, 101, 0.10);
            border-color: rgba(246, 211, 101, 0.20);
            color: #f6d365;
        }
        .badge-hot {
            background: rgba(224, 96, 80, 0.10);
            border-color: rgba(224, 96, 80, 0.20);
            color: #e06050;
        }
        .badge-new {
            background: rgba(95, 203, 154, 0.10);
            border-color: rgba(95, 203, 154, 0.20);
            color: #5fcb9a;
        }

        /* 全宽卡片（关注抖音） */
        .tool-card.full-width {
            grid-column: 1 / -1;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 16px 20px;
            min-height: auto;
            text-align: center;
            border-color: rgba(200, 169, 110, 0.15);
        }
        .tool-card.full-width:hover {
            border-color: #c8a96e;
        }
        .tool-card.full-width .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid rgba(200, 169, 110, 0.25);
            object-fit: cover;
            flex-shrink: 0;
        }
        .tool-card.full-width .info {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        .tool-card.full-width .info .name {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 0;
            color: #d8e0e8;
        }
        .tool-card.full-width .info .desc {
            font-size: 13px;
            color: #6a7a8e;
        }

        /* ===== 底部 ===== */
        .footer {
            text-align: center;
            border-top: 1px solid rgba(30, 44, 56, 0.5);
            padding-top: 20px;
            margin-top: 4px;
        }
        .footer .follow-btn {
            display: inline-block;
            background: rgba(200, 169, 110, 0.06);
            border: 1px solid rgba(200, 169, 110, 0.20);
            color: #c8a96e;
            padding: 8px 32px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            transition: 0.3s;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
            font-family: inherit;
        }
        .footer .follow-btn:hover {
            background: rgba(200, 169, 110, 0.14);
            border-color: #c8a96e;
            box-shadow: 0 0 28px rgba(200, 169, 110, 0.06);
        }
        .footer .copyright {
            font-size: 13px;
            color: #5a6a7e;
            line-height: 1.8;
            letter-spacing: 0.3px;
        }
        .footer .copyright .highlight {
            color: #c8a96e;
            font-weight: 600;
        }
        .footer .copyright .small-note {
            font-size: 11px;
            color: #3a4a5e;
            display: block;
            margin-top: 2px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 540px) {
            .tool-grid {
                gap: 10px;
            }
            .tool-card {
                padding: 14px 12px 12px 12px;
                min-height: 90px;
                border-radius: 14px;
            }
            .tool-card .icon {
                font-size: 24px;
            }
            .tool-card .name {
                font-size: 14px;
            }
            .tool-card .desc {
                font-size: 11px;
            }
            .tool-card .badge {
                font-size: 9px;
                padding: 1px 10px;
                top: 10px;
                right: 10px;
            }
            .tool-card.full-width {
                gap: 12px;
                padding: 14px 16px;
            }
            .tool-card.full-width .avatar {
                width: 38px;
                height: 38px;
            }
            .tool-card.full-width .info .name {
                font-size: 15px;
            }
            .tool-card.full-width .info .desc {
                font-size: 12px;
            }
            .header-top .main-title {
                font-size: 28px;
                letter-spacing: 2px;
            }
            .refresh-btn {
                font-size: 24px;
            }
            .header .sub-title {
                font-size: 13px;
            }
            .category-tabs .tab {
                padding: 4px 16px;
                font-size: 12px;
            }
        }

        @media (max-width: 380px) {
            .tool-grid {
                gap: 8px;
            }
            .tool-card {
                padding: 10px 8px 8px 8px;
                min-height: 76px;
            }
            .tool-card .icon {
                font-size: 20px;
            }
            .tool-card .name {
                font-size: 12px;
            }
            .tool-card .desc {
                font-size: 10px;
            }
            .tool-card .badge {
                font-size: 8px;
                padding: 1px 6px;
                top: 6px;
                right: 6px;
            }
            .tool-card.full-width {
                flex-direction: row;
                gap: 10px;
                padding: 10px 12px;
            }
            .tool-card.full-width .avatar {
                width: 32px;
                height: 32px;
            }
            .tool-card.full-width .info .name {
                font-size: 13px;
            }
            .tool-card.full-width .info .desc {
                font-size: 10px;
            }
            .header-top .main-title {
                font-size: 22px;
                letter-spacing: 1px;
            }
            .refresh-btn {
                font-size: 20px;
            }
            .header .sub-title {
                font-size: 11px;
            }
            .category-tabs .tab {
                padding: 3px 12px;
                font-size: 11px;
            }
        }

        /* ===== 密码锁 ===== */
        #lockScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 14, 20, 0.94);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 20px;
            transition: opacity 0.4s ease;
        }
        #lockScreen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .lock-box {
            background: rgba(20, 25, 35, 0.90);
            border: 1px solid #2a3a4a;
            border-radius: 20px;
            padding: 40px 32px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.6);
        }
        .lock-box .lock-icon {
            font-size: 44px;
            display: block;
            margin-bottom: 10px;
        }
        .lock-box .lock-title {
            font-family: 'Cinzel', 'Times New Roman', serif;
            font-size: 20px;
            color: #f6d365;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }
        .lock-box .lock-desc {
            font-size: 14px;
            color: #8a9aae;
            margin-bottom: 22px;
            line-height: 1.6;
        }
        .lock-box input {
            width: 100%;
            padding: 14px 18px;
            background: #0f161e;
            border: 1px solid #2a3a4a;
            border-radius: 12px;
            color: #fff;
            font-size: 20px;
            font-weight: 600;
            text-align: center;
            letter-spacing: 10px;
            outline: none;
            transition: 0.2s;
        }
        .lock-box input:focus {
            border-color: #c8a96e;
            box-shadow: 0 0 0 3px rgba(200, 169, 110, 0.10);
        }
        .lock-box button {
            width: 100%;
            padding: 14px;
            margin-top: 16px;
            background: linear-gradient(135deg, #c8a96e, #f6d365);
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            color: #0b0e14;
            cursor: pointer;
            transition: 0.25s;
            font-family: 'Cinzel', 'Times New Roman', serif;
            letter-spacing: 2px;
        }
        .lock-box button:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 28px rgba(200, 169, 110, 0.30);
        }
        .lock-box button:active {
            transform: scale(0.97);
        }
        .lock-box .lock-error {
            color: #f87171;
            font-size: 14px;
            margin-top: 12px;
            min-height: 24px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .lock-box .lock-error.show {
            opacity: 1;
        }
        @media (max-width: 480px) {
            .lock-box {
                padding: 28px 18px;
            }
            .lock-box .lock-title {
                font-size: 18px;
            }
            .lock-box .lock-desc {
                font-size: 13px;
            }
            .lock-box input {
                font-size: 18px;
                padding: 12px 14px;
                letter-spacing: 8px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 密码锁遮罩 ===== -->
    <div id="lockScreen">
        <div class="lock-box">
            <span class="lock-icon">🔐</span>
            <div class="lock-title">工具箱开发中</div>
            <div class="lock-desc">想提前体验的朋友请加不灭粉丝群获取密码</div>
            <input type="password" id="passwordInput" placeholder="输入密码" maxlength="20" autofocus>
            <button onclick="unlock()">解 锁</button>
            <div class="lock-error" id="lockError">❌ 密码错误，请重试</div>
        </div>
    </div>

    <!-- ===== 主内容 ===== -->
    <div class="container">

        <!-- 头部 -->
        <div class="header">
            <div class="header-top">
                <div class="main-title">⚔️ 暗黑不朽工具箱</div>
                <button class="refresh-btn" onclick="location.reload()" title="刷新页面">⟳</button>
            </div>
            <div class="sub-title">实用工具集合，助你畅玩不朽世界</div>
            <div class="author">作者：<span>暗黑の不灭</span></div>
        </div>

        <!-- 分类标签 -->
        <div class="category-tabs" id="categoryTabs">
            <button class="tab active" data-filter="all">🏆 推荐</button>
            <button class="tab" data-filter="hot">🔥 热门</button>
            <button class="tab" data-filter="new">✨ 新</button>
        </div>

        <!-- 工具卡片网格 -->
        <div class="tool-grid" id="toolGrid">
            <!-- 由 JavaScript 动态生成 -->
        </div>

        <!-- 底部 -->
        <div class="footer">
            <a href="https://v.douyin.com/TiS0JtMHSPU/" target="_blank" class="follow-btn">📱 关注抖音：暗黑の不灭</a>
            <div class="copyright">
                关注获取更多工具与游戏攻略<br>
                <span class="highlight">暗黑不朽工具箱 · 实用工具集合</span>
                <span class="small-note">数据仅供参考 · 以游戏内为准</span>
            </div>
        </div>

    </div>

    <script>
        // ================================================================
        //  工具数据
        // ================================================================

        var TOOLS = [
            {
                id: 'xiaobaoshi999',
                icon: '💎',
                name: '小宝石升级计算器',
                desc: '消耗 &amp; 白金币模拟',
                badge: '推荐',
                badgeClass: 'badge-recommend',
                category: 'recommend',
                url: 'pages/xiaobaoshi999.html'
            },
            {
                id: 'chuanqi999',
                icon: '⭐',
                name: '传奇宝石消耗计算',
                desc: '一星 / 二星 / 五星',
                badge: '热门',
                badgeClass: 'badge-hot',
                category: 'hot',
                url: 'pages/chuanqi999.html'
            },
            {
                id: 'jinengcitiao',
                icon: '📋',
                name: '各职业技能词条一览图',
                desc: '全职业词条汇总 · 一键查阅',
                badge: '新',
                badgeClass: 'badge-new',
                category: 'new',
                url: 'pages/jinengcitiao.html'
            },
            {
                id: 'skill_convert',
                icon: '🔄',
                name: '技能词条转换',
                desc: '职业技能 · 部位映射',
                badge: '热门',
                badgeClass: 'badge-hot',
                category: 'hot',
                url: 'pages/skill_convert.html'
            },
            {
                id: 'xiashuidao999',
                icon: '🏛️',
                name: '赫拉迪姆遗志计算器',
                desc: '三种材料独立计算 · 天数模拟',
                badge: '新',
                badgeClass: 'badge-new',
                category: 'new',
                url: 'pages/xiashuidao999.html'
            },
            {
                id: 'shimo',
                icon: '🐾',
                name: '使魔特性查询',
                desc: '使魔图鉴 · 特性对照',
                badge: '新',
                badgeClass: 'badge-new',
                category: 'new',
                url: 'pages/shimo.html'
            },
            {
                id: 'fuwuqi',
                icon: '🌐',
                name: '服务器互通查询',
                desc: '四大互通 · 一键搜索',
                badge: '新',
                badgeClass: 'badge-new',
                category: 'new',
                url: 'pages/fuwuqi.html'
            },
            {
                id: 'tupocitiao',
                icon: '📖',
                name: '突破属性图鉴及推荐',
                desc: '6种突破石 · 词条 &amp; 方案',
                badge: '新',
                badgeClass: 'badge-new',
                category: 'new',
                url: 'pages/tupocitiao.html'
            },
            {
                id: 'pvpcitiao',
                icon: '⚔️',
                name: 'PVP词条衰减大全',
                desc: '洗炼套装 · 衰减一览',
                badge: '新',
                badgeClass: 'badge-new',
                category: 'new',
                url: 'pages/pvpcitiao.html'
            },
            {
                id: 'yaoshi',
                icon: '🔑',
                name: '强化不朽钥匙攻略',
                desc: '获取渠道 · 月度汇总',
                badge: '新',
                badgeClass: 'badge-new',
                category: 'new',
                url: 'pages/yaoshi.html'
            }
        ];

        // ================================================================
        //  渲染函数
        // ================================================================

        function renderTools(filter) {
            var grid = document.getElementById('toolGrid');
            var filtered = [];

            if (filter === 'all') {
                filtered = TOOLS;
            } else if (filter === 'recommend') {
                filtered = TOOLS.filter(function(t) { return t.category === 'recommend'; });
            } else if (filter === 'hot') {
                filtered = TOOLS.filter(function(t) { return t.category === 'hot'; });
            } else if (filter === 'new') {
                filtered = TOOLS.filter(function(t) { return t.category === 'new'; });
            }

            var html = '';
            for (var i = 0; i < filtered.length; i++) {
                var t = filtered[i];
                html += '<a href="' + t.url + '" class="tool-card">';
                html += '  <span class="icon">' + t.icon + '</span>';
                html += '  <span class="name">' + t.name + '</span>';
                html += '  <span class="desc">' + t.desc + '</span>';
                html += '  <span class="badge ' + t.badgeClass + '">' + t.badge + '</span>';
                html += '</a>';
            }

            if (filtered.length === 0) {
                html = '<div style="grid-column:1/-1;text-align:center;color:#4a5a6e;padding:30px 0;">该分类暂无工具</div>';
            }

            // 追加"关注抖音"全宽卡片
            html += `
                <a href="https://v.douyin.com/TiS0JtMHSPU/" target="_blank" class="tool-card full-width">
                    <img src="images/douyintouxiang.png" alt="抖音头像" class="avatar">
                    <div class="info">
                        <span class="name">关注抖音：暗黑の不灭</span>
                        <span class="desc">获取更多暗黑不朽攻略 &amp; 工具更新</span>
                    </div>
                </a>
            `;

            grid.innerHTML = html;
        }

        // ================================================================
        //  分类切换逻辑
        // ================================================================

        document.addEventListener('DOMContentLoaded', function() {
            var tabs = document.querySelectorAll('.tab');

            for (var i = 0; i < tabs.length; i++) {
                (function(index) {
                    tabs[index].addEventListener('click', function() {
                        for (var j = 0; j < tabs.length; j++) {
                            tabs[j].classList.remove('active');
                        }
                        this.classList.add('active');

                        var filter = this.dataset.filter;
                        renderTools(filter);
                    });
                })(i);
            }

            renderTools('all');
        });

        // ================================================================
        //  密码锁逻辑
        // ================================================================

        (function() {
            var CORRECT_PASSWORD = '8888';
            var lockScreen = document.getElementById('lockScreen');
            var passwordInput = document.getElementById('passwordInput');
            var lockError = document.getElementById('lockError');

            if (sessionStorage.getItem('index_unlocked') === 'true') {
                lockScreen.classList.add('hidden');
                passwordInput.disabled = true;
                return;
            }

            function unlock() {
                var inputVal = passwordInput.value.trim();
                if (inputVal === CORRECT_PASSWORD) {
                    sessionStorage.setItem('index_unlocked', 'true');
                    lockScreen.classList.add('hidden');
                    passwordInput.disabled = true;
                    lockError.classList.remove('show');
                } else {
                    lockError.classList.add('show');
                    passwordInput.value = '';
                    passwordInput.focus();
                    passwordInput.style.borderColor = '#f87171';
                    setTimeout(function() {
                        passwordInput.style.borderColor = '';
                    }, 500);
                }
            }

            document.querySelector('.lock-box button').addEventListener('click', unlock);
            passwordInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    unlock();
                }
            });

            passwordInput.focus();
            window.unlock = unlock;
        })();
    </script>

</body>
</html>
