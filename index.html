<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>暗黑不灭 · 宝石合成计算器</title>
    <style>
        /* ---------- 全局暗黑风格 ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b0e14;
            color: #e0e6ed;
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: #151e27;
            border: 1px solid #2a3a4a;
            border-radius: 20px;
            padding: 40px 30px;
            max-width: 460px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        }
        /* 头部 */
        .header {
            text-align: center;
            margin-bottom: 28px;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #f6d365, #fda085);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }
        .header p {
            color: #7a8a9e;
            font-size: 14px;
            margin-top: 6px;
            border-top: 1px dashed #2a3a4a;
            padding-top: 10px;
        }
        /* 输入区 */
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #b0c4d9;
            margin-bottom: 6px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: #0f161e;
            border: 1px solid #2a3a4a;
            border-radius: 12px;
            color: #fff;
            font-size: 18px;
            font-weight: 500;
            outline: none;
            transition: 0.2s;
        }
        .input-group input:focus {
            border-color: #f6d365;
            box-shadow: 0 0 0 3px rgba(246, 211, 101, 0.15);
        }
        /* 按钮 */
        .calc-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #f6d365, #fda085);
            border: none;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 700;
            color: #0b0e14;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 2px;
            margin-top: 8px;
        }
        .calc-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(253, 160, 133, 0.3);
        }
        /* 结果展示 */
        .result-box {
            margin-top: 25px;
            background: #0f161e;
            border-radius: 14px;
            padding: 20px;
            text-align: center;
            border: 1px solid #1e2c38;
        }
        .result-box .number {
            font-size: 42px;
            font-weight: 800;
            color: #f6d365;
            display: block;
            margin: 8px 0 4px;
            letter-spacing: 1px;
        }
        .result-box .sub {
            font-size: 14px;
            color: #7a8a9e;
        }
        .result-box .error {
            color: #f87171;
            font-size: 16px;
        }
        /* 底部导航 */
        .back-link {
            display: block;
            text-align: center;
            margin-top: 22px;
            color: #4a5a6e;
            font-size: 14px;
            text-decoration: none;
            border-top: 1px solid #1e2c38;
            padding-top: 18px;
        }
        .back-link:hover {
            color: #f6d365;
        }
    </style>
</head>
<body>

<div class="container">

    <!-- 头部 -->
    <div class="header">
        <h1>⚔️ 宝石合成</h1>
        <p>输入等级，秒算所需1级宝石总量</p>
    </div>

    <!-- 当前等级 -->
    <div class="input-group">
        <label>📌 当前宝石等级</label>
        <input type="number" id="currentLevel" value="1" min="1" max="10">
    </div>

    <!-- 目标等级 -->
    <div class="input-group">
        <label>🎯 目标宝石等级</label>
        <input type="number" id="targetLevel" value="8" min="1" max="12">
    </div>

    <!-- 计算按钮 -->
    <button class="calc-btn" onclick="calculate()">🧮 计算消耗</button>

    <!-- 结果显示 -->
    <div class="result-box" id="resultDisplay">
        <span class="sub">📦 需要 1 级宝石</span>
        <span class="number" id="resultNumber">0</span>
        <span class="sub" id="extraInfo">输入等级后点击计算</span>
    </div>

    <!-- 返回首页 -->
    <a href="https://bumie666.github.io" class="back-link">🏠 返回暗黑不灭工具箱</a>
</div>

<script>
    function calculate() {
        // 1. 获取输入值
        let current = parseInt(document.getElementById('currentLevel').value);
        let target = parseInt(document.getElementById('targetLevel').value);
        const resultNumber = document.getElementById('resultNumber');
        const extraInfo = document.getElementById('extraInfo');

        // 2. 简单校验
        if (isNaN(current) || isNaN(target) || current < 1 || target < 1) {
            resultNumber.textContent = '❌';
            extraInfo.textContent = '请输入有效的正整数（≥1）';
            return;
        }

        if (current >= target) {
            resultNumber.textContent = '0';
            extraInfo.textContent = '目标等级必须大于当前等级！';
            return;
        }

        // 3. 核心计算：合成到目标等级需要 2^(目标-当前) 颗 1 级宝石
        const diff = target - current;
        const total = Math.pow(2, diff);

        // 4. 显示结果（加千位分隔符，方便阅读）
        const formatted = total.toLocaleString();
        resultNumber.textContent = formatted;

        // 附加提示
        if (total >= 100000) {
            extraInfo.textContent = `⚠️ 需要合成 ${diff} 级，消耗巨大！`;
        } else if (total >= 1000) {
            extraInfo.textContent = `💪 需要合成 ${diff} 级，量力而行！`;
        } else {
            extraInfo.textContent = `✨ 从 ${current} 级合到 ${target} 级，共需合成 ${diff} 级。`;
        }
    }

    // 页面加载完后自动算一次（默认1级到8级）
    window.onload = calculate;
</script>

</body>
</html>
